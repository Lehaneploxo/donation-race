<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Reach the Mountain!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #000;
      overflow: hidden;
      font-family: 'Arial Black', 'Arial', sans-serif;
    }
    #scaleWrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1920px;
      transform-origin: top left;
    }
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
    }
    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1920px;
      pointer-events: none;
    }

    /* Title */
    #title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 8px #FF6600, 0 0 28px #FF4400, 2px 2px 0 #000;
      letter-spacing: 4px;
      white-space: nowrap;
    }

    /* Status badge */
    #statusBadge {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: bold;
      padding: 8px 22px;
      border-radius: 10px;
      border: 2px solid #555;
      background: rgba(0,0,0,0.7);
      color: #AAA;
      white-space: nowrap;
      transition: color 0.4s, border-color 0.4s;
    }
    #statusBadge.live  { color: #00FF88; border-color: #00FF88; box-shadow: 0 0 10px rgba(0,255,136,0.35); }
    #statusBadge.demo  { color: #FF9900; border-color: #FF9900; box-shadow: 0 0 10px rgba(255,153,0,0.35); }
    #statusBadge.error { color: #FF4444; border-color: #FF4444; box-shadow: 0 0 10px rgba(255,68,68,0.35); }

    /* Winners / player count */
    #playerCount {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 22px;
      font-weight: bold;
      color: #00FF88;
      background: rgba(0,0,0,0.68);
      padding: 8px 16px;
      border-radius: 10px;
      border: 2px solid #00FF88;
      box-shadow: 0 0 14px rgba(0,255,136,0.35);
    }

    /* Time of day badge */
    #timeOfDay {
      position: absolute;
      top: 24px;
      left: 24px;
      font-size: 20px;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.55);
      color: #FFE;
      letter-spacing: 1px;
      transition: color 2s, border-color 2s;
    }

    /* Username input overlay */
    #usernameOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #usernameOverlay h2 {
      color: #FFD700;
      font-size: 42px;
      font-weight: 900;
      text-shadow: 0 0 20px #FF6600;
      margin-bottom: 10px;
    }
    #usernameOverlay p {
      color: #AAA;
      font-size: 20px;
      margin-bottom: 28px;
    }
    #usernameInput {
      font-size: 28px;
      padding: 14px 22px;
      border-radius: 12px;
      border: 3px solid #FFD700;
      background: #111;
      color: #FFF;
      text-align: center;
      width: 420px;
      outline: none;
    }
    #usernameInput:focus { border-color: #00FF88; }
    #usernameBtn {
      margin-top: 18px;
      font-size: 24px;
      font-weight: bold;
      padding: 14px 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #FF6600, #FFD700);
      color: #000;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #usernameBtn:hover { transform: scale(1.04); }
    #demoBtn {
      margin-top: 10px;
      font-size: 16px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    #demoBtn:hover { color: #CCC; }

    /* Progress bar */
    #progressWrap {
      position: absolute;
      top: 155px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #progressLabel {
      color: #0FF;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 0 8px #0FF;
      letter-spacing: 2px;
    }
    #progressBarOuter {
      width: 700px;
      height: 20px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #0FF;
      border-radius: 10px;
      overflow: hidden;
    }
    #progressBarInner {
      height: 100%;
      background: linear-gradient(90deg, #00BFFF, #00FF88);
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 8px #00FF88;
    }

    /* Leaderboard — верхний левый угол */
    #leaderboard {
      position: absolute;
      top: 220px;
      left: 18px;
      background: rgba(0,0,0,0.80);
      border: 2px solid #FFD700;
      border-radius: 16px;
      padding: 10px 16px 12px;
      width: 480px;
      box-shadow: 0 0 22px rgba(255,215,0,0.25);
    }
    #leaderboard h3 {
      color: #FFD700;
      font-size: 20px;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #FFD700;
      letter-spacing: 3px;
    }
    .lb-item {
      display: flex;
      align-items: center;
      padding: 4px 2px;
      color: #FFF;
      font-size: 17px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { width: 60px; font-weight: bold; color: #AAA; font-size: 42px; text-align:center; }
    .lb-rank.rank-1 { color: #FFD700; font-size: 54px; }
    .lb-rank.rank-2 { color: #C0C0C0; font-size: 48px; }
    .lb-rank.rank-3 { color: #CD7F32; font-size: 45px; }
    .lb-rank.rank-other { color: #888; font-size: 39px; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 6px; font-size: 42px; }
    .lb-pts { color: #FFD700; font-weight: 900; font-size: 45px; white-space: nowrap; }
    .lb-pts-label { color: #AAA; font-weight: normal; font-size: 30px; }

    /* Info panel — правый край */
    #infoPanel {
      position: absolute;
      top: 220px;
      right: 18px;
      background: rgba(0,0,0,0.75);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 14px 18px;
      width: 340px;
      box-shadow: 0 0 16px rgba(255,255,255,0.08);
    }
    .info-title {
      color: rgba(255,255,255,0.5);
      font-size: 36px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 60px; width: 72px; text-align: center; }
    .info-desc { flex: 1; color: rgba(255,255,255,0.75); font-size: 42px; padding: 0 8px; }
    .info-val  { color: #FFD700; font-weight: 900; font-size: 48px; white-space: nowrap; }

    /* Tornado hint card */
    #tornadoHint {
      position: absolute;
      top: 430px;
      right: 18px;
      width: 340px;
      background: rgba(0,0,0,0.85);
      border: 2px solid rgba(140,110,60,0.65);
      border-radius: 16px;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 22px rgba(120,90,30,0.35);
    }
    .th-title {
      color: rgba(255,210,80,0.75);
      font-size: 30px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 900;
    }
    .th-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .th-donut  { font-size: 88px; line-height: 1; }
    .th-eq     { font-size: 54px; color: #888; font-weight: 900; }
    .th-caption {
      color: #bbb;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(180,140,60,0.5);
    }

    /* Fixed UI buttons */
    .ui-btn {
      position: fixed;
      z-index: 99999;
      width: 48px;
      height: 48px;
      font-size: 22px;
      background: rgba(0,0,0,0.7);
      color: #FFF;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .ui-btn:hover { background: rgba(255,255,255,0.15); }
    #fsBtn    { top: 16px; right: 16px; }
    #musicBtn { top: 16px; right: 72px; }
    #musicBtn.on { border-color: #00FF88; color: #00FF88; }

  </style>
</head>
<body>
<button id="musicBtn" class="ui-btn" title="Music">🎵</button>
<button id="fsBtn"    class="ui-btn" title="Fullscreen">⛶</button>
<div id="scaleWrapper">
  <canvas id="gameCanvas" width="1080" height="1920"></canvas>
  <!-- Nickname labels layer — above 3D, no fog/depth -->
  <canvas id="nameCanvas" width="1080" height="1920" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>

  <!-- Username entry overlay — shown only when no username in URL -->
  <div id="usernameOverlay" style="display:none">
    <h2>🏔️ REACH THE MOUNTAIN! 🏔️</h2>
    <p>Enter your TikTok username to connect to the stream</p>
    <input id="usernameInput" type="text" placeholder="@your_username" autocomplete="off" spellcheck="false">
    <button id="usernameBtn">▶ START</button>
    <button id="demoBtn">Run in demo mode</button>
  </div>

  <div id="ui">
    <div id="title">🏔️ REACH THE MOUNTAIN! 🏔️</div>

    <div id="statusBadge">⏳ Connecting…</div>
    <div id="timeOfDay">🌅 MORNING</div>
    <div id="timeSpeedBadge" style="
      position:absolute; top:80px; left:24px;
      font-size:18px; font-weight:bold;
      padding:6px 14px; border-radius:10px;
      border:2px solid #AAA; background:rgba(0,0,0,0.65);
      color:#AAA; white-space:nowrap; letter-spacing:1px;
    ">⏱ 1× (real time)</div>

    <div id="playerCount">PLAYERS: <span id="playerCountNum">0</span></div>

    <div id="progressWrap">
      <div id="progressLabel">PROGRESS: <span id="progressPct">0.00%</span></div>
      <div id="progressBarOuter"><div id="progressBarInner"></div></div>
    </div>

    <div id="leaderboard">
      <h3>🏆 TOP 10</h3>
      <div id="leaderboardList"></div>
    </div>

    <div id="infoPanel">
      <div class="info-title">HOW TO SCORE</div>
      <div class="info-row">
        <span class="info-icon">❤️</span>
        <span class="info-desc">100 likes</span>
        <span class="info-val">= 1 PT</span>
      </div>
      <div class="info-row">
        <span class="info-icon">🎁</span>
        <span class="info-desc">1 coin</span>
        <span class="info-val">= 2 PTS</span>
      </div>
    </div>

    <!-- Tornado hint: donut gift = tornado event -->
    <div id="tornadoHint">
      <div class="th-title">⚡ SPECIAL GIFT</div>
      <div class="th-row">
        <span class="th-donut">🍩</span>
        <span class="th-eq">=</span>
        <!-- SVG tornado drawing -->
        <svg width="78" height="98" viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="tfg" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%"   stop-color="#222220"/>
              <stop offset="60%"  stop-color="#3a3830"/>
              <stop offset="100%" stop-color="#504838"/>
            </linearGradient>
          </defs>
          <!-- Outer funnel body -->
          <path d="M4,6 C35,-5 35,-5 66,6 L43,76 C37,88 33,88 27,76 Z"
                fill="url(#tfg)" opacity="0.92"/>
          <!-- Inner dark core -->
          <path d="M27,7 C35,2 35,2 43,7 L37,75 C36,81 34,81 33,75 Z"
                fill="#0c0c0a" opacity="0.80"/>
          <!-- Swirl bands (horizontal ellipses narrowing toward ground) -->
          <ellipse cx="35" cy="17" rx="26" ry="5.5" fill="none" stroke="#6e6458" stroke-width="2.8"/>
          <ellipse cx="35" cy="29" rx="20" ry="4.5" fill="none" stroke="#6e6458" stroke-width="2.5"/>
          <ellipse cx="35" cy="40" rx="14" ry="3.8" fill="none" stroke="#625c50" stroke-width="2.2"/>
          <ellipse cx="35" cy="51" rx="9"  ry="3.2" fill="none" stroke="#585248" stroke-width="2.0"/>
          <ellipse cx="35" cy="61" rx="5.5" ry="2.5" fill="none" stroke="#504a40" stroke-width="1.8"/>
          <ellipse cx="35" cy="70" rx="3"  ry="2.0" fill="none" stroke="#484240" stroke-width="1.5"/>
          <!-- Ground dust cloud -->
          <ellipse cx="35" cy="83" rx="22" ry="7"   fill="#7a6030" opacity="0.55"/>
          <ellipse cx="35" cy="87" rx="14" ry="4.5" fill="#6a5028" opacity="0.45"/>
          <!-- Flying debris specks -->
          <circle cx="11" cy="30" r="2.0" fill="#9a8868"/>
          <circle cx="63" cy="24" r="2.0" fill="#9a8868"/>
          <circle cx="6"  cy="48" r="1.6" fill="#888060"/>
          <circle cx="66" cy="43" r="1.6" fill="#888060"/>
          <circle cx="14" cy="60" r="1.3" fill="#706050"/>
          <circle cx="59" cy="56" r="1.3" fill="#706050"/>
        </svg>
      </div>
      <div class="th-caption">🌪 TORNADO!</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="websocket.js"></script>
  <script src="leaderboard.js"></script>
  <script src="characters.js"></script>
  <script src="game.js"></script>
  <script src="music.js"></script>
</div>

<script>
  (function() {
    var wrapper = document.getElementById('scaleWrapper');

    var pinchScale  = 1;
    var pinchOffset = { x: 0, y: 0 };

    function resize() { applyTransform(); }
    function applyTransform() {
      var w = document.documentElement.clientWidth  || window.innerWidth;
      var h = document.documentElement.clientHeight || window.innerHeight;
      var baseScale  = Math.min(w / 1080, h / 1920);
      var totalScale = baseScale * pinchScale;
      var cx = (w - 1080 * totalScale) / 2 + pinchOffset.x;
      var cy = (h - 1920 * totalScale) / 2 + pinchOffset.y;
      wrapper.style.transform = 'translate(' + cx + 'px, ' + cy + 'px) scale(' + totalScale + ')';
    }

    window.addEventListener('resize', resize);

    window.addEventListener('orientationchange', function() {
      setTimeout(resize, 300);
    });

    resize();

    // ── Pinch-to-zoom ─────────────────────────────────────────────────────────
    var lastDist    = 0;
    var lastMid     = { x: 0, y: 0 };
    var isDragging  = false;
    var dragStart   = { x: 0, y: 0 };
    var MIN_ZOOM = 0.5, MAX_ZOOM = 3.0;

    function dist(t1, t2) {
      var dx = t1.clientX - t2.clientX;
      var dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }
    function mid(t1, t2) {
      return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
    }

    var wasPinching = false;

    document.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        wasPinching = true;
        lastDist = dist(e.touches[0], e.touches[1]);
        lastMid  = mid(e.touches[0], e.touches[1]);
        isDragging = false;
      } else if (e.touches.length === 1 && pinchScale > 1.05) {
        isDragging = true;
        dragStart  = { x: e.touches[0].clientX - pinchOffset.x, y: e.touches[0].clientY - pinchOffset.y };
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        isDragging = false;
        var d = dist(e.touches[0], e.touches[1]);
        var m = mid(e.touches[0], e.touches[1]);
        var delta = d / lastDist;
        pinchScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchScale * delta));
        pinchOffset.x += (m.x - lastMid.x);
        pinchOffset.y += (m.y - lastMid.y);
        lastDist = d;
        lastMid  = m;
        applyTransform();
      } else if (e.touches.length === 1 && isDragging) {
        pinchOffset.x = e.touches[0].clientX - dragStart.x;
        pinchOffset.y = e.touches[0].clientY - dragStart.y;
        applyTransform();
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (e.touches.length === 0) {
        isDragging = false;
        // Сбросить флаг пинча только когда все пальцы убраны
        // НЕ сбрасываем масштаб автоматически — фиксируем текущее положение
        setTimeout(function() { wasPinching = false; }, 400);
      }
    }, { passive: true });

    // Music button
    var musicBtn = document.getElementById('musicBtn');
    musicBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var on = Music.toggle();
      musicBtn.classList.toggle('on', on);
      musicBtn.textContent = on ? '🔊' : '🎵';
    });

    // Fullscreen button
    var fsBtn = document.getElementById('fsBtn');

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    }

    function enterFullscreen() {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (req) {
        req.call(el).then(function() {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait').catch(function(){});
          }
          setTimeout(resize, 300);
        }).catch(function(e) {
          console.log('Fullscreen error:', e);
        });
      }
    }

    function exitFullscreen() {
      var ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
      if (ex) ex.call(document);
    }

    fsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isFullscreen()) {
        exitFullscreen();
      } else {
        enterFullscreen();
      }
    });

    function updateFsBtn() {
      fsBtn.textContent = isFullscreen() ? '✕' : '⛶';
      setTimeout(resize, 300);
    }

    document.addEventListener('fullscreenchange', updateFsBtn);
    document.addEventListener('webkitfullscreenchange', updateFsBtn);
    document.addEventListener('mozfullscreenchange', updateFsBtn);
  })();
</script>
</body>
</html>
