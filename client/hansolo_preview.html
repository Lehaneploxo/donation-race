<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Han Solo Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
    h2 { margin-bottom: 6px; font-size: 20px; color: #D4A44C; letter-spacing: 2px; }
    p { margin-bottom: 18px; font-size: 12px; color: #666; }
    canvas { border: 1px solid #1a1408; border-radius: 14px; background: radial-gradient(ellipse at 50% 60%, #080604 0%, #020202 100%); }
  </style>
</head>
<body>
  <h2>🔫 ХАН СОЛО</h2>
  <p>Smuggler — Millennium Falcon</p>
  <canvas id="c" width="300" height="380"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawHanSolo(cx, cy, now) {
  ctx.save();
  ctx.translate(cx, cy);

  const bob = Math.sin(now * 0.0014) * 2.2;
  ctx.translate(0, bob);

  // Тень
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 10, 22, 5, 0, 0, Math.PI*2); ctx.fill();

  // ── НОГИ — чёрные штаны с красной полосой ──
  ctx.fillStyle = '#111118';
  ctx.beginPath(); ctx.roundRect(-13, -62, 11, 62, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2, -62, 11, 62, 3); ctx.fill();
  // Красная полоса (Imperial stripe)
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(-13, -62, 2, 62);
  ctx.fillRect(11, -62, 2, 62);

  // Сапоги
  ctx.fillStyle = '#0d0d0d';
  ctx.beginPath(); ctx.roundRect(-14, -24, 12, 24, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2, -24, 12, 24, 3); ctx.fill();
  ctx.fillStyle = '#080808';
  ctx.beginPath(); ctx.ellipse(-8, -1, 11, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, -1, 11, 5, 0, 0, Math.PI*2); ctx.fill();
  // Блеск сапог
  ctx.fillStyle = 'rgba(80,80,80,0.3)';
  ctx.beginPath(); ctx.ellipse(-10, -16, 3, 6, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -16, 3, 6, -0.1, 0, Math.PI*2); ctx.fill();

  // ── КОБУРА на правом бедре ──
  ctx.fillStyle = '#2a1a08';
  ctx.beginPath(); ctx.roundRect(10, -52, 9, 18, 2); ctx.fill();
  ctx.strokeStyle = '#1a0e04'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(10, -52, 9, 18, 2); ctx.stroke();
  // Ремешок кобуры
  ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(11, -50); ctx.lineTo(18, -48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11, -42); ctx.lineTo(18, -40); ctx.stroke();

  // ── ПОЯС ──
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.roundRect(-18, -68, 36, 8, 2); ctx.fill();
  // Пряжка
  ctx.fillStyle = '#B8860B';
  ctx.beginPath(); ctx.roundRect(-5, -68, 10, 8, 1); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.roundRect(-3, -67, 6, 5, 1); ctx.fill();

  // ── РУБАШКА (белая/кремовая) ──
  const shirtG = ctx.createLinearGradient(-18, -140, 18, -70);
  shirtG.addColorStop(0, '#d8c8a0');
  shirtG.addColorStop(0.4, '#e8d8b0');
  shirtG.addColorStop(1, '#c8b890');
  ctx.fillStyle = shirtG;
  ctx.beginPath(); ctx.roundRect(-17, -138, 34, 72, 4); ctx.fill();
  // Складки рубашки
  ctx.strokeStyle = 'rgba(150,120,70,0.25)'; ctx.lineWidth = 1;
  for(let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(-10 + i*7, -138); ctx.lineTo(-10 + i*7, -68); ctx.stroke();
  }
  // Воротник
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.moveTo(-6, -138); ctx.lineTo(-3, -148); ctx.lineTo(3, -148); ctx.lineTo(6, -138); ctx.closePath(); ctx.fill();

  // ── ЖИЛЕТ (тёмно-коричневый) ──
  const vestG = ctx.createLinearGradient(-18, -138, 18, -68);
  vestG.addColorStop(0, '#2e1e0e');
  vestG.addColorStop(0.3, '#3e2a12');
  vestG.addColorStop(0.7, '#2a1a08');
  vestG.addColorStop(1, '#1e1206');
  ctx.fillStyle = vestG;
  // Левая часть жилета
  ctx.beginPath(); ctx.moveTo(-18, -138); ctx.lineTo(-18, -68); ctx.lineTo(-2, -68); ctx.lineTo(0, -90); ctx.lineTo(-4, -138); ctx.closePath(); ctx.fill();
  // Правая часть жилета
  ctx.beginPath(); ctx.moveTo(18, -138); ctx.lineTo(18, -68); ctx.lineTo(2, -68); ctx.lineTo(0, -90); ctx.lineTo(4, -138); ctx.closePath(); ctx.fill();
  // Детали жилета — строчки
  ctx.strokeStyle = '#1a0e04'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-16, -130); ctx.lineTo(-4, -130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16, -118); ctx.lineTo(-4, -118); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16, -106); ctx.lineTo(-4, -106); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, -130); ctx.lineTo(4, -130); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, -118); ctx.lineTo(4, -118); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, -106); ctx.lineTo(4, -106); ctx.stroke();
  // Карманы жилета
  ctx.fillStyle = '#231508';
  ctx.beginPath(); ctx.roundRect(-16, -96, 11, 14, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(5, -96, 11, 14, 2); ctx.fill();
  ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.roundRect(-16, -96, 11, 14, 2); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(5, -96, 11, 14, 2); ctx.stroke();

  // ── ПЛЕЧИ ──
  ctx.fillStyle = '#2a1a08';
  ctx.beginPath(); ctx.ellipse(-22, -126, 11, 8, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22, -126, 11, 8, -0.15, 0, Math.PI*2); ctx.fill();

  // ── ЛЕВАЯ РУКА (свободна) ──
  const armSwing = Math.sin(now * 0.0016) * 4;
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.roundRect(-32, -136 - armSwing, 12, 50, 4); ctx.fill();
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.ellipse(-26, -88 - armSwing, 7, 7, 0, 0, Math.PI*2); ctx.fill();
  // Пальцы
  ctx.strokeStyle = '#f0ccaa'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for(let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-23 + i*2.5, -83 - armSwing);
    ctx.lineTo(-23 + i*2.5, -77 - armSwing);
    ctx.stroke();
  }

  // ── ПРАВАЯ РУКА (держит бластер) ──
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.roundRect(20, -136, 12, 48, 4); ctx.fill();
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.ellipse(26, -91, 7, 7, 0, 0, Math.PI*2); ctx.fill();

  // ── БЛАСТЕР DL-44 ──
  ctx.save();
  ctx.translate(26, -104);
  ctx.rotate(-0.15);
  // Основной корпус
  ctx.fillStyle = '#222228';
  ctx.beginPath(); ctx.roundRect(-4, -6, 22, 8, 2); ctx.fill();
  // Ствол
  ctx.fillStyle = '#1a1a20';
  ctx.beginPath(); ctx.roundRect(14, -4, 14, 4, 1); ctx.fill();
  // Конец ствола — глушитель (характерная деталь DL-44)
  ctx.fillStyle = '#111116';
  ctx.beginPath(); ctx.roundRect(26, -5, 6, 6, 3); ctx.fill();
  // Рукоятка
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.roundRect(-2, 0, 8, 14, 2); ctx.fill();
  ctx.fillStyle = '#2a1a08';
  ctx.beginPath(); ctx.roundRect(-1, 1, 6, 12, 1); ctx.fill();
  // Насечки рукоятки
  ctx.strokeStyle = '#1a0e04'; ctx.lineWidth = 0.7;
  for(let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(-1, 3 + i*2.5); ctx.lineTo(5, 3 + i*2.5); ctx.stroke();
  }
  // Прицел
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.roundRect(4, -9, 6, 4, 1); ctx.fill();
  // Кнопка курка
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.arc(4, 0, 2, 0, Math.PI*2); ctx.fill();
  // Блеск металла
  ctx.fillStyle = 'rgba(150,150,180,0.2)';
  ctx.beginPath(); ctx.roundRect(-4, -6, 22, 2, 1); ctx.fill();
  // Свечение ствола (заряженный)
  const blasterGlow = 0.3 + Math.sin(now * 0.002) * 0.15;
  ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 8 * blasterGlow;
  ctx.fillStyle = `rgba(255,80,0,${blasterGlow * 0.6})`;
  ctx.beginPath(); ctx.arc(29, -2, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── ГОЛОВА ──
  // Шея
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.roundRect(-6, -152, 12, 16, 2); ctx.fill();

  // ── ВОЛОСЫ — рисуем ПЕРВЫМИ, лицо поверх ──
  const hairG = ctx.createLinearGradient(-14, -194, 14, -155);
  hairG.addColorStop(0, '#6b3a18');
  hairG.addColorStop(0.35, '#7e4820');
  hairG.addColorStop(0.7, '#5c3010');
  hairG.addColorStop(1, '#4a2808');
  // Основная форма — зачёсаны назад, плоский верх, боковой пробор
  ctx.fillStyle = hairG;
  ctx.beginPath();
  ctx.moveTo(-20, -170);
  ctx.bezierCurveTo(-22, -188, -14, -196, -4, -195); // левая сторона вверх
  ctx.bezierCurveTo(4, -197, 18, -192, 20, -178);    // верх правее — зачёсано вправо
  ctx.bezierCurveTo(22, -168, 18, -158, 14, -153);   // правая сторона вниз
  ctx.bezierCurveTo(4, -150, -8, -152, -18, -160);   // низ
  ctx.bezierCurveTo(-22, -164, -22, -168, -20, -170);
  ctx.closePath(); ctx.fill();

  // Пробор слева — тёмная линия
  ctx.strokeStyle = '#3a1e08'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-10, -195); ctx.bezierCurveTo(-8, -188, -6, -182, -4, -174); ctx.stroke();

  // Текстура волос — горизонтальные штрихи (зачёс)
  ctx.strokeStyle = 'rgba(40,18,4,0.28)'; ctx.lineWidth = 1; ctx.lineCap = 'round';
  [[-14,-190,8,-191],[-16,-184,10,-186],[-17,-178,12,-180],[-18,-172,12,-174]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo((x1+x2)/2,y1-1,x2,y2); ctx.stroke();
  });

  // Боковые пряди — узкие, прилегающие
  ctx.fillStyle = '#4a2808';
  ctx.beginPath(); ctx.moveTo(-20, -176); ctx.bezierCurveTo(-26, -168, -26, -158, -20, -153); ctx.bezierCurveTo(-17, -157, -17, -168, -20, -176); ctx.fill();
  ctx.beginPath(); ctx.moveTo(20, -174); ctx.bezierCurveTo(26, -166, 25, -156, 19, -152); ctx.bezierCurveTo(16, -156, 17, -166, 20, -174); ctx.fill();

  // Блик — смещён к правой стороне (куда зачёсаны)
  ctx.fillStyle = 'rgba(160,100,40,0.20)';
  ctx.beginPath(); ctx.ellipse(6, -189, 7, 3, -0.4, 0, Math.PI*2); ctx.fill();

  // ── ЛИЦО поверх волос ──
  ctx.fillStyle = '#fde8c8';
  ctx.beginPath(); ctx.ellipse(0, -168, 17, 20, 0, 0, Math.PI*2); ctx.fill();

  // Уши
  ctx.fillStyle = '#fad8b0';
  ctx.beginPath(); ctx.ellipse(-17, -167, 4, 6, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(17, -167, 4, 6, -0.1, 0, Math.PI*2); ctx.fill();


  // Лёгкая щетина
  ctx.fillStyle = 'rgba(100,60,20,0.09)';
  ctx.beginPath(); ctx.ellipse(-5, -158, 5, 4, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -158, 5, 4, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -155, 7, 3.5, 0, 0, Math.PI*2); ctx.fill();

  // ── ГЛАЗА ──
  // Белки
  ctx.fillStyle = '#e8dcc8';
  ctx.beginPath(); ctx.ellipse(-7, -169, 5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -169, 5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  // Радужки (карие)
  ctx.fillStyle = '#5a3010';
  ctx.beginPath(); ctx.ellipse(-7, -169, 3, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -169, 3, 3, 0, 0, Math.PI*2); ctx.fill();
  // Зрачки
  ctx.fillStyle = '#1a0e00';
  ctx.beginPath(); ctx.ellipse(-7, -169, 1.5, 1.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -169, 1.5, 1.5, 0, 0, Math.PI*2); ctx.fill();
  // Блик в глазах
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath(); ctx.arc(-8.2, -170.2, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.8, -170.2, 1, 0, Math.PI*2); ctx.fill();
  // Брови (тёмные, немного нахмурены)
  ctx.fillStyle = '#4a2808';
  ctx.beginPath(); ctx.roundRect(-11, -174, 8, 2.5, 1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3, -174, 8, 2.5, 1); ctx.fill();
  // Правая бровь чуть приподнята (характерный прищур)
  ctx.save(); ctx.translate(7, -174); ctx.rotate(-0.08);
  ctx.fillStyle = '#4a2808';
  ctx.beginPath(); ctx.roundRect(-4, 0, 8, 2.5, 1); ctx.fill();
  ctx.restore();

  // Нос
  ctx.strokeStyle = '#a08050'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2, -165); ctx.lineTo(-4, -161); ctx.lineTo(-1, -160); ctx.stroke();

  // ── УХМЫЛКА (signature smirk) ──
  ctx.strokeStyle = '#8a5c28'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-7, -157);
  ctx.quadraticCurveTo(-2, -155, 5, -157);
  ctx.stroke();
  // Левый уголок рта чуть ниже — ухмылка
  ctx.beginPath();
  ctx.moveTo(-7, -157);
  ctx.quadraticCurveTo(-8, -155, -6, -154);
  ctx.stroke();

  ctx.restore();
}

// Подписи
function drawLabels(now) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 11px Arial Black';

  // HP bar
  const hp = 0.72 + Math.sin(now * 0.0005) * 0.01;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(150 - 34, 46, 68, 9, 3); ctx.fill();
  ctx.fillStyle = '#22CC44';
  ctx.beginPath(); ctx.roundRect(150 - 33, 47, 66 * hp, 7, 2); ctx.fill();

  // Никнейм
  ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 3;
  ctx.strokeText('HanSolo77', 150, 44);
  ctx.fillStyle = '#FFD700'; ctx.fillText('HanSolo77', 150, 44);

  // Иконки статов
  ctx.font = '11px Arial';
  const stats = ['❤️ 380', '🔫 34', '💀 19'];
  stats.forEach((s, i) => {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(150 - 34 + i*23, 58, 22, 13, 3); ctx.fill();
    ctx.fillStyle = '#ccc'; ctx.font = '9px Arial';
    ctx.fillText(s, 150 - 23 + i*23, 68);
  });
  ctx.restore();
}

// Loop
function loop(ts) {
  ctx.clearRect(0, 0, 300, 380);
  drawHanSolo(150, 290, ts);
  drawLabels(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
