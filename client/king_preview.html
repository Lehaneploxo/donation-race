<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>👑 King Avatar Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #FFD700; }
    h2 { margin-bottom: 10px; font-size: 22px; letter-spacing: 2px; }
    p  { margin-bottom: 20px; font-size: 13px; color: #888; }
    canvas { border: 1px solid #333; border-radius: 12px; background: radial-gradient(ellipse at 50% 60%, #1a0a2e 0%, #050510 100%); }
  </style>
</head>
<body>
  <h2>👑 ТОП-1 ИГРОК — КОРОЛЬ</h2>
  <p>Превью аватара. Реальный размер в игре будет пропорциональным.</p>
  <canvas id="c" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let t = 0;

function drawKing(cx, cy, scale, now) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const idleBob = Math.sin(now * 0.002) * 3;
  ctx.translate(0, idleBob);

  // ── Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, 22, 24, 7, 0, 0, Math.PI * 2); ctx.fill();

  // ── Royal Cape (за спиной)
  ctx.fillStyle = '#6600AA';
  ctx.beginPath();
  ctx.moveTo(-18, -48);
  ctx.lineTo(-26, 18);
  ctx.lineTo(0, 26);
  ctx.lineTo(26, 18);
  ctx.lineTo(18, -48);
  ctx.fill();
  // Cape trim (золото)
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-18, -48);
  ctx.lineTo(-26, 18);
  ctx.lineTo(0, 26);
  ctx.lineTo(26, 18);
  ctx.lineTo(18, -48);
  ctx.stroke();
  // Cape ermine spots
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for(let i = 0; i < 6; i++){
    const bx = -16 + (i % 3) * 16;
    const by = -10 + Math.floor(i / 3) * 18;
    ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fill();
  }

  // ── Legs
  ctx.strokeStyle = '#3a1a6a'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(-7, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -2); ctx.lineTo(7, 22); ctx.stroke();
  // Boots
  ctx.strokeStyle = '#1a0a3a'; ctx.lineWidth = 10;
  ctx.beginPath(); ctx.moveTo(-7, 14); ctx.lineTo(-8, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7, 14); ctx.lineTo(8, 22); ctx.stroke();

  // ── Royal Robe (торс)
  ctx.fillStyle = '#7700CC';
  ctx.beginPath();
  ctx.moveTo(-16, -46);
  ctx.lineTo(16, -46);
  ctx.lineTo(19, -2);
  ctx.lineTo(-19, -2);
  ctx.closePath();
  ctx.fill();

  // Robe gold trim lines
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -46); ctx.lineTo(0, -2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16, -26); ctx.lineTo(16, -26); ctx.stroke();
  // Gold emblem (diamond)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(0, -40); ctx.lineTo(6, -32); ctx.lineTo(0, -24); ctx.lineTo(-6, -32);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF2266';
  ctx.beginPath(); ctx.arc(0, -32, 3, 0, Math.PI * 2); ctx.fill();

  // ── Shoulders (pauldrons)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(-18, -38, 9, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(18, -38, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#CC8800';
  ctx.beginPath(); ctx.arc(-18, -38, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(18, -38, 5, 0, Math.PI * 2); ctx.fill();

  // ── Arms
  ctx.strokeStyle = '#7700CC'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-15, -36); ctx.lineTo(-22, -18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(15, -36); ctx.lineTo(22, -18); ctx.stroke();

  // ── Scepter (правая рука)
  ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(22, -18); ctx.lineTo(28, 24); ctx.stroke();
  // Scepter top orb
  const hue = (now / 8) % 360;
  ctx.fillStyle = `hsl(${hue}, 90%, 60%)`;
  ctx.shadowColor = `hsl(${hue}, 90%, 60%)`;
  ctx.shadowBlur = 14;
  ctx.beginPath(); ctx.arc(22, -22, 9, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(19, -25, 3, 0, Math.PI * 2); ctx.fill();
  // Scepter cross piece
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(16, -10); ctx.lineTo(30, -10); ctx.stroke();

  // ── Shield (левая рука)
  ctx.fillStyle = '#4400AA';
  ctx.beginPath();
  ctx.moveTo(-22, -26);
  ctx.lineTo(-36, -18);
  ctx.lineTo(-36, 2);
  ctx.lineTo(-22, 8);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
  ctx.stroke();
  // Shield emblem
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(-29, -9, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#CC0033';
  ctx.beginPath(); ctx.arc(-29, -9, 2, 0, Math.PI * 2); ctx.fill();

  // ── Head
  const sk = '#F9C784';
  ctx.beginPath(); ctx.arc(0, -58, 13, 0, Math.PI * 2);
  ctx.fillStyle = sk; ctx.fill();

  // Beard
  ctx.fillStyle = '#C8A050';
  ctx.beginPath();
  ctx.moveTo(-8, -50); ctx.quadraticCurveTo(-10, -36, -6, -30);
  ctx.lineTo(0, -28); ctx.lineTo(6, -30);
  ctx.quadraticCurveTo(10, -36, 8, -50);
  ctx.fill();
  // Beard highlight
  ctx.fillStyle = '#E8C070';
  ctx.beginPath();
  ctx.moveTo(-3, -48); ctx.quadraticCurveTo(-3, -36, 0, -30);
  ctx.quadraticCurveTo(3, -36, 3, -48);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4.5, -60, 3.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.5, -60, 3.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a8a';
  ctx.beginPath(); ctx.arc(-4, -60, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -60, 1.8, 0, Math.PI * 2); ctx.fill();
  // Eye shine
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.arc(-3.2, -61, 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.8, -61, 0.7, 0, Math.PI * 2); ctx.fill();

  // Eyebrows (thick royal)
  ctx.strokeStyle = '#7a4010'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-7.5, -64); ctx.lineTo(-1.5, -63); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1.5, -63); ctx.lineTo(7.5, -64); ctx.stroke();

  // Mustache
  ctx.fillStyle = '#C8A050';
  ctx.beginPath(); ctx.moveTo(-7, -54); ctx.quadraticCurveTo(-4, -51, 0, -53); ctx.quadraticCurveTo(4, -51, 7, -54); ctx.lineTo(5, -55); ctx.quadraticCurveTo(0, -52, -5, -55); ctx.closePath(); ctx.fill();

  // ── CROWN ──────────────────────────────────
  ctx.fillStyle = '#FFD700';
  // Crown base band
  ctx.beginPath();
  ctx.rect(-14, -74, 28, 8);
  ctx.fill();
  // Crown spikes (5 tips)
  ctx.beginPath();
  // Left spike
  ctx.moveTo(-14, -74);
  ctx.lineTo(-10, -90);
  ctx.lineTo(-6, -74);
  // Middle-left
  ctx.lineTo(-3, -74);
  ctx.lineTo(0, -94); // tallest center spike
  ctx.lineTo(3, -74);
  // Middle-right
  ctx.lineTo(6, -74);
  ctx.lineTo(10, -90);
  ctx.lineTo(14, -74);
  ctx.closePath();
  ctx.fill();

  // Crown outline
  ctx.strokeStyle = '#CC8800'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-14, -74);
  ctx.lineTo(-10, -90);
  ctx.lineTo(-6, -74);
  ctx.lineTo(-3, -74);
  ctx.lineTo(0, -94);
  ctx.lineTo(3, -74);
  ctx.lineTo(6, -74);
  ctx.lineTo(10, -90);
  ctx.lineTo(14, -74);
  ctx.stroke();

  // Crown gems
  // Center ruby (large)
  ctx.fillStyle = '#FF2244';
  ctx.shadowColor = '#FF2244'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(0, -88, 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-1.5, -90, 1.5, 0, Math.PI * 2); ctx.fill();

  // Side sapphires
  ctx.fillStyle = '#2266FF';
  ctx.shadowColor = '#4488FF'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-10, -84, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -84, 3, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-11, -85.5, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -85.5, 1, 0, Math.PI * 2); ctx.fill();

  // Crown base gems (band)
  const bandGems = [
    { x: -10, col: '#00CC66' },
    { x: -4,  col: '#FF8800' },
    { x: 4,   col: '#FF8800' },
    { x: 10,  col: '#00CC66' },
  ];
  for(const g of bandGems){
    ctx.fillStyle = g.col;
    ctx.shadowColor = g.col; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(g.x, -70, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── Crown glow aura (анимированная)
  const glowAlpha = 0.15 + Math.sin(now * 0.003) * 0.08;
  ctx.fillStyle = `rgba(255, 215, 0, ${glowAlpha})`;
  ctx.beginPath(); ctx.ellipse(0, -80, 22, 28, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawLabels(cx, cy, scale, now) {
  ctx.save();
  ctx.translate(cx, cy - 110 * scale);
  ctx.textAlign = 'center';

  // 👑 badge
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 10;
  ctx.fillText('👑 ТОП-1', 0, -10);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 15px Arial';
  ctx.strokeStyle = 'rgba(0,0,0,0.95)'; ctx.lineWidth = 3.5;
  ctx.strokeText('KingPlayer', 0, 10);
  ctx.fillStyle = '#FFD700';
  ctx.fillText('KingPlayer', 0, 10);

  ctx.font = 'bold 12px Arial';
  ctx.strokeText('❤️ 500', 0, 27);
  ctx.fillStyle = '#FF6688'; ctx.fillText('❤️ 500', 0, 27);

  ctx.strokeText('⚔️ 50', 0, 42);
  ctx.fillStyle = '#88CCFF'; ctx.fillText('⚔️ 50', 0, 42);

  ctx.strokeText('☠️ 35', 0, 57);
  ctx.fillStyle = '#FF4444'; ctx.fillText('☠️ 35', 0, 57);

  ctx.restore();
}

function render(now) {
  ctx.clearRect(0, 0, 400, 400);

  // Arena floor hint
  ctx.fillStyle = 'rgba(60,30,90,0.25)';
  ctx.beginPath(); ctx.ellipse(200, 310, 120, 40, 0, 0, Math.PI * 2); ctx.fill();

  drawKing(200, 290, 2.0, now);
  drawLabels(200, 290, 2.0, now);

  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
