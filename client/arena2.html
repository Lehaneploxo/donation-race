<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚔️ Arena Battle 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Arial Black', Arial, sans-serif; }
    #wrap { position: absolute; transform-origin: top left; }
    canvas { display: block; }
    .ui-btn { position: fixed; z-index: 99999; width: 26px; height: 26px; font-size: 12px; background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #fsBtn   { top: calc(50% + 36px); right: 10px; }
    #backBtn { top: calc(50% - 13px); right: 10px; }
    #addBotBtn { top: calc(50% + 85px); right: 10px; }
    #ratingBtn { top: calc(50% + 134px); right: 10px; }
    #statusBadge { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); font-size: 13px; padding: 4px 13px; border-radius: 8px; border: 2px solid #555; background: rgba(0,0,0,0.78); color: #AAA; white-space: nowrap; z-index: 100; display: none; }
    #statusBadge.live  { color: #00FF88; border-color: #00FF88; }
    #statusBadge.demo  { color: #FF9900; border-color: #FF9900; }
    #statusBadge.error { color: #FF4444; border-color: #FF4444; }
    #kingOverlay { position:fixed; top:0; left:0; right:0; bottom:0; z-index:50; pointer-events:none; display:none; text-align:center; }
    #kingOverlay.show { display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #kingOverlay.hiding { display:flex; flex-direction:column; align-items:center; justify-content:center; animation:_kvOut 0.5s forwards; }
    @keyframes _kvOut { to { opacity:0; transform:translateY(-10px); } }
    ._ke { font-size:13px; letter-spacing:5px; color:rgba(220,150,0,0.9); text-transform:uppercase; margin-bottom:7px; text-shadow:0 0 10px rgba(255,180,0,0.7); opacity:0; animation:_kfsd 0.4s 0.1s forwards; }
    ._kt { font-size:38px; font-weight:900; letter-spacing:4px; line-height:1.15; color:#FFD700; text-shadow:0 0 12px rgba(255,215,0,1),0 0 28px rgba(255,180,0,0.9); opacity:0; animation:_kfsd 0.4s 0.3s forwards; }
    ._ks { font-size:14px; letter-spacing:8px; color:#FF3300; text-transform:uppercase; margin-top:3px; opacity:0; animation:_kfsd 0.4s 0.55s forwards; }
    ._kd { font-size:15px; letter-spacing:10px; color:rgba(255,215,0,0.4); margin:8px 0 5px; opacity:0; animation:_kfsd 0.4s 0.7s forwards; }
    ._kn { font-size:32px; font-weight:900; letter-spacing:3px; color:#fff; text-shadow:0 0 10px #fff,0 0 22px rgba(255,100,0,1); opacity:0; animation:_knp 0.65s 0.85s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
    ._kb { font-size:11px; letter-spacing:4px; color:rgba(255,215,0,0.6); text-transform:uppercase; margin-top:9px; opacity:0; animation:_kfsd 0.4s 1.15s forwards; }
    @keyframes _kfsd { from{opacity:0;transform:translateY(-11px)} to{opacity:1;transform:translateY(0)} }
    @keyframes _knp   { from{opacity:0;transform:scale(0.35)} to{opacity:1;transform:scale(1)} }

  </style>
</head>
<body>
<button id="fsBtn"    class="ui-btn" title="Fullscreen">⛶</button>
<button id="backBtn"  class="ui-btn" title="Back">⌂</button>
<button id="addBotBtn" class="ui-btn" title="Add bot">🤖</button>
<button id="ratingBtn" class="ui-btn" title="Show rating">📊</button>
<div id="statusBadge">⏳ Connecting…</div>

<div id="ratingOverlay" style="position:fixed;top:31%;right:5px;z-index:200;pointer-events:none;display:none;background:rgba(0,0,0,0.85);border:2px solid rgba(255,215,0,0.4);border-top:none;border-radius:0 0 10px 10px;padding:8px 10px 10px;font-family:Arial,sans-serif;min-width:180px;text-align:center;"></div>
<div id="kingOverlay">
  <div class="_ke">⚔️ &nbsp; ARENA BATTLE &nbsp; ⚔️</div>
  <div class="_kt">👑 &nbsp; KING OF THE ARENA &nbsp; 👑</div>
  <div class="_ks">— &nbsp; HAS ARRIVED &nbsp; —</div>
  <div class="_kd">· · · · · · · · · · · · · ·</div>
  <div class="_kn" id="kingArenaName">★ &nbsp; PLAYER &nbsp; ★</div>
  <div class="_kb">💀 &nbsp; TOP KILLER &nbsp; · &nbsp; #1 RANKING &nbsp; 💀</div>
</div>
<div id="wrap">
  <canvas id="c" width="600" height="1000"></canvas>
</div>
<script>
'use strict';
const CW = 600, CH = 1000;
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');


// ── Constants ────────────────────────────────────────
const SKY_H = 190;

// ── Character helpers ─────────────────────────────────
function d2r(d) { return d * Math.PI / 180; }
function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
function lerp(a,b,t) { return a + (b-a)*clamp(t,0,1); }
function easeInOut(t) { t=clamp(t,0,1); return t*t*(3-2*t); }

function capsule(x1,y1,x2,y2,r,color,strokeColor,strokeW) {
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<0.5){ctx.beginPath();ctx.arc(x1,y1,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();return;}
  const nx=-dy/len,ny=dx/len,ang=Math.atan2(dy,dx);
  ctx.beginPath();
  ctx.moveTo(x1+nx*r,y1+ny*r);ctx.lineTo(x2+nx*r,y2+ny*r);
  ctx.arc(x2,y2,r,ang-Math.PI/2,ang+Math.PI/2);
  ctx.lineTo(x1-nx*r,y1-ny*r);ctx.arc(x1,y1,r,ang+Math.PI/2,ang-Math.PI/2);
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
  if(strokeColor){ctx.strokeStyle=strokeColor;ctx.lineWidth=strokeW||1;ctx.stroke();}
}

function limbEnd(px,py,angleRad,len){
  return{x:px+Math.sin(angleRad)*len, y:py+Math.cos(angleRad)*len};
}

// ── Sound Engine ─────────────────────────────────────
let _actx=null; const _scd={};
function getACtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume();return _actx;}
function _ok(k,ms){const n=Date.now();if(n-(_scd[k]||0)<ms)return false;_scd[k]=n;return true;}
function _noise(ctx,d){const n=Math.floor(ctx.sampleRate*d),b=ctx.createBuffer(1,n,ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<n;i++)a[i]=Math.random()*2-1;return b;}
function playSpawn(){if(!_ok('spawn',250))return;try{const ctx=getACtx();[523,659,784].forEach((f,i)=>{const t=ctx.currentTime+i*0.09,o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.31);});}catch(e){}}
function playRemove(){if(!_ok('remove',300))return;try{const ctx=getACtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(80,t+0.35);g.gain.setValueAtTime(0.28,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.38);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.4);}catch(e){}}
function playHelp(){try{const ctx=getACtx();[659,880,1047].forEach((f,i)=>{const t=ctx.currentTime+i*0.08,o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.25);});}catch(e){}}
function playArmageddon(){try{const ctx=getACtx(),t=ctx.currentTime,o=ctx.createOscillator(),g1=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(55,t);o.frequency.linearRampToValueAtTime(75,t+1.8);g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(0.5,t+0.4);g1.gain.linearRampToValueAtTime(0,t+2.2);o.connect(g1);g1.connect(ctx.destination);o.start(t);o.stop(t+2.4);}catch(e){}}
function playMeteorWhoosh(){if(!_ok('mwh',350))return;try{const ctx=getACtx(),t=ctx.currentTime,s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();f.type='bandpass';f.Q.value=2;f.frequency.setValueAtTime(4500,t);f.frequency.exponentialRampToValueAtTime(700,t+0.4);s.buffer=_noise(ctx,0.45);s.connect(f);f.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);s.start(t);}catch(e){}}
function playHit(){if(!_ok('hit',110))return;try{const ctx=getACtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.setValueAtTime(190,t);o.frequency.exponentialRampToValueAtTime(65,t+0.13);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.18);}catch(e){}}
function playVictory(){try{const ctx=getACtx();[523,659,784,1047].forEach((f,i)=>{const t=ctx.currentTime+i*0.18,o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.55);});}catch(e){}}
function playFootstep(){if(!_ok('step',260))return;try{const ctx=getACtx(),t=ctx.currentTime,s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=180+Math.random()*80;f.Q.value=1.2;s.buffer=_noise(ctx,0.07);s.connect(f);f.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.07);s.start(t);}catch(e){}}
function playWhoosh(){if(!_ok('whoosh',400))return;try{const ctx=getACtx(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(520,t);o.frequency.exponentialRampToValueAtTime(220,t+0.18);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.22);}catch(e){}}
function playKill(){if(!_ok('kill',300))return;try{const ctx=getACtx();[440,554,659].forEach((f,i)=>{const t=ctx.currentTime+i*0.07,o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.22);});}catch(e){}}
function playPickupSpawn(){try{const ctx=getACtx();[1047,1319,1568].forEach((f,i)=>{const t=ctx.currentTime+i*0.07,o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.22);});}catch(e){}}
function playPickupHeart(){try{const ctx=getACtx();[0,0.2].forEach(delay=>{const t=ctx.currentTime+delay,o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(60,t+0.13);g.gain.setValueAtTime(0.38,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.2);});}catch(e){}}
function playPickupPower(){try{const ctx=getACtx(),t=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(900,t+0.22);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.28);const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='square';o2.frequency.setValueAtTime(240,t+0.18);o2.frequency.exponentialRampToValueAtTime(80,t+0.38);g2.gain.setValueAtTime(0.32,t+0.18);g2.gain.exponentialRampToValueAtTime(0.001,t+0.42);o2.connect(g2);g2.connect(ctx.destination);o2.start(t+0.18);o2.stop(t+0.45);}catch(e){}}
function playPickupBomb(){try{const ctx=getACtx(),t=ctx.currentTime;const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=900;s.buffer=_noise(ctx,0.55);s.connect(f);f.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(0.65,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.55);s.start(t);const o=ctx.createOscillator(),g2=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(22,t+0.55);g2.gain.setValueAtTime(0.55,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.connect(g2);g2.connect(ctx.destination);o.start(t);o.stop(t+0.65);}catch(e){}}

// ── Game State ───────────────────────────────────────
const MAX_WARRIORS = 20;
let warriors=[], particles=[], meteors=[], dmgNums=[];
let uidSeq=0, totalLikes=0, armageddon=null;
let eventLabel='', eventLabelTimer=0;
let pickups=[], pickupSpawnTimer=12000, nextPickupId=0;
let ratingLabel='', ratingLabelTimer=0;
let _dbgGifts=0,_dbgLikes=0;
let victoryState=null, botSpawnTimer=20000;
let topKillers=[], teamRegistry=new Map();
let nextKillsTarget=20, lastT=0, gameTime=0.38;
const BOT_NAMES=['dark_wolf99','fire_blade','shadow_x','night_storm','iron_fist','blaze_run','void_edge','steel_claw','red_ghost','swift_axe','cold_viper','mad_titan','lone_wolf','fury_wave','black_hawk','storm_eye','grim_edge','bone_crusher','death_note','ice_fang','war_raven','sun_blade','moon_fury','dark_tide','fire_storm','thunder_x','rock_solid','sharp_mind','wild_boar','eagle_eye'];
let usedBotNames=[];

// ── Warrior Management ───────────────────────────────
function rndFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
// Зона движения: весь экран от низа HUD до дна канваса
// ax: -1..1 → x: 300 ± 285  (20..580)
// ay: -1..1 → y: 640 ± 330  (310..970)
const PLAY_CX=300, PLAY_CY=640, PLAY_RX=285, PLAY_RY=330;
function rndArenaPos(){return{ax:(Math.random()*2-1)*0.96,ay:(Math.random()*2-1)*0.96};}
function arenaToScreen(ax,ay){return{x:PLAY_CX+ax*PLAY_RX, y:PLAY_CY+ay*PLAY_RY};}
function getWarriorScale(coins){return 1.3+Math.min(1.1,Math.log10(Math.max(1,coins))*0.38);}
function makeWarrior(username,coins,isBot=false){
  const pos=rndArenaPos(),tgt=rndArenaPos();
  return{id:++uidSeq,username,coins,hp:500,maxHp:coins*10+500,damage:coins,
    class:username.includes('Metsuki Sutemi')?'samurai':username.includes('Leha Neploxo')?'cossack':['spearman','conan','terminator','fan_warrior','dark_mage','pirate','knight'][Math.floor(Math.random()*7)],
    ax:pos.ax,ay:pos.ay,tax:tgt.ax,tay:tgt.ay,
    walkTimer:Math.random()*2000,walkDelay:2000+Math.random()*2500,
    walkPhase:Math.random()*Math.PI*2,idlePhase:Math.random()*Math.PI*2,
    dead:false,deathTimer:0,flashTimer:0,glowTimer:0,
    floatY:0,floatVY:0,attackAnim:0,hitAnim:0,
    bumpCooldown:2000,kills:0,team:0,
    lastActivityTime:Date.now(),idleDrainAcc:0,isBot:false};
}
function addWarrior(username,coins){
  coins=Math.max(1,Math.floor(coins));
  const ex=warriors.find(w=>w.username===username&&!w.dead);
  if(ex){if(ex.isBot)return;ex.coins+=coins;ex.maxHp=ex.coins*10;ex.hp=Math.min(ex.hp+coins*10,ex.maxHp);ex.damage+=coins;ex.flashTimer=600;ex.glowTimer=800;spawnUpgradeFX(ex);return;}
  if(warriors.filter(w=>!w.dead).length>=MAX_WARRIORS){const weakest=warriors.filter(w=>!w.dead).sort((a,b)=>a.coins-b.coins)[0];weakest.dead=true;weakest.deathTimer=600;spawnDeathFX(weakest);playRemove();}
  const w=makeWarrior(username,coins);
  if(teamRegistry.has(username)){w.team=teamRegistry.get(username);teamRegistry.delete(username);}
  warriors.push(w);playSpawn();spawnSpawnFX(w);
}
function helpWarrior(username){
  const w=warriors.find(w=>w.username===username&&!w.dead);
  if(!w){addWarrior(username,1);return;}
  if(w.isBot)return;
  w.coins+=1;w.maxHp=w.coins*10+500;w.hp=Math.min(w.hp+10,w.maxHp);w.damage+=1;w.flashTimer=350;w.glowTimer=600;spawnUpgradeFX(w);playHelp();
}
function resetActivity(username){const w=warriors.find(w=>w.username===username&&!w.dead);if(w){w.lastActivityTime=Date.now();w.idleDrainAcc=0;}}
function getBotName(){const available=BOT_NAMES.filter(n=>!warriors.find(w=>w.username===n));if(!available.length){usedBotNames=[];return BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];}return available[Math.floor(Math.random()*available.length)];}

// ── Armageddon ───────────────────────────────────────
function triggerArmageddon(){
  const type=rndFrom(['meteor','tornado','flood']);
  armageddon={type,timer:5000,dmgAcc:0,tornadoX:AX+(Math.random()-0.5)*320,tornadoY:AY+(Math.random()-0.5)*180,tornadoAngle:0,floodLevel:0,rainDrops:[]};
  eventLabel={meteor:'☄️ METEOR RAIN!',tornado:'🌪️ TORNADO!',flood:'🌊 FLOOD!'}[type];
  eventLabelTimer=5500;playArmageddon();
}
function spawnMeteor(){meteors.push({x:40+Math.random()*(CW-80),y:-50-Math.random()*120,vx:(Math.random()-0.5)*70,vy:380+Math.random()*220,r:7+Math.random()*9,trail:[],life:2200});}
function updateArmageddon(dt){
  if(!armageddon)return;
  armageddon.timer-=dt;armageddon.dmgAcc+=dt;
  if(armageddon.type==='meteor'){if(Math.random()<dt/220){spawnMeteor();playMeteorWhoosh();}}
  else if(armageddon.type==='tornado'){armageddon.tornadoAngle+=dt*0.004;for(const w of warriors){if(w.dead)continue;const sp=arenaToScreen(w.ax,w.ay);const dx=armageddon.tornadoX-sp.x,dy=armageddon.tornadoY-sp.y;if(Math.sqrt(dx*dx+dy*dy)<220){w.floatVY-=dt*0.00025;w.floatY+=w.floatVY*dt;if(w.floatY<-60)w.floatVY=Math.abs(w.floatVY)*0.5;}}}
  else if(armageddon.type==='flood'){armageddon.floodLevel=Math.min(0.65,(5000-armageddon.timer)/5000*0.65);if(Math.random()<dt/60)armageddon.rainDrops.push({x:Math.random()*CW,y:-10,vy:420+Math.random()*180,life:800});for(const rd of armageddon.rainDrops){rd.y+=rd.vy*dt/1000;rd.life-=dt;}armageddon.rainDrops=armageddon.rainDrops.filter(r=>r.life>0&&r.y<CH);}
  if(armageddon.dmgAcc>=1000){armageddon.dmgAcc-=1000;for(const w of warriors){if(w.dead)continue;w.hp=Math.max(0,w.hp-10);w.damage=Math.max(1,w.damage-1);w.flashTimer=280;const sp=arenaToScreen(w.ax,w.ay);spawnDmgNum(sp.x,sp.y-55,-10,'#FF8800');if(w.hp<=0){w.dead=true;w.deathTimer=700;spawnDeathFX(w);playRemove();}}checkVictory();}
  for(const w of warriors){if(w.floatY<0&&!w.dead){w.floatVY+=dt*0.0005;w.floatY+=w.floatVY*dt;if(w.floatY>=0){w.floatY=0;w.floatVY=0;}}}
  for(const m of meteors){m.x+=m.vx*dt/1000;m.y+=m.vy*dt/1000;m.life-=dt;m.trail.push({x:m.x,y:m.y});if(m.trail.length>8)m.trail.shift();if(m.y>CH+50)m.life=0;}
  meteors=meteors.filter(m=>m.life>0);
  if(armageddon.timer<=0){meteors=[];armageddon=null;}
}

// ── Victory ──────────────────────────────────────────
function checkVictory(){
  if(victoryState)return;
  const winner=warriors.find(w=>!w.dead&&w.kills>=nextKillsTarget);
  if(winner){victoryState={username:winner.username,timer:6000,warrior:winner};winner.glowTimer=6000;playVictory();eventLabel=`🏆 ${winner.username} WINS!`;eventLabelTimer=500;}
}
function startNewRound(){
  const prev=victoryState?.warrior||null;
  if(prev)nextKillsTarget=prev.kills+20;
  const survivors=warriors.filter(w=>!w.dead);
  warriors=[];particles=[];dmgNums=[];meteors=[];armageddon=null;victoryState=null;pickups=[];pickupSpawnTimer=12000;
  for(const w of survivors){const pos=rndArenaPos();w.ax=pos.ax;w.ay=pos.ay;w.tax=pos.ax;w.tay=pos.ay;w.walkTimer=0;w.bumpCooldown=2000;w.dead=false;w.deathTimer=0;w.floatY=0;w.floatVY=0;w.flashTimer=0;w.glowTimer=400;warriors.push(w);spawnSpawnFX(w);}
  eventLabel='⚔️ NEW ROUND!';eventLabelTimer=2500;
}

// ── Particles ────────────────────────────────────────
function spawnDmgNum(x,y,val,col){dmgNums.push({x,y,val,col:col||'#FF3333',life:1200,max:1200,vy:-55});}
function spawnSpawnFX(w){const s=arenaToScreen(w.ax,w.ay);for(let i=0;i<16;i++)particles.push({x:s.x,y:s.y,vx:(Math.random()-0.5)*140,vy:-Math.random()*120-20,life:800,max:800,r:3+Math.random()*5,col:rndFrom(['#FFD700','#FFF','#88CCFF','#AAFFAA'])});}
function spawnDeathFX(w){const s=arenaToScreen(w.ax,w.ay);for(let i=0;i<22;i++)particles.push({x:s.x,y:s.y+w.floatY,vx:(Math.random()-0.5)*170,vy:(Math.random()-0.5)*140-30,life:1000,max:1000,r:4+Math.random()*7,col:rndFrom(['#FF3333','#FF8800','#FFDD00','#FF6666'])});}
function spawnUpgradeFX(w){const s=arenaToScreen(w.ax,w.ay);for(let i=0;i<10;i++)particles.push({x:s.x,y:s.y,vx:(Math.random()-0.5)*90,vy:-Math.random()*100-10,life:600,max:600,r:2+Math.random()*4,col:rndFrom(['#FFD700','#AAFFAA','#FFF'])});}
function spawnHitFX(w){const s=arenaToScreen(w.ax,w.ay);for(let i=0;i<8;i++)particles.push({x:s.x,y:s.y-20,vx:(Math.random()-0.5)*110,vy:-Math.random()*90-10,life:450,max:450,r:2+Math.random()*4,col:rndFrom(['#FF2222','#FF6600','#FFAA00'])});}
function spawnSlashFX(attacker,target){const a=arenaToScreen(attacker.ax,attacker.ay),t=arenaToScreen(target.ax,target.ay);for(let i=0;i<7;i++){const f=i/6;particles.push({x:a.x+(t.x-a.x)*f+(Math.random()-0.5)*18,y:a.y+(t.y-a.y)*f-30+(Math.random()-0.5)*18,vx:(Math.random()-0.5)*25,vy:-Math.random()*20,life:320,max:320,r:4-i*0.4,col:i<3?'#FFFFFF':'#FFEE88'});}for(let i=0;i<5;i++)particles.push({x:t.x,y:t.y-25,vx:(Math.random()-0.5)*80,vy:-Math.random()*60-20,life:280,max:280,r:3+Math.random()*3,col:'#FFFFFF'});}

// ── Update ───────────────────────────────────────────
function updateWarriors(dt){
  for(const w of warriors){
    if(w.dead){w.deathTimer-=dt;continue;}
    w.flashTimer=Math.max(0,w.flashTimer-dt);w.glowTimer=Math.max(0,w.glowTimer-dt);
    w.walkTimer+=dt;w.walkPhase+=dt*0.0045;w.idlePhase+=dt*0.003;
    w.attackAnim=Math.max(0,w.attackAnim-dt/280);w.hitAnim=Math.max(0,w.hitAnim-dt/220);
    const spd=0.18*dt/1000;const dax=w.tax-w.ax,day=w.tay-w.ay,dist=Math.sqrt(dax*dax+day*day);
    if(dist>0.025){w.ax+=dax/dist*spd;w.ay+=day/dist*spd;playFootstep();}
    if(dist<0.04||w.walkTimer>w.walkDelay){w.walkTimer=0;w.walkDelay=2000+Math.random()*2500;const p=rndArenaPos();w.tax=p.ax;w.tay=p.ay;}
    if(w.bumpCooldown>0)w.bumpCooldown=Math.max(0,w.bumpCooldown-dt);
    w.ax=Math.max(-0.97,Math.min(0.97,w.ax));w.ay=Math.max(-0.97,Math.min(0.97,w.ay));
  }
  if(!victoryState){
    const alive=warriors.filter(w=>!w.dead);
    for(let i=0;i<alive.length;i++){for(let j=i+1;j<alive.length;j++){
      const a=alive[i],b=alive[j];
      if(a.username===b.username)continue;if(a.team&&b.team&&a.team===b.team)continue;if(a.bumpCooldown>0||b.bumpCooldown>0)continue;
      const spa=arenaToScreen(a.ax,a.ay),spb=arenaToScreen(b.ax,b.ay);
      const dx=spb.x-spa.x,dy=spb.y-spa.y;
      if(dx*dx+dy*dy<90*90){
        const dmgA=Math.max(1,a.damage),dmgB=Math.max(1,b.damage);
        b.hp-=dmgA;b.damage=Math.max(1,b.damage-Math.floor(dmgA*0.4));b.flashTimer=380;b.hitAnim=1;
        a.hp-=dmgB;a.damage=Math.max(1,a.damage-Math.floor(dmgB*0.4));a.flashTimer=380;a.hitAnim=1;
        a.attackAnim=1;b.attackAnim=1;
        spawnDmgNum(spb.x,spb.y-65,-dmgA,'#FF3333');spawnDmgNum(spa.x,spa.y-65,-dmgB,'#FF3333');
        spawnHitFX(b);spawnHitFX(a);spawnSlashFX(a,b);spawnSlashFX(b,a);playHit();playWhoosh();
        a.bumpCooldown=1500;b.bumpCooldown=1500;
        const pa=rndArenaPos();a.tax=pa.ax;a.tay=pa.ay;a.walkTimer=0;
        const pb=rndArenaPos();b.tax=pb.ax;b.tay=pb.ay;b.walkTimer=0;
        if(b.hp<=0){b.hp=0;b.dead=true;b.deathTimer=700;spawnDeathFX(b);playRemove();a.kills++;playKill();if(_ws&&_ws.readyState===1)_ws.send(JSON.stringify({type:'kill',username:a.username}));}
        if(a.hp<=0){a.hp=0;a.dead=true;a.deathTimer=700;spawnDeathFX(a);playRemove();b.kills++;playKill();if(_ws&&_ws.readyState===1)_ws.send(JSON.stringify({type:'kill',username:b.username}));}
        checkVictory();
      }
    }}
  }
  warriors=warriors.filter(w=>!w.dead||w.deathTimer>0);
}
function updateParticles(dt){for(const p of particles){p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;p.vy+=220*dt/1000;p.life-=dt;}particles=particles.filter(p=>p.life>0);if(particles.length>120)particles.splice(0,particles.length-120);}
function updateDmgNums(dt){for(const d of dmgNums){d.y+=d.vy*dt/1000;d.vy*=0.94;d.life-=dt;}dmgNums=dmgNums.filter(d=>d.life>0);}
function updateVictory(dt){if(!victoryState)return;victoryState.timer-=dt;if(victoryState.timer<=0)startNewRound();}
function updateBots(dt){
  if(victoryState)return;
  const realPlayers=warriors.filter(w=>!w.dead&&!w.isBot).length;
  if(realPlayers>=2){botSpawnTimer=20000;return;}
  botSpawnTimer-=dt;if(botSpawnTimer>0)return;
  botSpawnTimer=20000;const count=1+Math.floor(Math.random()*2);
  for(let i=0;i<count;i++){if(warriors.filter(w=>!w.dead).length>=MAX_WARRIORS)break;const name=getBotName();const w=makeWarrior(name,1,true);w.isBot=true;warriors.push(w);playSpawn();spawnSpawnFX(w);}
}
function updateIdleDrain(dt){
  const now=Date.now();
  for(const w of warriors){if(w.dead||w.isBot)continue;if(now-w.lastActivityTime<300000)continue;w.idleDrainAcc+=dt;if(w.idleDrainAcc>=1000){w.idleDrainAcc-=1000;w.hp=Math.max(0,w.hp-1);w.damage=Math.max(1,w.damage-1);w.coins=Math.max(1,w.coins-1);w.maxHp=w.coins*10;const sp=arenaToScreen(w.ax,w.ay);spawnDmgNum(sp.x,sp.y-55,-1,'#888888');if(w.hp<=0){w.dead=true;w.deathTimer=700;spawnDeathFX(w);playRemove();checkVictory();}}}
}

function drawSpearman(cx,cy,s,facing,state,t){
  const PI=Math.PI;
  const SKIN='#7B3F00',SKIN_DARK='#4a2400',SKIN_LIT='#A05520';
  const HAIR='#1a0800',HAIR2='#2e1200';
  const CLOTH='#6B2010',CLOTH2='#8B3818';
  const GOLD='#DAA520',WOOD='#8B5820',METAL='#C8A858',METAL_SHINE='#FFF0A0';
  const headR=13,neckLen=7,torsoH=26,torsoW=13;
  const uArmLen=19,lArmLen=17,uLegLen=22,lLegLen=20;
  const spearLen=110,spearTip=16;
  const hipY=0,waistY=-4,shoulderY=-torsoH,neckBotY=-torsoH-2,neckTopY=-torsoH-neckLen;
  const headCY=-torsoH-neckLen-headR+2,sX=torsoW,hX=torsoW*0.7;

  let bodyBob=0,bodyLean=0,headTilt=0;
  let legLAngle=0,legRAngle=0,kneeLBend=0,kneeRBend=0;
  let armLAngle=d2r(15),armRAngle=d2r(-15),forearmLAng=0,forearmRAng=0;
  let spearAng=d2r(-80),spearThrustX=0,spearThrustY=0;

  if(state==='idle'){
    const slow=t*0.0018;
    bodyBob=Math.sin(slow)*2.5;
    armLAngle=d2r(18+Math.sin(slow*0.6)*4);
    armRAngle=d2r(-18+Math.sin(slow*0.6+1)*3);
    forearmRAng=d2r(-10+Math.sin(slow)*5);
    spearAng=d2r(-78+Math.sin(slow*0.7)*3);
    headTilt=Math.sin(slow*0.5)*2;
  } else if(state==='walk'){
    const cycle=t*0.005,sc=Math.sin(cycle);
    bodyBob=Math.abs(sc)*3.5-1.5; bodyLean=6; headTilt=sc*3;
    legLAngle=d2r(sc*38); legRAngle=d2r(-sc*38);

  } else if(state==='attack'){
    const p=(t%1100)/1100;
    spearAng=d2r(-78);

      bodyLean=-tp*10; legLAngle=d2r(-tp*12); legRAngle=d2r(tp*10); headTilt=-tp*4;

      bodyLean=lerp(-10,16,tp); legLAngle=d2r(lerp(-12,20,tp));
      legRAngle=d2r(lerp(10,-8,tp)); headTilt=lerp(-4,8,tp);
      armLAngle=d2r(15+tp*25);
    } else if(p<0.55){
      armRAngle=d2r(30); forearmRAng=d2r(15);
      spearThrustX=42*s; spearThrustY=-22*s; bodyLean=16;
      legLAngle=d2r(20); legRAngle=d2r(-8); headTilt=8; armLAngle=d2r(40);
    } else {
      const tp=easeInOut((p-0.55)/0.45);
      armRAngle=d2r(lerp(30,-15,tp)); forearmRAng=d2r(lerp(15,0,tp));
      spearThrustX=lerp(42,0,tp)*s; spearThrustY=lerp(-22,0,tp)*s;
      bodyLean=lerp(16,0,tp); legLAngle=d2r(lerp(20,0,tp));
      legRAngle=d2r(lerp(-8,0,tp)); headTilt=lerp(8,0,tp);
      armLAngle=d2r(lerp(40,15,tp));
    }
  }

  ctx.save();
  ctx.translate(cx,cy+bodyBob*s);
  ctx.scale(facing,1);
  ctx.rotate(d2r(bodyLean));
  ctx.scale(s,s);

  // Shadow
  ctx.save(); ctx.scale(1,0.18);
  const shad=ctx.createRadialGradient(0,0,4,0,0,28);
  shad.addColorStop(0,'rgba(0,0,0,0.55)'); shad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shad; ctx.beginPath(); ctx.ellipse(0,0,28,28,0,0,PI*2); ctx.fill();
  ctx.restore();

  // Back leg
  {const hip={x:hX*0.6,y:hipY},knee=limbEnd(hip.x,hip.y,legRAngle,uLegLen);
  const foot=limbEnd(knee.x,knee.y,legRAngle+kneeRBend,lLegLen);
  capsule(hip.x,hip.y,knee.x,knee.y,5.5,SKIN_DARK,'#2a1000',0.5);
  capsule(knee.x,knee.y,foot.x,foot.y,4.5,SKIN_DARK,'#2a1000',0.5);
  ctx.beginPath();ctx.ellipse(foot.x+5,foot.y+1,8,3.5,d2r(12),0,PI*2);ctx.fillStyle=SKIN_DARK;ctx.fill();
  ctx.strokeStyle=CLOTH;ctx.lineWidth=3;ctx.beginPath();ctx.arc(foot.x,foot.y,4.5,-PI/2,PI/2);ctx.stroke();}

  // Back arm + spear
  {const sh={x:sX*0.55,y:shoulderY},elbow=limbEnd(sh.x,sh.y,armRAngle,uArmLen);
  const hand=limbEnd(elbow.x,elbow.y,armRAngle+forearmRAng,lArmLen);
  const hx=hand.x+spearThrustX,hy=hand.y+spearThrustY;
  capsule(sh.x,sh.y,elbow.x,elbow.y,5,SKIN_DARK,'#2a1000',0.5);
  capsule(elbow.x,elbow.y,hx,hy,4,SKIN_DARK,'#2a1000',0.5);
  const sdX=Math.sin(spearAng),sdY=Math.cos(spearAng);

  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(butt.x+2,butt.y+2);ctx.lineTo(tip.x+2,tip.y+2);ctx.stroke();
  ctx.strokeStyle=WOOD;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(butt.x,butt.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  ctx.strokeStyle='rgba(220,170,90,0.35)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(butt.x,butt.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  ctx.strokeStyle='#3a1800';ctx.lineWidth=3;
  for(let w=0;w<5;w++){ctx.beginPath();ctx.moveTo(hx-sdX*(2-w*0.8),hy-sdY*(2-w*0.8));ctx.lineTo(hx-sdX*(2-w*0.8)+sdY*4,hy-sdY*(2-w*0.8)-sdX*4);ctx.stroke();}
  const perpX=sdY,perpY=-sdX;

  ctx.fillStyle='#8B6020';ctx.beginPath();ctx.ellipse(tip.x,tip.y,3,3,spearAng,0,PI*2);ctx.fill();
  ctx.fillStyle=METAL;ctx.beginPath();ctx.moveTo(tip.x+perpX*3.5,tip.y+perpY*3.5);ctx.lineTo(tip.x+sdX*spearTip,tip.y+sdY*spearTip);ctx.lineTo(tip.x-perpX*3.5,tip.y-perpY*3.5);ctx.lineTo(tip.x-perpX*2,tip.y-perpY*2+sdY*4);ctx.lineTo(tip.x,tip.y);ctx.lineTo(tip.x+perpX*2,tip.y+perpY*2+sdY*4);ctx.closePath();ctx.fill();
  ctx.fillStyle=METAL_SHINE;ctx.globalAlpha=0.55;ctx.beginPath();ctx.moveTo(tip.x+perpX*1.2,tip.y+perpY*1.2);ctx.lineTo(tip.x+sdX*spearTip*0.8,tip.y+sdY*spearTip*0.8);ctx.lineTo(tip.x+perpX*0.2,tip.y+perpY*0.2);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
  if(state==='attack'){const ap=(performance.now()%900)/900;if(ap>0.2&&ap<0.5){const intensity=Math.sin((ap-0.2)/0.3*PI);ctx.save();ctx.globalAlpha=intensity*0.45;const ring=ctx.createRadialGradient(tip.x,tip.y,2,tip.x,tip.y,22);ring.addColorStop(0,'rgba(255,200,50,0.9)');ring.addColorStop(1,'rgba(255,100,0,0)');ctx.fillStyle=ring;ctx.beginPath();ctx.arc(tip.x,tip.y,22,0,PI*2);ctx.fill();ctx.restore();}}}

  // Torso
  {ctx.beginPath();ctx.moveTo(-sX,shoulderY);ctx.lineTo(sX,shoulderY);ctx.bezierCurveTo(sX+2,shoulderY+torsoH*0.4,hX+1,waistY,hX,hipY);ctx.lineTo(-hX,hipY);ctx.bezierCurveTo(-hX-1,waistY,-sX-2,shoulderY+torsoH*0.4,-sX,shoulderY);ctx.closePath();
  const tg=ctx.createLinearGradient(-sX,shoulderY,sX,shoulderY);tg.addColorStop(0,SKIN_DARK);tg.addColorStop(0.35,SKIN);tg.addColorStop(0.65,SKIN_LIT);tg.addColorStop(1,SKIN_DARK);ctx.fillStyle=tg;ctx.fill();ctx.strokeStyle='#2a1000';ctx.lineWidth=0.6;ctx.stroke();}

  {const hip={x:-hX*0.6,y:hipY},knee=limbEnd(hip.x,hip.y,legLAngle,uLegLen);

  const lg2=ctx.createLinearGradient(0,hipY,0,hipY+17);lg2.addColorStop(0,CLOTH2);lg2.addColorStop(1,CLOTH);ctx.fillStyle=lg2;ctx.fill();ctx.strokeStyle='#2a0e04';ctx.lineWidth=0.7;ctx.stroke();

  // Dreadlocks

  for(let i=0;i<lockGroups.length;i++){
    const[lx,sd]=lockGroups[i],sy2=-headR*0.85;
    const ll=52+(i%4)*15+Math.sin(i*1.9)*7,wa=2.5+(i%3),wv=Math.sin(t*0.001+i*1.4)*wa;
    const th=2.5+(i%3)*0.5;ctx.strokeStyle=i%3===0?HAIR2:HAIR;ctx.lineWidth=th;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(lx,sy2);ctx.bezierCurveTo(lx+sd*(3+Math.abs(wv)),sy2+ll*0.35,lx+sd*(5+Math.abs(wv)),sy2+ll*0.7,lx+sd*(3+wv*0.4),sy2+ll);ctx.stroke();}
  ctx.beginPath();ctx.ellipse(0,-headR*0.25,headR*0.88,headR*0.62,0,PI,PI*2);ctx.fillStyle=HAIR;ctx.fill();
  // Face
  ctx.fillStyle=SKIN_DARK;ctx.beginPath();ctx.ellipse(-4.5,-5,4,1.5,d2r(-10),0,PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(4.5,-5,4,1.5,d2r(10),0,PI*2);ctx.fill();
  ctx.fillStyle='#FFFDE8';ctx.beginPath();ctx.ellipse(-4.2,-3,3.2,2.2,0,0,PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(4.2,-3,3.2,2.2,0,0,PI*2);ctx.fill();

// ── SKY helpers ────────────────────────────────────────
function skyAt(gt) {
  // gt 0..1: 0=midnight, 0.25=dawn, 0.5=noon, 0.75=dusk
  function lerp3(a,b,f){return[a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];}
  function toHex(rgb){return'#'+rgb.map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');}
  const NIGHT=[4,1,26],DAWN=[140,70,30],DAY=[40,100,200],DUSK=[100,40,10];
  const NIGHT_B=[14,5,48],DAWN_B=[200,120,60],DAY_B=[130,190,240],DUSK_B=[160,70,20];
  let top,bot;
  if(gt<0.2){const f=gt/0.2;top=lerp3(NIGHT,DAWN,f);bot=lerp3(NIGHT_B,DAWN_B,f);}
  else if(gt<0.3){const f=(gt-0.2)/0.1;top=lerp3(DAWN,[20,60,160],f);bot=lerp3(DAWN_B,DAY_B,f);}
  else if(gt<0.6){const f=(gt-0.3)/0.3;top=lerp3([20,60,160],DAY,f);bot=lerp3(DAY_B,DAY_B,f);}
  else if(gt<0.75){const f=(gt-0.6)/0.15;top=lerp3(DAY,DUSK,f);bot=lerp3(DAY_B,DUSK_B,f);}
  else if(gt<0.85){const f=(gt-0.75)/0.1;top=lerp3(DUSK,NIGHT,f);bot=lerp3(DUSK_B,NIGHT_B,f);}
  else{top=NIGHT;bot=NIGHT_B;}
  return{top:toHex(top),bot:toHex(bot)};
}
function isNight(){return gameTime<0.18||gameTime>0.82;}
function isDuskDawn(){return(gameTime>=0.18&&gameTime<0.28)||(gameTime>=0.72&&gameTime<=0.82);}
function isDawn(){return gameTime>=0.18&&gameTime<=0.30;}
function isDusk(){return gameTime>=0.68&&gameTime<=0.82;}
function dayFactor(){if(isNight())return 0.28;if(isDawn())return lerp(0.28,1,(gameTime-0.18)/0.12);if(isDusk())return lerp(0.28,1,1-(gameTime-0.68)/0.14);return 1;}
function _rgb(r,g,b){return`rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;}
function _rgba(r,g,b,a){return`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a})`;}
function lerp3c(a,b,f){return[a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f];}

// ── SKY ──────────────────────────────────────────────
function drawSky(t) {
  const {top,bot} = skyAt(gameTime);
  const g = ctx.createLinearGradient(0, 0, 0, SKY_H + 60);
  g.addColorStop(0, top);
  g.addColorStop(1, bot);
  ctx.fillStyle = g; ctx.fillRect(0, 0, CW, SKY_H + 60);

  // Stars — visible at night / dusk-dawn
  const starAlpha = isNight() ? 1 : isDuskDawn() ? 0.5 : 0;
  if (starAlpha > 0) {
    for (let i = 0; i < 90; i++) {
      const sx = ((i * 137 + 50) % 578) + 11;
      const sy = ((i * 103 + 17) % 158) + 5;
      const tw = starAlpha * (0.3 + 0.6 * Math.abs(Math.sin(t * 0.0007 + i * 1.1)));
      ctx.globalAlpha = tw;
      ctx.fillStyle = i % 11 === 0 ? '#bbddff' : '#ffffff';
      ctx.beginPath(); ctx.arc(sx, sy, i % 7 === 0 ? 1.3 : 0.65, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Sun arc — day phase 0.25..0.75
  const sunPhase = (gameTime - 0.25) / 0.5; // 0 at dawn, 1 at dusk
  if (sunPhase >= 0 && sunPhase <= 1) {
    const sunAngle = Math.PI - sunPhase * Math.PI; // PI..0 left-to-right
    const sx = CW * 0.5 + Math.cos(sunAngle) * (CW * 0.42);
    const sy = SKY_H * 0.85 - Math.sin(sunAngle) * (SKY_H * 0.80);
    const sunA = Math.min(1, Math.min(sunPhase * 8, (1 - sunPhase) * 8)); // fade at horizon
    ctx.globalAlpha = sunA;
    // Sun glow
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 60);
    sg.addColorStop(0, 'rgba(255,250,200,0.6)'); sg.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(sx, sy, 60, 0, Math.PI*2); ctx.fill();
    // Sun disk
    ctx.fillStyle = sunPhase < 0.5 ? '#FFF5AA' : '#FFDD66';
    ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Moon arc — night phase; offset by 0.5 from sun
  const moonPhase = ((gameTime + 0.5) % 1 - 0.25) / 0.5;
  if (moonPhase >= 0 && moonPhase <= 1) {
    const moonAngle = Math.PI - moonPhase * Math.PI;
    const mx2 = CW * 0.5 + Math.cos(moonAngle) * (CW * 0.42);
    const my2 = SKY_H * 0.85 - Math.sin(moonAngle) * (SKY_H * 0.80);
    const moonA = Math.min(1, Math.min(moonPhase * 8, (1 - moonPhase) * 8));
    ctx.globalAlpha = moonA * (isNight() ? 1 : 0.4);
    const mr = 23;
    const mhalo = ctx.createRadialGradient(mx2, my2, 2, mx2, my2, mr * 3.2);
    mhalo.addColorStop(0, 'rgba(210,190,140,0.18)'); mhalo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mhalo; ctx.beginPath(); ctx.arc(mx2, my2, mr*3.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ddd4a8'; ctx.beginPath(); ctx.arc(mx2, my2, mr, 0, Math.PI*2); ctx.fill();
    // crescent shadow
    const bgTop = top; ctx.fillStyle = bgTop;
    ctx.beginPath(); ctx.arc(mx2+mr*0.48, my2-mr*0.12, mr*0.88, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Nebula glow — only at night
  if (isNight() || isDuskDawn()) {
    const nebulaA = isNight() ? 0.28 : 0.12;
    const ng = ctx.createRadialGradient(300, SKY_H + 20, 0, 300, SKY_H - 30, 230);
    ng.addColorStop(0, `rgba(70,15,150,${nebulaA})`); ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng; ctx.fillRect(0, 0, CW, SKY_H + 80);
  }

  // Moving clouds — color tinted by time of day
  const cloudColor = isNight() ? '#260858' : isDuskDawn() ? '#884422' : '#aaccee';
  const cloudAlpha = isNight() ? 0.5 : isDuskDawn() ? 0.55 : 0.35;
  ctx.fillStyle = cloudColor;
  [[75, 48, cloudAlpha], [330, 32, cloudAlpha * 0.7]].forEach(([x, y, a], ci) => {
    const dx = ((t * (0.007 - ci*0.003) + ci*400) % 900) - 100;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(x+dx,     y,    28, 0, Math.PI*2);
    ctx.arc(x+dx+26,  y-8,  22, 0, Math.PI*2);
    ctx.arc(x+dx+52,  y+3,  26, 0, Math.PI*2);
    ctx.arc(x+dx+76,  y-4,  18, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── Draw warriors ────────────────────────────────────
function drawWarrior(w, now){
  if(w.dead&&w.deathTimer<=0)return;
  const s=arenaToScreen(w.ax,w.ay);
  const totalSc=1.05; // фиксированный размер у всех
  const alpha=w.dead?Math.max(0,w.deathTimer/700):1;
  const sx=s.x,sy=s.y+w.floatY;
  const idleBob=w.dead?0:Math.sin(w.idlePhase)*3.2;
  const hitOff=w.hitAnim>0?(Math.random()-0.5)*6*w.hitAnim:0;
  const flash=w.flashTimer>0,isGlow=w.glowTimer>0;
  const facing=w.ax<w.tax?1:-1;
  // Determine animation state
  let state='idle';
  const dax=w.tax-w.ax,day=w.tay-w.ay;
  if(Math.sqrt(dax*dax+day*day)>0.04)state='walk';
  if(w.attackAnim>0.5)state='attack';
  ctx.save();ctx.globalAlpha=alpha;
  const isKing=topKillers.length>0&&w.username.toLowerCase()===topKillers[0].username.toLowerCase();
  if(isGlow||isKing){ctx.shadowColor=isKing?'#FFD700':'#AAFFAA';ctx.shadowBlur=isKing?22:14;}
  ctx.save();ctx.translate(sx+hitOff,sy+idleBob);ctx.scale(totalSc,totalSc);
  try{
    if(isKing)drawDarkKing(0,0,1,facing,state,now);
    else if(w.class==='conan')drawConan(0,0,1,facing,state,now);
    else if(w.class==='terminator')drawTerminator(0,0,1,facing,state,now);
    else if(w.class==='fan_warrior')drawFanWarrior(0,0,1,facing,state,now);
    else if(w.class==='dark_mage')drawDarkMage(0,0,0.82,facing,state,now);
    else if(w.class==='pirate')drawPirate(0,0,1,facing,state,now);
    else if(w.class==='knight')drawKnight(0,0,1,facing,state,now);
    else if(w.class==='samurai')drawSamurai(0,0,1,facing,state,now);
    else if(w.class==='cossack')drawCossack(0,0,1,facing,state,now);
    else drawSpearman(0,0,1,facing,state,now);
  }catch(e){console.error('drawWarrior error:',e);}
  if(flash){ctx.globalAlpha=(w.flashTimer/600)*0.55;ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.ellipse(0,-25,18,30,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=alpha;}
  ctx.restore();ctx.shadowBlur=0;
  _drawLabels(sx,sy+idleBob-120,w);
  ctx.restore();
}
function _drawLabels(sx,labelY,w){
  ctx.textAlign='center';ctx.lineWidth=3;
  if(w.team===1||w.team===2){const fc=w.team===1?'#FF2222':'#2266FF';const fx=sx+18,fy=labelY-10;ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(fx,fy+14);ctx.lineTo(fx,fy-2);ctx.stroke();ctx.fillStyle=fc;ctx.beginPath();ctx.moveTo(fx,fy-2);ctx.lineTo(fx+10,fy+3);ctx.lineTo(fx,fy+8);ctx.closePath();ctx.fill();}
  ctx.font='bold 15px Arial';const nick=w.username.length>13?w.username.slice(0,12)+'…':w.username;ctx.strokeStyle='rgba(0,0,0,0.95)';ctx.lineWidth=3.5;ctx.strokeText(nick,sx,labelY+8);ctx.fillStyle='#FFD700';ctx.fillText(nick,sx,labelY+8);
  ctx.font='bold 12px Arial';ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=2.5;const hpTxt=`❤️ ${Math.ceil(w.hp)}`;ctx.strokeText(hpTxt,sx,labelY+25);ctx.fillStyle='#FF6688';ctx.fillText(hpTxt,sx,labelY+25);
  const dmgTxt=`💪 ${w.damage}`;ctx.strokeText(dmgTxt,sx,labelY+40);ctx.fillStyle='#88CCFF';ctx.fillText(dmgTxt,sx,labelY+40);
  if(w.kills>0){const killTxt=`☠️ ${w.kills}`;ctx.strokeText(killTxt,sx,labelY+55);ctx.fillStyle='#FF4444';ctx.fillText(killTxt,sx,labelY+55);}
}
function drawParticles(){for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}}
function drawDmgNums(){ctx.save();for(const d of dmgNums){ctx.globalAlpha=d.life/d.max;ctx.font='bold 22px Arial Black';ctx.textAlign='center';ctx.strokeStyle='rgba(0,0,0,0.9)';ctx.lineWidth=4;ctx.strokeText(d.val,d.x,d.y);ctx.fillStyle=d.col;ctx.fillText(d.val,d.x,d.y);}ctx.globalAlpha=1;ctx.restore();}
function drawMeteors(){for(const m of meteors){const a=Math.min(1,m.life/400);for(let i=1;i<m.trail.length;i++){const t0=m.trail[i-1],t1=m.trail[i];ctx.save();ctx.globalAlpha=a*(i/m.trail.length)*0.5;ctx.strokeStyle='#FF7700';ctx.lineWidth=m.r*(i/m.trail.length)*1.3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);ctx.stroke();ctx.restore();}ctx.save();ctx.globalAlpha=a;const g=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r);g.addColorStop(0,'#FFF');g.addColorStop(0.35,'#FFEE00');g.addColorStop(0.7,'#FF4400');g.addColorStop(1,'#660000');ctx.fillStyle=g;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();ctx.restore();}}
function drawFlood(){if(!armageddon)return;const lvl=armageddon.floodLevel,waterY=CH-lvl*(CH-SKY_H);ctx.save();ctx.rect(0,SKY_H,CW,CH-SKY_H);ctx.clip();const wg=ctx.createLinearGradient(0,waterY,0,CH);wg.addColorStop(0,'rgba(30,90,220,0.55)');wg.addColorStop(1,'rgba(10,50,160,0.75)');ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(0,waterY);for(let x=0;x<=CW;x+=5)ctx.lineTo(x,waterY+Math.sin(x/28+Date.now()/380)*5);ctx.lineTo(CW,CH);ctx.lineTo(0,CH);ctx.closePath();ctx.fill();ctx.restore();ctx.strokeStyle='rgba(120,170,255,0.45)';ctx.lineWidth=1.2;for(const rd of armageddon.rainDrops){ctx.globalAlpha=rd.life/800*0.6;ctx.beginPath();ctx.moveTo(rd.x,rd.y);ctx.lineTo(rd.x-2,rd.y+11);ctx.stroke();}ctx.globalAlpha=1;}
function drawTornado(now){if(!armageddon)return;const tx=armageddon.tornadoX,ty=armageddon.tornadoY,ang=armageddon.tornadoAngle;ctx.save();ctx.globalAlpha=0.7;const fg=ctx.createLinearGradient(tx,ty-140,tx,ty+20);fg.addColorStop(0,'rgba(160,160,255,0)');fg.addColorStop(0.5,'rgba(130,120,240,0.35)');fg.addColorStop(1,'rgba(100,90,220,0.55)');ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(tx-5,ty-140);ctx.lineTo(tx+5,ty-140);ctx.lineTo(tx+44,ty+18);ctx.lineTo(tx-44,ty+18);ctx.closePath();ctx.fill();for(let i=0;i<5;i++){const r=12+i*16,ra=ang+i*0.55,y2=ty-15-i*24;ctx.save();ctx.translate(tx,y2);ctx.rotate(ra);ctx.strokeStyle=`rgba(180,170,255,${0.6-i*0.1})`;ctx.lineWidth=3-i*0.4;ctx.beginPath();ctx.ellipse(0,0,r,r*0.35,0,0,Math.PI*2);ctx.stroke();ctx.restore();}ctx.restore();}
function drawEventLabel(){const a=Math.min(1,eventLabelTimer/600);ctx.save();ctx.globalAlpha=a;ctx.font='bold 46px Arial Black';ctx.textAlign='center';ctx.shadowColor='#FF4400';ctx.shadowBlur=28;ctx.strokeStyle='#000';ctx.lineWidth=5;ctx.strokeText(eventLabel,CW/2,CH/2-20);ctx.fillStyle='#FF8800';ctx.fillText(eventLabel,CW/2,CH/2-20);ctx.shadowBlur=0;ctx.restore();}
function drawRatingLabel(){if(!ratingLabel||ratingLabelTimer<=0)return;const a=Math.min(1,ratingLabelTimer/500);ctx.save();ctx.globalAlpha=a;ctx.font='bold 24px Arial';ctx.textAlign='center';const tw=ctx.measureText(ratingLabel).width;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(CW/2-tw/2-18,CH-210,tw+36,48,10);else ctx.rect(CW/2-tw/2-18,CH-210,tw+36,48);ctx.fill();ctx.shadowColor='#00CCFF';ctx.shadowBlur=14;ctx.strokeStyle='#003366';ctx.lineWidth=3;ctx.strokeText(ratingLabel,CW/2,CH-176);ctx.fillStyle='#00EEFF';ctx.fillText(ratingLabel,CW/2,CH-176);ctx.shadowBlur=0;ctx.restore();}

// ── Pickups ───────────────────────────────────────────
function updatePickups(dt){
  if(!victoryState){
    pickupSpawnTimer-=dt;
    if(pickupSpawnTimer<=0&&pickups.length<3){
      pickupSpawnTimer=15000+Math.random()*10000;
      const ax=(Math.random()*2-1)*0.82,ay=(Math.random()*2-1)*0.82;
      const r=Math.random();
      const type=r<0.375?'heart':r<0.75?'power':'bomb';
      pickups.push({id:++nextPickupId,ax,ay,type,life:12000,maxLife:12000});
      playPickupSpawn();
    }
  }
  for(const p of pickups)p.life-=dt;
  for(const p of pickups){
    if(p.life<=0)continue;
    const ps=arenaToScreen(p.ax,p.ay);
    for(const w of warriors){
      if(w.dead)continue;
      const ws=arenaToScreen(w.ax,w.ay);
      const dx=ws.x-ps.x,dy=ws.y-ps.y;
      if(dx*dx+dy*dy<55*55){
        if(p.type==='heart'){
          w.hp=Math.min(w.maxHp,w.hp+100);
          spawnDmgNum(ws.x,ws.y-75,'+100 ❤️','#FF6699');
          for(let i=0;i<14;i++)particles.push({x:ws.x,y:ws.y-20,vx:(Math.random()-0.5)*100,vy:-Math.random()*100-20,life:650,max:650,r:3+Math.random()*5,col:rndFrom(['#FF4488','#FF88BB','#FFCCDD','#FF2266'])});
          playPickupHeart();
        }else if(p.type==='power'){
          w.damage+=15;
          spawnDmgNum(ws.x,ws.y-75,'+15 💪','#FFAA00');
          for(let i=0;i<14;i++)particles.push({x:ws.x,y:ws.y-20,vx:(Math.random()-0.5)*120,vy:-Math.random()*110-20,life:600,max:600,r:3+Math.random()*5,col:rndFrom(['#FFD700','#FF8800','#FFFF44','#FF6600'])});
          playPickupPower();
        }else if(p.type==='bomb'){
          w.hp=Math.max(0,w.hp-100);w.damage=Math.max(1,w.damage-20);w.flashTimer=500;
          spawnDmgNum(ws.x,ws.y-75,'-100 💣','#FF2200');
          for(let i=0;i<22;i++)particles.push({x:ws.x,y:ws.y,vx:(Math.random()-0.5)*180,vy:(Math.random()-0.5)*150-30,life:850,max:850,r:4+Math.random()*8,col:rndFrom(['#FF3300','#FF8800','#FFDD00','#FF6600','#FFFFFF'])});
          playPickupBomb();
          if(w.hp<=0){w.dead=true;w.deathTimer=700;spawnDeathFX(w);playRemove();checkVictory();}
        }
        p.life=0;break;
      }
    }
  }
  pickups=pickups.filter(p=>p.life>0);
}
function drawPickups(now){
  for(const p of pickups){
    const sp=arenaToScreen(p.ax,p.ay);
    const x=sp.x,y=sp.y;
    const warning=p.life<3000;
    if(warning&&Math.floor(now/280)%2===0)continue;
    const pulse=0.85+0.15*Math.sin(now*(warning?0.018:0.006));
    const colMap={heart:'#FF4488',power:'#FF9900',bomb:'#FF3300'};
    const col=colMap[p.type];
    ctx.save();
    // ground glow
    ctx.globalAlpha=0.3*pulse;
    const glow=ctx.createRadialGradient(x,y,0,x,y,44);
    glow.addColorStop(0,col);glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,44,0,Math.PI*2);ctx.fill();
    // outer ring
    ctx.globalAlpha=0.65*pulse;
    ctx.strokeStyle=col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(x,y,24*pulse,0,Math.PI*2);ctx.stroke();
    // inner fill
    ctx.globalAlpha=0.18*pulse;
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,24*pulse,0,Math.PI*2);ctx.fill();
    // icon
    ctx.globalAlpha=1;
    const iconSize=Math.round(26*pulse);
    ctx.font=`${iconSize}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText({heart:'❤️',power:'💪',bomb:'💣'}[p.type],x,y-3);
    // value text
    ctx.font='bold 12px Arial Black';ctx.textBaseline='alphabetic';
    const val={heart:'+100',power:'+15',bomb:'-100'}[p.type];
    ctx.strokeStyle='rgba(0,0,0,0.95)';ctx.lineWidth=3.5;ctx.strokeText(val,x,y+20);
    ctx.fillStyle=col;ctx.fillText(val,x,y+20);
    ctx.restore();
  }
}

// ── MAIN LOOP ──────────────────────────────────────────
function frame(now) {
  requestAnimationFrame(frame);
  const dt=Math.min(now-(lastT||now),100); lastT=now;
  gameTime=(gameTime+dt/90000)%1;
  updateWarriors(dt);
  updateParticles(dt);
  updateDmgNums(dt);
  updateArmageddon(dt);
  updateVictory(dt);
  updateBots(dt);
  updateIdleDrain(dt);
  updatePickups(dt);
  if(eventLabelTimer>0)eventLabelTimer-=dt;
  if(ratingLabelTimer>0)ratingLabelTimer-=dt;

  ctx.clearRect(0, 0, CW, CH);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;

  drawSky(now);
  drawBgForest();
  drawGrassField(now);
  drawFieldTorches(now);
  drawTrees();

  if(armageddon?.type==='flood')drawFlood();
  drawMeteors();
  if(armageddon?.type==='tornado')drawTornado(now);
  drawParticles();
  drawPickups(now);
  const sorted=[...warriors].sort((a,b)=>a.ay-b.ay);
  for(const w of sorted)drawWarrior(w,now);
  drawDmgNums();

  drawHUD(now);
  if(eventLabelTimer>0)drawEventLabel();
  if(ratingLabelTimer>0)drawRatingLabel();
}
requestAnimationFrame(frame);

// ── WebSocket ─────────────────────────────────────────
let _ws=null,_wsUser='';
function wsConnect(username){
  _wsUser=username;
  if(_ws&&_ws.readyState<2){_ws.onclose=null;_ws.close();}
  const proto=location.protocol==='https:'?'wss:':'ws:';
  _ws=new WebSocket(`${proto}//${location.host}?username=${encodeURIComponent(username)}`);
  _ws.onopen=()=>setStatus('connecting','⏳ @'+username+'…');
  _ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);
    if(d.type==='arena_gift'){_dbgGifts++;addWarrior(d.username,d.coins);resetActivity(d.username);}
    if(d.type==='arena_like'){_dbgLikes++;totalLikes+=d.likes||0;if(totalLikes>=1000){totalLikes-=1000;triggerArmageddon();}resetActivity(d.username);}
    if(d.type==='arena_member'){helpWarrior(d.username);resetActivity(d.username);}
    if(d.type==='arena_gift'||d.type==='arena_member'||d.type==='arena_like'){if(topKillers.length>0&&d.username&&d.username.toLowerCase()===(topKillers[0].username||'').toLowerCase()&&Date.now()-_lastKingArrival>60000){_lastKingArrival=Date.now();triggerKingArrival(topKillers[0].username);}}
    if(d.type==='arena_team'){const ex=warriors.find(w=>w.username===d.username&&!w.dead);if(ex)ex.team=d.team;else teamRegistry.set(d.username,d.team);resetActivity(d.username);}
    if(d.type==='top_killers'){const prevTop=(topKillers[0]?.username||'').toLowerCase();topKillers=d.data||[];const newTop=topKillers[0]?.username;if(newTop&&newTop.toLowerCase()!==prevTop&&Date.now()-_lastKingArrival>30000){_lastKingArrival=Date.now();triggerKingArrival(newTop);}}
    if(d.type==='arena_rating'){_showRating(d.rank?`<span style="color:#00EEFF;font-size:16px;font-weight:bold;">📊 @${d.username}<br><span style="color:#FFD700">#${d.rank} место · ☠️${d.kills} убийств</span></span>`:`<span style="color:#AAA;font-size:15px;">📊 @${d.username}<br>не в рейтинге</span>`);}
    if(d.type==='arena_cheat'){const _lu=d.username.toLowerCase();let w=warriors.find(w=>!w.dead&&w.username.toLowerCase()===_lu);if(!w)w=warriors.find(w=>w.username.toLowerCase().includes(_lu));if(w){w.dead=false;w.deathTimer=0;w.maxHp+=d.hp;w.hp+=d.hp;w.damage+=d.damage;w.coins=Math.ceil(w.maxHp/10);const sp=arenaToScreen(w.ax,w.ay);spawnDmgNum(sp.x,sp.y-60,'+'+d.hp,'#FFD700');spawnDmgNum(sp.x,sp.y-85,'⚔️+'+d.damage,'#FF8800');eventLabel='⚡ POWER!';eventLabelTimer=3500;playVictory();}}
    if(d.type==='arena_bot'){const addBot=()=>{if(warriors.filter(w=>!w.dead).length>=MAX_WARRIORS)return;const bw=makeWarrior(getBotName(),1,true);bw.isBot=true;warriors.push(bw);playSpawn();spawnSpawnFX(bw);};if(d.count==='max'){while(warriors.filter(w=>!w.dead).length<MAX_WARRIORS)addBot();}else addBot();}
    if(d.type==='init'||d.type==='status'){if(d.topKillers)topKillers=d.topKillers;const _m=d.tiktokMode||d.mode;if(_m==='tiktok')setStatus('live','🔴 LIVE @'+(d.username||username));else if(_m==='demo')setStatus('demo','🟡 DEMO MODE');else setStatus('connecting','⏳ @'+username+'…');}
  }catch(e){console.error('[arena2 ws error]',e);}};
  _ws.onclose=()=>{setStatus('error','❌ Disconnected…');setTimeout(()=>wsConnect(_wsUser),3000);};
  _ws.onerror=()=>{};
}
function setStatus(cls,text){const el=document.getElementById('statusBadge');if(!el)return;el.style.display='block';el.className=cls;el.textContent=text;}

// ── King Overlay ──────────────────────────────────────
let _kingHideTimer=null,_lastKingArrival=0;
function triggerKingArrival(name){
  document.getElementById('kingArenaName').textContent='★  '+name+'  ★';
  const ov=document.getElementById('kingOverlay');
  ov.className='';ov.style.display='none';
  ov.querySelectorAll('._ke,._kt,._ks,._kd,._kn,._kb').forEach(el=>{el.style.animation='none';void el.offsetHeight;el.style.animation='';});
  void ov.offsetHeight;ov.style.display='';ov.classList.add('show');
  if(_kingHideTimer)clearTimeout(_kingHideTimer);
  _kingHideTimer=setTimeout(()=>{ov.classList.remove('show');ov.classList.add('hiding');setTimeout(()=>{ov.classList.remove('hiding');ov.style.display='none';},500);},5500);
}

// ── Init ──────────────────────────────────────────────
(function init(){
  const p=new URLSearchParams(location.search);
  const u=(p.get('username')||'').replace(/^@/,'').trim();
  if(u)wsConnect(u);
  document.addEventListener('click',()=>{try{getACtx();}catch(e){}},{once:true});
  document.addEventListener('touchstart',()=>{try{getACtx();}catch(e){}},{once:true});
  function fetchTop(){fetch('/top').then(r=>r.json()).then(d=>{if(d.ok&&d.top&&d.top.length)topKillers=d.top.slice(0,5);}).catch(()=>{});}
  fetchTop();setInterval(fetchTop,30000);
})();

// ── Scale ─────────────────────────────────────────────
(function scaleSetup(){
  var W=document.getElementById('wrap'),ps=1,po={x:0,y:0};
  function apply(){var w=document.documentElement.clientWidth||window.innerWidth,h=document.documentElement.clientHeight||window.innerHeight,bs=Math.min(w/600,h/1000),ts=bs*ps,cx=(w-600*ts)/2+po.x,cy=(h-1000*ts)/2+po.y;W.style.transform='translate('+cx+'px,'+cy+'px) scale('+ts+')';}
  window.addEventListener('resize',apply);apply();
  function td(a,b){var dx=a.clientX-b.clientX,dy=a.clientY-b.clientY;return Math.sqrt(dx*dx+dy*dy);}
  function tm(a,b){return{x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}
  var ld=0,lm={x:0,y:0},drag=false,ds={x:0,y:0};
  document.addEventListener('touchstart',function(e){if(e.touches.length===2){ld=td(e.touches[0],e.touches[1]);lm=tm(e.touches[0],e.touches[1]);drag=false;}else if(e.touches.length===1&&ps>1.05){drag=true;ds={x:e.touches[0].clientX-po.x,y:e.touches[0].clientY-po.y};}},{passive:true});
  document.addEventListener('touchmove',function(e){if(e.touches.length===2){drag=false;var d=td(e.touches[0],e.touches[1]),m=tm(e.touches[0],e.touches[1]);ps=Math.min(3,Math.max(0.5,ps*(d/ld)));po.x+=(m.x-lm.x);po.y+=(m.y-lm.y);ld=d;lm=m;apply();}else if(e.touches.length===1&&drag){po.x=e.touches[0].clientX-ds.x;po.y=e.touches[0].clientY-ds.y;apply();}},{passive:true});
  document.addEventListener('touchend',function(e){if(e.touches.length===0)drag=false;},{passive:true});
})();

document.getElementById('fsBtn').addEventListener('click',()=>{if(document.fullscreenElement)document.exitFullscreen&&document.exitFullscreen();else document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().then(()=>{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('portrait').catch(()=>{});}).catch(()=>{});});
document.getElementById('backBtn').addEventListener('click',()=>{location.href='/';});
document.getElementById('addBotBtn').addEventListener('click',()=>{if(warriors.filter(w=>!w.dead).length>=MAX_WARRIORS)return;const name=getBotName();const w=makeWarrior(name,1,true);w.isBot=true;warriors.push(w);playSpawn();spawnSpawnFX(w);});
let _ratingHideTimer=null;
function _showRating(html){
  const el=document.getElementById('ratingOverlay');
  el.innerHTML=html;el.style.display='block';
  if(_ratingHideTimer)clearTimeout(_ratingHideTimer);
  _ratingHideTimer=setTimeout(()=>{el.style.display='none';},6000);
}
document.getElementById('ratingBtn').addEventListener('click',()=>{
  _showRating('<span style="color:#00EEFF;font-size:15px;font-weight:bold;">📊 Загрузка рейтинга…</span>');
  fetch('/top?limit=20').then(r=>r.json()).then(d=>{
    if(!d.ok||!d.top||d.top.length<=5){_showRating('<span style="color:#FF8888;font-size:14px;">📊 Меньше 6 игроков</span>');return;}
    const list=d.top.slice(5,20);
    let rows=list.map((p,i)=>`<tr><td style="padding:1px 6px 1px 0;color:#AAA;font-size:12px;">#${i+6}</td><td style="padding:1px 8px;color:#fff;font-size:13px;font-weight:bold;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">@${p.username}</td><td style="padding:1px 0;color:#FF6644;font-size:13px;">☠️${p.total_kills}</td></tr>`).join('');
    _showRating(`<div style="color:#00CCFF;font-size:12px;font-weight:bold;letter-spacing:1px;margin-bottom:5px;">📊 МЕСТА 6–${Math.min(20,d.top.length)}</div><table style="border-collapse:collapse;">${rows}</table>`);
  }).catch(()=>_showRating('<span style="color:#FF8888;font-size:14px;">❌ Ошибка загрузки</span>'));
});
</script>
