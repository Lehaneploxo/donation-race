<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chewbacca Preview</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#060401; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:Arial; color:#fff; }
    h2 { margin-bottom:6px; font-size:20px; color:#c8a040; letter-spacing:2px; }
    p  { margin-bottom:18px; font-size:12px; color:#555; }
    canvas { border:1px solid #1a1004; border-radius:14px; }
  </style>
</head>
<body>
<h2>🦁 ЧУБАККА</h2>
<p>Wookiee Warrior — Star Wars</p>
<canvas id="c" width="300" height="420"></canvas>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');

// Статичный мех — без мерцания (псевдослучайный через seed)
function fur(x,y,n,spread,len,dir,col,al,seed){
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=1.2; ctx.lineCap='round'; ctx.globalAlpha=al;
  for(let i=0;i<n;i++){
    const rx=Math.sin(seed*6.7+i*3.9)*5;
    const ry=Math.sin(seed*2.3+i*8.1)*3;
    const a=dir+(i/n-0.5)*spread;
    ctx.beginPath();
    ctx.moveTo(x+rx, y+ry);
    ctx.lineTo(x+rx+Math.sin(a)*len, y+ry-Math.cos(a)*len);
    ctx.stroke();
  }
  ctx.restore();
}

function draw(now){
  ctx.clearRect(0,0,300,420);
  const cx=150;
  const bob=Math.sin(now*0.0015)*1.5;

  ctx.save();
  ctx.translate(0,bob);

  // ── ТЕНЬ ──────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(cx,360,52,9,0,0,Math.PI*2); ctx.fill();

  // ── СТУПНИ ────────────────────────────────
  ctx.fillStyle='#3a2008';
  ctx.beginPath(); ctx.ellipse(cx-21,353,27,10,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+21,353,27,10,0.1,0,Math.PI*2); ctx.fill();
  // когти
  ctx.strokeStyle='#1a0e02'; ctx.lineWidth=2.5; ctx.lineCap='round';
  for(let s of[-1,1]){
    for(let i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.moveTo(cx+s*21+i*7,357);
      ctx.quadraticCurveTo(cx+s*21+i*8,364,cx+s*21+i*8,367);
      ctx.stroke();
    }
  }

  // ── ГОЛЕНИ (очень толстые) ────────────────
  const lc1='#2a1404';
  for(let s of[-1,1]){
    const lx=cx+s*21;
    const lg=ctx.createLinearGradient(lx-18,0,lx+18,0);
    lg.addColorStop(0,'#4a2808'); lg.addColorStop(0.5,'#8a5020'); lg.addColorStop(1,'#4a2808');
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.moveTo(lx-17,348); ctx.lineTo(lx-19,282);
    ctx.lineTo(lx+19,282); ctx.lineTo(lx+17,348);
    ctx.closePath(); ctx.fill();
    fur(lx,325,16,1.3,12,0,lc1,0.5,1+s*3);
    fur(lx,298,14,1.2,11,0,lc1,0.47,3+s*3);
  }

  // ── КОЛЕНИ ────────────────────────────────
  for(let s of[-1,1]){
    ctx.fillStyle='#3a1e06';
    ctx.beginPath(); ctx.ellipse(cx+s*21,282,22,15,0,0,Math.PI*2); ctx.fill();
    fur(cx+s*21,282,8,1.1,9,0,lc1,0.55,7+s);
  }

  // ── БЁДРА ─────────────────────────────────
  for(let s of[-1,1]){
    const lx=cx+s*21;
    const tg=ctx.createLinearGradient(lx-20,0,lx+20,0);
    tg.addColorStop(0,'#4a2808'); tg.addColorStop(0.5,'#7a4818'); tg.addColorStop(1,'#4a2808');
    ctx.fillStyle=tg;
    ctx.beginPath();
    ctx.moveTo(lx-19,275); ctx.bezierCurveTo(lx-23,252,lx-25,230,lx-23,208);
    ctx.lineTo(lx+23,208); ctx.bezierCurveTo(lx+25,230,lx+23,252,lx+19,275);
    ctx.closePath(); ctx.fill();
    fur(lx,255,14,1.2,12,0,lc1,0.48,9+s*2);
    fur(lx,225,12,1.1,11,0,lc1,0.45,11+s*2);
  }

  // ── ТОРС ──────────────────────────────────
  const torsoG=ctx.createRadialGradient(cx-14,158,10,cx,165,65);
  torsoG.addColorStop(0,'#c08040');
  torsoG.addColorStop(0.35,'#9a5e28');
  torsoG.addColorStop(0.7,'#6a3e14');
  torsoG.addColorStop(1,'#3a1e06');
  ctx.fillStyle=torsoG;
  ctx.beginPath();
  ctx.moveTo(cx-50,208);
  ctx.bezierCurveTo(cx-56,185,cx-60,158,cx-54,128);
  ctx.lineTo(cx+54,128);
  ctx.bezierCurveTo(cx+60,158,cx+56,185,cx+50,208);
  ctx.closePath(); ctx.fill();
  fur(cx,175,28,2.4,13,0,'#3a1e06',0.45,13);
  fur(cx,150,24,2.2,12,0,'#2e1604',0.42,14);
  fur(cx,198,22,2.0,11,0,'#3a1e06',0.40,15);
  fur(cx-44,162,14,1.0,11,-0.35,'#2a1404',0.48,16);
  fur(cx+44,162,14,1.0,11,0.35,'#2a1404',0.48,17);

  // Тёмные плечи
  for(let s of[-1,1]){
    const sdG=ctx.createRadialGradient(cx+s*44,126,5,cx+s*42,134,24);
    sdG.addColorStop(0,'#4a2808'); sdG.addColorStop(1,'#221002');
    ctx.fillStyle=sdG;
    ctx.beginPath(); ctx.ellipse(cx+s*42,132,24,20,s*0.15,0,Math.PI*2); ctx.fill();
  }

  // ── БАНДОЛЬЕР ─────────────────────────────
  ctx.save();
  // тень
  ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=17;
  ctx.beginPath(); ctx.moveTo(cx-32,112); ctx.bezierCurveTo(cx-20,148,cx+8,178,cx+30,208); ctx.stroke();
  // кожа
  ctx.strokeStyle='#7a4810'; ctx.lineWidth=14;
  ctx.beginPath(); ctx.moveTo(cx-32,112); ctx.bezierCurveTo(cx-20,148,cx+8,178,cx+30,208); ctx.stroke();
  ctx.strokeStyle='#9a5c18'; ctx.lineWidth=11;
  ctx.beginPath(); ctx.moveTo(cx-32,112); ctx.bezierCurveTo(cx-20,148,cx+8,178,cx+30,208); ctx.stroke();
  // блик
  ctx.strokeStyle='rgba(200,130,40,0.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-32,112); ctx.bezierCurveTo(cx-20,148,cx+8,178,cx+30,208); ctx.stroke();
  // металлические коробки
  for(let i=0;i<8;i++){
    const t=i/7;
    // приблизительная точка на кривой Безье
    const bx=cx-32+t*62, by=112+t*96-t*(1-t)*20;
    ctx.save(); ctx.translate(bx,by); ctx.rotate(0.38);
    ctx.fillStyle='#686e6e'; ctx.beginPath(); ctx.roundRect(-5,-4,10,7,1); ctx.fill();
    ctx.fillStyle='#8a9090'; ctx.beginPath(); ctx.roundRect(-4,-3,8,3,1); ctx.fill();
    ctx.fillStyle='#505656'; ctx.beginPath(); ctx.roundRect(-4,1,8,2,0); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // ── РУКИ (очень длинные, до колен) ────────
  const swing=Math.sin(now*0.0017)*4;
  for(let s of[-1,1]){
    const ax=cx+s*64;
    const sw=s===-1?swing:-swing;
    // плечо
    const uaG=ctx.createLinearGradient(ax-16,0,ax+16,0);
    uaG.addColorStop(0,'#4a2808'); uaG.addColorStop(0.5,'#8a5020'); uaG.addColorStop(1,'#3a1e08');
    ctx.fillStyle=uaG;
    ctx.beginPath(); ctx.ellipse(ax,148+sw,20,42,s*0.12,0,Math.PI*2); ctx.fill();
    fur(ax,122+sw,12,1.0,12,s*0.2,'#2a1404',0.48,20+s*5);
    fur(ax,170+sw,12,0.9,11,s*0.15,'#2a1404',0.44,22+s*5);
    // предплечье
    ctx.fillStyle=uaG;
    ctx.beginPath(); ctx.ellipse(ax+s*3,222+sw/2,18,38,s*0.1,0,Math.PI*2); ctx.fill();
    fur(ax+s*3,198+sw/2,10,0.8,10,s*0.1,'#2a1404',0.46,24+s*5);
    fur(ax+s*3,242+sw/2,10,0.8,10,s*0.1,'#2a1404',0.42,26+s*5);
    // лапа (большая)
    ctx.fillStyle='#3a1e08';
    ctx.beginPath(); ctx.ellipse(ax+s*4,268+sw,21,23,s*0.1,0,Math.PI*2); ctx.fill();
    fur(ax+s*4,268+sw,10,1.2,10,0,'#1e0e02',0.55,28+s*5);
    // когти лапы
    ctx.strokeStyle='#160a00'; ctx.lineWidth=2.5; ctx.lineCap='round';
    for(let i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.moveTo(ax+s*4+i*8,282+sw);
      ctx.quadraticCurveTo(ax+s*4+i*9,291+sw,ax+s*4+i*8,296+sw);
      ctx.stroke();
    }
  }

  // Bowcaster в правой руке
  ctx.save();
  ctx.translate(cx+72,266); ctx.rotate(-0.18);
  ctx.fillStyle='#1e1208'; ctx.beginPath(); ctx.roundRect(-5,-5,40,10,3); ctx.fill();
  ctx.fillStyle='#141010'; ctx.beginPath(); ctx.roundRect(18,-8,26,6,2); ctx.fill();
  ctx.fillStyle='#2a1e10'; ctx.beginPath(); ctx.roundRect(-2,-4,16,8,2); ctx.fill();
  ctx.strokeStyle='#2a2020'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(22,-8); ctx.lineTo(18,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,2); ctx.lineTo(18,12); ctx.stroke();
  ctx.strokeStyle='#505050'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(18,-18); ctx.lineTo(44,-2); ctx.lineTo(18,12); ctx.stroke();
  const eg=0.2+Math.sin(now*0.025)*0.15;
  ctx.fillStyle=`rgba(0,220,80,${eg})`; ctx.shadowColor='#00ee44'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(44,-2,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();

  // ── ШЕЯ ───────────────────────────────────
  const nkG=ctx.createLinearGradient(cx-14,0,cx+14,0);
  nkG.addColorStop(0,'#4a2808'); nkG.addColorStop(0.5,'#7a4818'); nkG.addColorStop(1,'#4a2808');
  ctx.fillStyle=nkG;
  ctx.beginPath(); ctx.roundRect(cx-14,112,28,22,5); ctx.fill();

  // ── ГОЛОВА ────────────────────────────────
  const hdG=ctx.createRadialGradient(cx-14,68,6,cx,75,40);
  hdG.addColorStop(0,'#b07838');
  hdG.addColorStop(0.38,'#8a5220');
  hdG.addColorStop(0.72,'#5a3410');
  hdG.addColorStop(1,'#341a06');
  ctx.fillStyle=hdG;
  ctx.beginPath(); ctx.ellipse(cx,75,38,34,0,0,Math.PI*2); ctx.fill();

  // мех головы
  fur(cx,54,18,2.2,14,0,'#2a1406',0.5,30);
  fur(cx,75,22,2.4,12,0,'#2e1606',0.42,31);
  fur(cx-32,73,10,0.8,10,-0.3,'#2a1406',0.48,32);
  fur(cx+32,73,10,0.8,10,0.3,'#2a1406',0.48,33);

  // ── ГРИВА (характерная для Вуки) ──────────
  ctx.fillStyle='#6a4012';
  ctx.beginPath();
  ctx.moveTo(cx-30,47);
  ctx.bezierCurveTo(cx-36,32,cx-26,18,cx,14);
  ctx.bezierCurveTo(cx+26,18,cx+36,32,cx+30,47);
  ctx.bezierCurveTo(cx+16,40,cx,38,cx-30,47);
  ctx.closePath(); ctx.fill();
  fur(cx,26,20,1.8,16,0,'#1e0e02',0.56,34);
  fur(cx-14,36,8,0.7,13,-0.15,'#1e0e02',0.5,35);
  fur(cx+14,36,8,0.7,13,0.15,'#1e0e02',0.5,36);
  fur(cx-6,20,6,0.5,18,-0.1,'#251205',0.56,37);
  fur(cx+6,20,6,0.5,18,0.1,'#251205',0.56,38);

  // Уши
  for(let s of[-1,1]){
    ctx.fillStyle='#4a2c0a';
    ctx.beginPath(); ctx.ellipse(cx+s*37,68,8,10,s*0.3,0,Math.PI*2); ctx.fill();
    fur(cx+s*37,68,6,0.5,8,s*0.3,'#1e0e02',0.52,39+s);
  }

  // ── НАДБРОВНЫЙ ВЫСТУП ─────────────────────
  ctx.fillStyle='#2e1808';
  ctx.beginPath();
  ctx.moveTo(cx-28,60);
  ctx.bezierCurveTo(cx-24,52,cx-12,49,cx,50);
  ctx.bezierCurveTo(cx+12,49,cx+24,52,cx+28,60);
  ctx.bezierCurveTo(cx+20,64,cx,65,cx-20,64);
  ctx.closePath(); ctx.fill();
  fur(cx,58,14,2.0,10,0,'#1a0e02',0.55,41);

  // ── МОРДА (выдающаяся вперёд) ─────────────
  const mzG=ctx.createRadialGradient(cx-5,84,3,cx,85,22);
  mzG.addColorStop(0,'#c09050');
  mzG.addColorStop(0.5,'#a07038');
  mzG.addColorStop(1,'#7a5020');
  ctx.fillStyle=mzG;
  ctx.beginPath(); ctx.ellipse(cx,84,22,16,0,0,Math.PI*2); ctx.fill();

  // ── НОС (большой, плоский, тёмный) ────────
  const nsG=ctx.createRadialGradient(cx-4,78,2,cx,78,14);
  nsG.addColorStop(0,'#1a0e04'); nsG.addColorStop(1,'#080402');
  ctx.fillStyle=nsG;
  ctx.beginPath(); ctx.ellipse(cx,77,14,10,0,0,Math.PI*2); ctx.fill();
  // ноздри
  ctx.fillStyle='#030201';
  ctx.beginPath(); ctx.ellipse(cx-6,78,5,4,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+6,78,5,4,0.2,0,Math.PI*2); ctx.fill();
  // блик на носу
  ctx.fillStyle='rgba(160,110,50,0.18)';
  ctx.beginPath(); ctx.ellipse(cx-5,74,3,2,0,0,Math.PI*2); ctx.fill();

  // ── ГЛАЗА (синие, глубокие) ───────────────
  const ep=0.9+Math.sin(now*0.002)*0.1;
  for(let s of[-1,1]){
    // впадина
    ctx.fillStyle='rgba(15,8,2,0.65)';
    ctx.beginPath(); ctx.ellipse(cx+s*14,64,10,8,s*0.1,0,Math.PI*2); ctx.fill();
    // белок
    ctx.fillStyle=`rgba(210,225,240,${ep*0.85})`;
    ctx.beginPath(); ctx.ellipse(cx+s*14,64,8,6,s*0.1,0,Math.PI*2); ctx.fill();
    // радужка (синяя)
    const iG=ctx.createRadialGradient(cx+s*14,64,0,cx+s*14,64,6);
    iG.addColorStop(0,'#6090c8'); iG.addColorStop(1,'#2050a0');
    ctx.fillStyle=iG; ctx.shadowColor='#4070b8'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(cx+s*14,64,6,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // зрачок
    ctx.fillStyle='#040608';
    ctx.beginPath(); ctx.arc(cx+s*14,64,3,0,Math.PI*2); ctx.fill();
    // блик
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.arc(cx+s*12.5,62.5,1.6,0,Math.PI*2); ctx.fill();
  }

  // ── РОТ — широко открытый, зубастый ───────
  const jy=93; // центр рта

  // тёмная глубина пасти
  ctx.fillStyle='#0e0602';
  ctx.beginPath();
  ctx.moveTo(cx-18,jy-4);
  ctx.quadraticCurveTo(cx,jy+7,cx+18,jy-4);
  ctx.quadraticCurveTo(cx,jy-16,cx-18,jy-4);
  ctx.closePath(); ctx.fill();

  // ── ВЕРХНИЕ ЗУБЫ ──────────────────────────
  ctx.fillStyle='#ede4c0';
  // левый большой клык
  ctx.beginPath(); ctx.moveTo(cx-17,jy-4); ctx.lineTo(cx-13,jy+7); ctx.lineTo(cx-9,jy-4); ctx.closePath(); ctx.fill();
  // левый малый
  ctx.beginPath(); ctx.moveTo(cx-8,jy-4); ctx.lineTo(cx-5,jy+2); ctx.lineTo(cx-2,jy-4); ctx.closePath(); ctx.fill();
  // правый малый
  ctx.beginPath(); ctx.moveTo(cx+2,jy-4); ctx.lineTo(cx+5,jy+2); ctx.lineTo(cx+8,jy-4); ctx.closePath(); ctx.fill();
  // правый большой клык
  ctx.beginPath(); ctx.moveTo(cx+9,jy-4); ctx.lineTo(cx+13,jy+7); ctx.lineTo(cx+17,jy-4); ctx.closePath(); ctx.fill();

  // ── НИЖНИЕ ЗУБЫ ───────────────────────────
  ctx.fillStyle='#e0d8b0';
  // левый нижний клык
  ctx.beginPath(); ctx.moveTo(cx-14,jy-4); ctx.lineTo(cx-10,jy-13); ctx.lineTo(cx-6,jy-4); ctx.closePath(); ctx.fill();
  // центральный
  ctx.beginPath(); ctx.moveTo(cx-2,jy-4); ctx.lineTo(cx+1,jy-10); ctx.lineTo(cx+4,jy-4); ctx.closePath(); ctx.fill();
  // правый нижний клык
  ctx.beginPath(); ctx.moveTo(cx+6,jy-4); ctx.lineTo(cx+10,jy-13); ctx.lineTo(cx+14,jy-4); ctx.closePath(); ctx.fill();

  // дёсны
  ctx.fillStyle='rgba(130,45,25,0.55)';
  ctx.beginPath(); ctx.ellipse(cx,jy-4,17,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(110,35,18,0.4)';
  ctx.beginPath(); ctx.ellipse(cx,jy-2,13,2.5,0,0,Math.PI*2); ctx.fill();

  // контур рта
  ctx.strokeStyle='#1e0c04'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-18,jy-4); ctx.quadraticCurveTo(cx,jy-17,cx+18,jy-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-18,jy-4); ctx.quadraticCurveTo(cx,jy+8,cx+18,jy-4); ctx.stroke();

  ctx.restore(); // конец bob translate

  // ── ПОДПИСИ ───────────────────────────────
  ctx.textAlign='center';
  ctx.font='bold 13px Arial';
  ctx.fillStyle='#c8a040'; ctx.shadowColor='#906020'; ctx.shadowBlur=8;
  ctx.fillText('🦁 ВУКИ-ВОИН',cx,372); ctx.shadowBlur=0;
  ctx.font='bold 16px Arial';
  ctx.strokeStyle='rgba(0,0,0,.95)'; ctx.lineWidth=3.5;
  ctx.strokeText('Чубакка',cx,388);
  ctx.fillStyle='#e8c870'; ctx.shadowColor='#b08030'; ctx.shadowBlur=6;
  ctx.fillText('Чубакка',cx,388); ctx.shadowBlur=0;
  ctx.font='bold 12px Arial';
  ctx.strokeText('❤️ 300',cx,403); ctx.fillStyle='#ff6688'; ctx.fillText('❤️ 300',cx,403);
  ctx.strokeText('⚔️ 45',cx,417); ctx.fillStyle='#88ccff'; ctx.fillText('⚔️ 45',cx,417);
}

function loop(now){ draw(now); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
