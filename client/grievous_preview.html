<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>General Grievous Preview</title>
<style>
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="340" height="480"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawGrievous(cx, cy, now) {
  ctx.save();
  ctx.translate(cx, cy);

  const t = now * 0.001;
  const bodyBob = Math.sin(t * 1.6) * 1.5;
  const cloakSwing = Math.sin(t * 1.2) * 3;

  // === SHADOW ===
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 88, 28, 6, 0, 0, Math.PI*2); ctx.fill();

  // === CLOAK ===
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(-26, -55 + bodyBob);
  ctx.bezierCurveTo(-34+cloakSwing, -20, -36+cloakSwing, 20, -30+cloakSwing, 88);
  ctx.lineTo(30-cloakSwing, 88);
  ctx.bezierCurveTo(36-cloakSwing, 20, 34-cloakSwing, -20, 26, -55+bodyBob);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 0.8; ctx.stroke();

  // === MECHANICAL LEGS ===
  // Left leg (reverse-jointed)
  ctx.fillStyle = '#8a8a8a';
  ctx.beginPath(); ctx.roundRect(-16, 30+bodyBob, 10, 28, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  // knee joint
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(-11, 60+bodyBob, 7, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  // shin (angled forward)
  ctx.fillStyle = '#8a8a8a';
  ctx.save(); ctx.translate(-11, 60+bodyBob); ctx.rotate(0.25);
  ctx.beginPath(); ctx.roundRect(-4, 0, 9, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  // foot/claw
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.ellipse(2, 27, 10, 4, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#444'; ctx.stroke();
  ctx.restore();

  // Right leg
  ctx.fillStyle = '#8a8a8a';
  ctx.beginPath(); ctx.roundRect(6, 30+bodyBob, 10, 28, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(11, 60+bodyBob, 7, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.fillStyle = '#8a8a8a';
  ctx.save(); ctx.translate(11, 60+bodyBob); ctx.rotate(-0.25);
  ctx.beginPath(); ctx.roundRect(-4, 0, 9, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.ellipse(-2, 27, 10, 4, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#444'; ctx.stroke();
  ctx.restore();

  // === TORSO ===
  const torsoG = ctx.createLinearGradient(-18, -60, 18, 30);
  torsoG.addColorStop(0, '#c8c8c0');
  torsoG.addColorStop(0.4, '#a8a8a0');
  torsoG.addColorStop(1, '#888880');
  ctx.fillStyle = torsoG;
  ctx.beginPath(); ctx.roundRect(-18, -60+bodyBob, 36, 92, 6); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
  // Torso plate lines
  ctx.strokeStyle = '#666'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-14, -40+bodyBob); ctx.lineTo(14, -40+bodyBob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14, -20+bodyBob); ctx.lineTo(14, -20+bodyBob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -60+bodyBob); ctx.lineTo(0, 30+bodyBob); ctx.stroke();
  // Chest center light
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath(); ctx.arc(0, -35+bodyBob, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath(); ctx.arc(0, -35+bodyBob, 3, 0, Math.PI*2); ctx.fill();

  // === 4 ARMS ===
  // Arms split from shoulders: 2 upper arms each split into 2 forearms

  const armAngle1 = Math.sin(t * 1.5) * 0.08;
  const armAngle2 = Math.sin(t * 1.5 + 1) * 0.08;

  // --- LEFT SIDE: 2 arms ---
  // Upper left arm (main)
  ctx.save();
  ctx.translate(-18, -48+bodyBob);

  // Upper arm 1 (top-left)
  ctx.save(); ctx.rotate(-0.6 + armAngle1);
  ctx.fillStyle = '#9a9a92';
  ctx.beginPath(); ctx.roundRect(-5, 0, 9, 28, 4); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(0, 29, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  // Forearm 1
  ctx.save(); ctx.translate(0, 30); ctx.rotate(-0.3);
  ctx.fillStyle = '#8a8a82';
  ctx.beginPath(); ctx.roundRect(-4, 0, 8, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  // Hand/grip
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(0, 28, 4, 0, Math.PI*2); ctx.fill();
  // LIGHTSABER BLUE
  const sf1 = 0.8 + Math.sin(t*4)*0.2;
  ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 20*sf1;
  ctx.fillStyle = `rgba(100,200,255,${sf1})`;
  ctx.beginPath(); ctx.roundRect(-2, 28, 4, 52, 2); ctx.fill();
  ctx.fillStyle = `rgba(200,240,255,${sf1*0.9})`;
  ctx.beginPath(); ctx.roundRect(-1, 28, 2, 50, 1); ctx.fill();
  ctx.shadowBlur = 0;
  // Hilt
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.roundRect(-3, 24, 6, 8, 2); ctx.fill();
  ctx.restore();
  ctx.restore();

  // Upper arm 2 (bottom-left)
  ctx.save(); ctx.rotate(-0.2 + armAngle2);
  ctx.fillStyle = '#9a9a92';
  ctx.beginPath(); ctx.roundRect(-5, 0, 9, 28, 4); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(0, 29, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.save(); ctx.translate(0, 30); ctx.rotate(-0.15);
  ctx.fillStyle = '#8a8a82';
  ctx.beginPath(); ctx.roundRect(-4, 0, 8, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(0, 28, 4, 0, Math.PI*2); ctx.fill();
  // LIGHTSABER GREEN
  const sf2 = 0.8 + Math.sin(t*4+1)*0.2;
  ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 20*sf2;
  ctx.fillStyle = `rgba(100,255,150,${sf2})`;
  ctx.beginPath(); ctx.roundRect(-2, 28, 4, 52, 2); ctx.fill();
  ctx.fillStyle = `rgba(200,255,220,${sf2*0.9})`;
  ctx.beginPath(); ctx.roundRect(-1, 28, 2, 50, 1); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.roundRect(-3, 24, 6, 8, 2); ctx.fill();
  ctx.restore();
  ctx.restore();

  ctx.restore(); // left shoulder

  // --- RIGHT SIDE: 2 arms ---
  ctx.save();
  ctx.translate(18, -48+bodyBob);

  // Upper arm 3 (top-right)
  ctx.save(); ctx.rotate(0.6 - armAngle1);
  ctx.fillStyle = '#9a9a92';
  ctx.beginPath(); ctx.roundRect(-4, 0, 9, 28, 4); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(0, 29, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.save(); ctx.translate(0, 30); ctx.rotate(0.3);
  ctx.fillStyle = '#8a8a82';
  ctx.beginPath(); ctx.roundRect(-4, 0, 8, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(0, 28, 4, 0, Math.PI*2); ctx.fill();
  // LIGHTSABER GREEN
  const sf3 = 0.8 + Math.sin(t*4+2)*0.2;
  ctx.shadowColor = '#00ff44'; ctx.shadowBlur = 20*sf3;
  ctx.fillStyle = `rgba(100,255,150,${sf3})`;
  ctx.beginPath(); ctx.roundRect(-2, 28, 4, 52, 2); ctx.fill();
  ctx.fillStyle = `rgba(200,255,220,${sf3*0.9})`;
  ctx.beginPath(); ctx.roundRect(-1, 28, 2, 50, 1); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.roundRect(-3, 24, 6, 8, 2); ctx.fill();
  ctx.restore();
  ctx.restore();

  // Upper arm 4 (bottom-right)
  ctx.save(); ctx.rotate(0.2 - armAngle2);
  ctx.fillStyle = '#9a9a92';
  ctx.beginPath(); ctx.roundRect(-4, 0, 9, 28, 4); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(0, 29, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.save(); ctx.translate(0, 30); ctx.rotate(0.15);
  ctx.fillStyle = '#8a8a82';
  ctx.beginPath(); ctx.roundRect(-4, 0, 8, 26, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.stroke();
  ctx.fillStyle = '#777';
  ctx.beginPath(); ctx.arc(0, 28, 4, 0, Math.PI*2); ctx.fill();
  // LIGHTSABER BLUE
  const sf4 = 0.8 + Math.sin(t*4+3)*0.2;
  ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 20*sf4;
  ctx.fillStyle = `rgba(100,200,255,${sf4})`;
  ctx.beginPath(); ctx.roundRect(-2, 28, 4, 52, 2); ctx.fill();
  ctx.fillStyle = `rgba(200,240,255,${sf4*0.9})`;
  ctx.beginPath(); ctx.roundRect(-1, 28, 2, 50, 1); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#444';
  ctx.beginPath(); ctx.roundRect(-3, 24, 6, 8, 2); ctx.fill();
  ctx.restore();
  ctx.restore();

  ctx.restore(); // right shoulder

  // === NECK ===
  ctx.fillStyle = '#7a7a72';
  ctx.beginPath(); ctx.roundRect(-6, -68+bodyBob, 12, 12, 3); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();

  // === HEAD (elongated skull) ===
  // Skull shape
  const headG = ctx.createRadialGradient(-3, -90+bodyBob, 3, 0, -88+bodyBob, 22);
  headG.addColorStop(0, '#d0d0c4');
  headG.addColorStop(0.6, '#b0b0a4');
  headG.addColorStop(1, '#888880');
  ctx.fillStyle = headG;
  // Elongated head
  ctx.beginPath();
  ctx.moveTo(-14, -68+bodyBob);
  ctx.bezierCurveTo(-18, -80+bodyBob, -18, -108+bodyBob, -8, -116+bodyBob);
  ctx.bezierCurveTo(-4, -120+bodyBob, 4, -120+bodyBob, 8, -116+bodyBob);
  ctx.bezierCurveTo(18, -108+bodyBob, 18, -80+bodyBob, 14, -68+bodyBob);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();

  // Skull ridge lines
  ctx.strokeStyle = '#777'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-10, -72+bodyBob); ctx.bezierCurveTo(-12, -90+bodyBob, -10, -108+bodyBob, -6, -114+bodyBob); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -72+bodyBob); ctx.bezierCurveTo(12, -90+bodyBob, 10, -108+bodyBob, 6, -114+bodyBob); ctx.stroke();

  // Jaw/lower face plate
  ctx.fillStyle = '#9a9a90';
  ctx.beginPath(); ctx.roundRect(-12, -76+bodyBob, 24, 12, 4); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.lineWidth = 0.8; ctx.stroke();

  // Teeth
  ctx.fillStyle = '#ddd';
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath(); ctx.roundRect(i*3.5-1.5, -74+bodyBob, 3, 5, 1); ctx.fill();
  }

  // Eyes (glowing yellow-green)
  const eyeGlow = 0.75 + 0.25 * Math.sin(t * 3.5);
  let eyeG = ctx.createRadialGradient(-7, -88+bodyBob, 1, -7, -88+bodyBob, 6);
  eyeG.addColorStop(0, `rgba(255,240,50,${eyeGlow})`);
  eyeG.addColorStop(0.5, `rgba(200,180,0,${eyeGlow*0.8})`);
  eyeG.addColorStop(1, 'rgba(100,80,0,0.2)');
  ctx.fillStyle = eyeG;
  ctx.beginPath(); ctx.ellipse(-7, -88+bodyBob, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#554400'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = `rgba(50,30,0,${eyeGlow})`;
  ctx.beginPath(); ctx.ellipse(-7, -88+bodyBob, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();

  eyeG = ctx.createRadialGradient(7, -88+bodyBob, 1, 7, -88+bodyBob, 6);
  eyeG.addColorStop(0, `rgba(255,240,50,${eyeGlow})`);
  eyeG.addColorStop(0.5, `rgba(200,180,0,${eyeGlow*0.8})`);
  eyeG.addColorStop(1, 'rgba(100,80,0,0.2)');
  ctx.fillStyle = eyeG;
  ctx.beginPath(); ctx.ellipse(7, -88+bodyBob, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#554400'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = `rgba(50,30,0,${eyeGlow})`;
  ctx.beginPath(); ctx.ellipse(7, -88+bodyBob, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();

  // Eye sockets (dark around eyes)
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(-7, -88+bodyBob, 9, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, -88+bodyBob, 9, 7, 0, 0, Math.PI*2); ctx.fill();
  // re-draw eyes on top
  eyeG = ctx.createRadialGradient(-7, -88+bodyBob, 1, -7, -88+bodyBob, 6);
  eyeG.addColorStop(0, `rgba(255,240,50,${eyeGlow})`);
  eyeG.addColorStop(1, 'rgba(100,80,0,0.0)');
  ctx.fillStyle = eyeG;
  ctx.beginPath(); ctx.ellipse(-7, -88+bodyBob, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  eyeG = ctx.createRadialGradient(7, -88+bodyBob, 1, 7, -88+bodyBob, 6);
  eyeG.addColorStop(0, `rgba(255,240,50,${eyeGlow})`);
  eyeG.addColorStop(1, 'rgba(100,80,0,0.0)');
  ctx.fillStyle = eyeG;
  ctx.beginPath(); ctx.ellipse(7, -88+bodyBob, 6, 4, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function loop() {
  ctx.clearRect(0, 0, 340, 480);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, 340, 480);
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('General Grievous', 170, 30);
  drawGrievous(170, 230, Date.now());
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
