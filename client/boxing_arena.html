<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>🥊 Boxing Arena</title>
<style>
  html, body { width:100vw; height:100vh; margin:0; background:#000; overflow:hidden; font-family:Arial,sans-serif; }
  #wrap { position:absolute; left:0; top:0; width:600px; height:1000px; transform-origin:0 0; }
  canvas { display:block; background:#000; }
  .ui-btn { position: fixed; z-index: 99999; width: 26px; height: 26px; font-size: 12px; background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #backBtn  { top: calc(50% - 62px); right: 10px; }
  #voiceBtn { top: calc(50% - 13px); right: 10px; }
  #fsBtn    { top: calc(50% + 36px); right: 10px; }
  #statusBadge { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; padding: 4px 12px; border-radius: 8px; border: 2px solid #555; background: rgba(0,0,0,0.78); color: #AAA; white-space: nowrap; z-index: 99999; display: none; }
  #statusBadge.live  { color: #00FF88; border-color: #00FF88; }
  #statusBadge.demo  { color: #FF9900; border-color: #FF9900; }
  #statusBadge.error { color: #FF4444; border-color: #FF4444; }
</style>
</head>
<body>
<button id="backBtn"  class="ui-btn" title="Главное меню">⌂</button>
<button id="voiceBtn" class="ui-btn" title="Озвучка">🔇</button>
<button id="fsBtn"    class="ui-btn" title="На весь экран">⛶</button>
<div id="statusBadge"></div>
<div id="ratingOverlay" style="position:fixed;top:27%;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:none;background:rgba(0,0,0,0.88);border:2px solid rgba(255,80,80,0.5);border-radius:10px;padding:8px 16px 10px;font-family:Arial,sans-serif;min-width:180px;text-align:center;"></div>
<div id="wrap"><canvas id="c" width="600" height="1000"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const CW = canvas.width;

function applyScale(){
  const vw = document.documentElement.clientWidth || window.innerWidth;
  const vh = document.documentElement.clientHeight || window.innerHeight;
  const s = Math.min(vw/600, vh/1000);
  const x = (vw - 600*s)/2, y = (vh - 1000*s)/2;
  wrap.style.transform = `translate(${x}px,${y}px) scale(${s})`;
}
window.addEventListener('resize', applyScale);
applyScale();

// ── Бойцы: ТОЛЬКО два показателя — Энергия (жизнь/выносливость) и Сила (урон) ──
// Сердечки убраны — Энергия теперь одновременно и здоровье, и ресурс на удар.
// likeEnergy/likePower — растут ТОЛЬКО от лайков, с потолком (1000 / 100).
// giftEnergy/giftPower — растут от донатов, БЕЗ потолка.
// energy = likeEnergy + giftEnergy, power = likePower + giftPower.
const LIKE_ENERGY_CAP = 1000, LIKE_POWER_CAP = 100;

// боец без лайков/донатов 15 минут подряд — Сила начинает капать (-1/сек,
// не ниже 1); любой новый лайк/донат сбрасывает таймер (см. applyGrowth)
const INACTIVITY_MS = 15*60*1000;
const POWER_DECAY_INTERVAL_MS = 1000;

// stolenEnergy — очки из ОТДЕЛЬНОЙ БД (all-time): сколько энергии боец
// отнял у противников за все бои (начисляется когда противник падает).
// Это метрика для ТОП-листа, отдельная от текущей энергии/силы в бою.

// 7 готовых перекрасок спрайта (dir=папка с кадрами, color=цвет ника) —
// используются и для реальных игроков (при создании по первому лайку/
// донату), и для ботов, берутся случайно из общего пула.
const SKIN_VARIANTS = [
  { dir:'boxer_v1_red',    color:'#ff5566' },
  { dir:'boxer_v2_blue',   color:'#4fa8ff' },
  { dir:'boxer_v3_green',  color:'#5fe36a' },
  { dir:'boxer_v4_purple', color:'#c26bff' },
  { dir:'boxer_v5_gold',   color:'#ffd24f' },
  { dir:'boxer_v6_cyan',   color:'#4fe3d0' },
  { dir:'boxer_v7_pink',   color:'#ff6fc0' },
];
function randomSkin(){ return SKIN_VARIANTS[Math.floor(Math.random()*SKIN_VARIANTS.length)]; }

// ростер бойцов стартует ПУСТЫМ — реальные бойцы появляются по первому
// лайку/донату конкретного зрителя (см. applyGrowth ниже); пока их <2 на
// ринге, слоты подсаживаются ботами (см. секцию ботов ниже).
const VARIANTS = [];

// ── Геометрия экрана: плашка сверху, ринг ниже ──
const PANEL_TOP = 14, PANEL_H = 236;
const WALL_TOP = PANEL_TOP + PANEL_H + 10;
const FLOOR_TOP = 480, FLOOR_BOT = 1000;

// зона движения — пол ринга, с отступом от канатов/краёв
const RING = { xMin:75, xMax:525, yMin:FLOOR_TOP+45, yMax:FLOOR_BOT-35 };
const KO_FALL_MS = 1600;  // сколько играет анимация падения перед исчезновением
const FIGHT_DIST = 68;

// раунды — чисто визуальный таймер поверх непрерывного боя (не влияет на
// нокауты/выбывание): каждые 3 минуты объявляется лучший ЭТОГО раунда,
// бойцы расходятся по углам, проходит девушка с табличкой номера раунда,
// после 12-го раунда счёт идёт заново с 1. Нокаутированный боец пропадает
// с ринга насовсем и НЕ оживает автоматически по раунду — возврат бойца
// на ринг приходит от нового лайка/доната этого же зрителя (см. applyGrowth).
const ROUND_DURATION_MS = 3*60*1000;
const ROUND_TOTAL = 12;
const ROUND_GIRL_MS = 4600;

// ── Анимации: наборы кадров на боксёра (idle/walk/punch×3/hurt/ko) ──
const ANIM_DEFS = {
  idle:     { dir:'idle',        prefix:'__Boxer2_Idle_',     count:10, fps:8,  loop:true  },
  walk:     { dir:'walk_fwd',    prefix:'__Boxer2_Forward_',  count:10, fps:10, loop:true  },
  walkBack: { dir:'walk_back',   prefix:'__Boxer2_Backward_', count:10, fps:10, loop:true  },
  punch1: { dir:'punch1',      prefix:'__Boxer2_Punch1_',   count:8,  fps:18, loop:false },
  punch2: { dir:'punch2',      prefix:'__Boxer2_Punch2_',   count:8,  fps:18, loop:false },
  punch3: { dir:'punch3',      prefix:'__Boxer2_Punch3_',   count:8,  fps:18, loop:false },
  hurt:   { dir:'hurt/1-Hurt', prefix:'__Boxer2_Hurt1_',    count:8,  fps:14, loop:false },
  ko:     { dir:'ko',          prefix:'__Boxer2_KO_',       count:8,  fps:10, loop:false },
};
function loadFrames(dir){
  const out = {};
  for (const key in ANIM_DEFS){
    const a = ANIM_DEFS[key];
    out[key] = [];
    for (let i=0;i<a.count;i++){
      const img = new Image();
      img.src = `sprites/${dir}/${a.dir}/${a.prefix}${String(i).padStart(3,'0')}.png`;
      out[key].push(img);
    }
  }
  return out;
}

const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

// общая инициализация рантайм-полей бойца — используется и для стартовых
// (демо-)игроков, и для ботов, добавляемых в ростер динамически
function initFighterRuntime(v, x, y){
  v.x = x; v.y = y;
  v.tx = x; v.ty = y;
  v.state = 'idle'; v.stateTimer = 0;
  v.animName = 'idle'; v.frameIdx = 0; v.frameTimer = 0;
  v.facing = 1;
  v.lean = 0;
  v.punchCooldown = Math.random()*600;
  v.wanderPause = Math.random()*800;
  v.inExchange = false;
  v.koTimer = 0;
  v.alive = true;
  v.eliminated = false; // true = совсем убран с ринга (энергия кончилась)
  v.lastAttacker = null;
  v.roundStartStolen = v.stolenEnergy || 0; // снимок для подсчёта победителя раунда
  v.frames = loadFrames(v.dir);
}

// ── Реальные игроки: создаются/растут по лайкам и донатам из живого чата ──
// (см. WebSocket-секцию ниже). Если боец уже был нокаутирован и пропал с
// ринга — новый лайк/донат от того же зрителя возвращает его в бой.
function spawnRingPos(){
  return {
    x: RING.xMin + Math.random()*(RING.xMax-RING.xMin),
    y: RING.yMin + Math.random()*(RING.yMax-RING.yMin),
  };
}

function findRealFighter(username){
  return VARIANTS.find(v=>!v.isBot && v.name===username);
}

// gain: { likeEnergy?, likePower?, giftEnergy?, giftPower? } — прибавка от
// одного события; likeEnergy/likePower идут в потолок (см. LIKE_*_CAP),
// giftEnergy/giftPower — без потолка. isGift — донат это или лайк (влияет
// на то, какой фразой диктор это объявит; обычные лайки на уже живого
// бойца молчат — иначе диктор захлёбывался бы каждым лайком).
function applyGrowth(username, gain, isGift){
  if (!username) return;
  let v = findRealFighter(username);
  const isNew = !v;
  if (!v){
    const skin = randomSkin();
    const pos = spawnRingPos();
    v = {
      dir: skin.dir, name: username, color: skin.color, isBot: false,
      likeEnergy: 0, giftEnergy: 0, likePower: 0, giftPower: 0, stolenEnergy: 0,
      powerDecayAcc: 0,
    };
    v.energyMax = 0; v.energy = 0; v.powerMax = 0; v.power = 0;
    initFighterRuntime(v, pos.x, pos.y);
    VARIANTS.push(v);
  }

  // любой лайк/донат — признак активности зрителя, сбрасывает таймер
  // бездействия (см. INACTIVITY_MS / decayInactivePower в update())
  v.lastActiveAt = Date.now();

  if (gain.likeEnergy) v.likeEnergy = Math.min(LIKE_ENERGY_CAP, v.likeEnergy + gain.likeEnergy);
  if (gain.likePower)  v.likePower  = Math.min(LIKE_POWER_CAP,  v.likePower  + gain.likePower);
  if (gain.giftEnergy) v.giftEnergy += gain.giftEnergy;
  if (gain.giftPower)  v.giftPower  += gain.giftPower;

  // energy/power растут ТОЛЬКО на величину новой прибавки — урон, полученный
  // в бою, должен оставаться в силе, а не откатываться следующим лайком.
  const newEnergyMax = v.likeEnergy + v.giftEnergy;
  const gainedEnergy = Math.max(0, newEnergyMax - v.energyMax);
  v.energyMax = newEnergyMax;

  const newPowerMax = v.likePower + v.giftPower;
  const gainedPower = Math.max(0, newPowerMax - (v.powerMax||0));
  v.powerMax = newPowerMax;

  const wasDown = !v.alive || v.eliminated;
  if (wasDown){
    // боец был выбит с ринга — новый лайк/донат возвращает его в бой,
    // но со свежими показателями (старые уже обнулены в collapse())
    const pos = spawnRingPos();
    v.alive = true; v.eliminated = false;
    v.energy = v.energyMax;
    v.power = v.powerMax;
    v.state = 'idle'; v.frameIdx = 0;
    v.x = pos.x; v.y = pos.y; v.tx = pos.x; v.ty = pos.y;
    pushEvent(pick(REVIVE_LINES)(cleanNickForSpeech(v.name)), true);
  } else {
    v.energy = Math.min(v.energyMax, v.energy + gainedEnergy);
    v.power = Math.min(v.powerMax, v.power + gainedPower);
  }

  if (isNew && !wasDown) pushEvent(pick(JOIN_LINES)(cleanNickForSpeech(v.name)), true);
  else if (isGift && !wasDown) pushEvent(pick(GIFT_LINES)(cleanNickForSpeech(v.name)), true);
  // обычный лайк на уже живого бойца — молча, диктор не озвучивает каждый лайк
}

function onLike(username){ applyGrowth(username, { likeEnergy:10, likePower:1 }, false); }
function onGift(username, coins){
  coins = Math.max(1, Math.floor(Number(coins)||1));
  applyGrowth(username, { giftEnergy:100*coins, giftPower:10*coins }, true);
}

// ── Админ-буст (команды "power"/"super power"/"boost ник hp dmg" в чате,
// доступны только создателю игры — проверка на сервере в server.js) ──
// Приходит тем же сообщением arena_cheat, что и в arena2/arena3: hp → Энергия,
// damage → Сила. Даём как донат (giftEnergy/giftPower — без потолка,
// applyGrowth сам оживит бойца, если тот был в нокауте).
function applyCheat(username, hp, damage){
  if (!username) return;
  applyGrowth(username, { giftEnergy: Math.max(0,hp|0), giftPower: Math.max(0,damage|0) }, false);
  pushEvent(`⚡ АДМИН-БУСТ! @${cleanNickForSpeech(username)} +${hp|0}⚡ +${damage|0}💪`, true);
}

// ── Боты: подсаживаются на ринг, только если реальных игроков < 2 ──
const BOT_NAMES = ['sparring_bob','rookie_max','punchbag_joe','iron_mike_jr','left_hook_al','glass_jaw_ed','rocky_clone','tin_man','no_name_ned','jab_master','duck_n_cover','sandbag_sam'];
const MAX_FIGHTERS = 10;
const MAX_BOTS = 3; // на ринге одновременно не больше 3 ботов
const BOT_CHECK_MS = 15000;
const BOT_ENERGY = 100, BOT_POWER = 5;
let botSpawnTimer = BOT_CHECK_MS;

function getBotName(){
  const used = new Set(VARIANTS.map(v=>v.name));
  const available = BOT_NAMES.filter(n=>!used.has(n));
  const pool = available.length ? available : BOT_NAMES;
  return pool[Math.floor(Math.random()*pool.length)];
}

function spawnBot(){
  if (VARIANTS.filter(v=>!v.eliminated).length >= MAX_FIGHTERS) return;
  if (VARIANTS.filter(v=>v.isBot && !v.eliminated).length >= MAX_BOTS) return;
  const skin = randomSkin();
  const v = {
    dir: skin.dir,
    name: getBotName(),
    color: '#9aa0a6',
    isBot: true,
    energyMax: BOT_ENERGY, energy: BOT_ENERGY, power: BOT_POWER,
    stolenEnergy: 0,
  };
  const pos = spawnRingPos();
  initFighterRuntime(v, pos.x, pos.y);
  VARIANTS.push(v);
  // боты не объявляются диктором — тишина, только реальные бойцы на слуху
}

// каждые 15 сек: если реальных игроков на ринге < 2 — подсаживаем 1 или 2 бота
function updateBotSpawns(dt){
  botSpawnTimer -= dt;
  if (botSpawnTimer > 0) return;
  botSpawnTimer = BOT_CHECK_MS;
  const realOnRing = VARIANTS.filter(v=>!v.isBot && v.alive && !v.eliminated).length;
  if (realOnRing >= 2) return;
  const count = Math.random()<0.5 ? 1 : 2;
  for (let i=0; i<count; i++) spawnBot();
}

let roundNum = 1;
let roundTimer = ROUND_DURATION_MS;
let roundGirl = null; // {t} — активна во время прохода девушки с табличкой

// ── События + озвучка — архитектура как в arena2.html: очередь фраз,
// такт задаёт РЕАЛЬНОЕ окончание речи (не фиксированный таймер), в паузах
// диктор сам рассказывает правила/шутки. Боты никогда не озвучиваются —
// это фильтруется на месте вызова (см. collapse/spawnBot), а не здесь.
let vQueue = [];       // очередь {text, urgent} — то что реально будет сказано/показано
let vSpeaking = false;
let vQuietPool = [];
let vQuietTimer = null;
let currentEvent = null; // {text, timer, max} — для баннера (drawEventBanner)

// правила — озвучиваются в паузах вперемешку с шутками (как RULES в arena2)
const RULES = [
  'Ставь лайки — твой боец получает энергию и силу!',
  'Кидай донат — чем больше монет, тем сильнее удар твоего бойца!',
  'Напиши в чате слово рейтинг — узнаешь своё место в топе!',
  'Нокаутированный боец вернётся в бой, если его снова лайкнуть или задонатить!',
  'Забыл про бойца на 15 минут? Его Сила начнёт слабеть — лайкни, чтобы не терять форму!',
];
const FILLER = [
  'Бой продолжается — не моргайте!',
  'На ринге как-то тихо... бойцы заскучали без лайков!',
  'Зрители уже взяли попкорн — а бойцы всё ждут вас!',
  'Боец без доната — как боец без перчаток. Помоги ему!',
  'Рефери свистит просто от скуки — оживите бой лайком!',
  'Чем больше донат — тем больнее удар. Инвестируй в боль!',
  'Кто-то там точно метит в Короли ринга!',
  'Разогрев продолжается — лайки решают исход боя!',
  'Тренер что-то кричит с трибун... неразборчиво, но громко!',
  'Груша в углу скучает — бойцам бы такую мотивацию!',
  'Один лайк — и твой боец на шаг ближе к победе!',
  'Наш диктор питается лайками. Без них он грустнеет. Как сейчас, например.',
  'Три секунды тишины. Четыре. Пять. Окей, это уже неловко.',
  'Секретный способ стать легендой ринга: донатить. Больше секретов нет, всё просто.',
];
function nextQuietPhrase(){
  if (vQuietPool.length===0) vQuietPool = [...RULES, ...FILLER].sort(()=>Math.random()-0.5);
  return vQuietPool.shift();
}

// вход в бой (новый реальный боец), донат на уже живого бойца, возврат
// после нокаута — три разных повода, три разных набора фраз (с шутками)
const JOIN_LINES = [
  n=>`Встречайте на ринге — ${n}!`,
  n=>`${n} выходит на ринг! Похлопаем!`,
  n=>`Новый боец — ${n}! Надевай перчатки!`,
  n=>`${n} на ринге! Разминка окончена, начинаем!`,
  n=>`О! ${n} в деле! Добро пожаловать в самый безумный бой тиктока!`,
];
const GIFT_LINES = [
  n=>`${n} не жалеет монет! Удар становится больнее!`,
  n=>`${n} вложился в победу! Соперникам не позавидуешь!`,
  n=>`${n} прокачался донатом! Берегитесь, соперники!`,
  n=>`${n} только что купил себе лишние килограммы силы!`,
  n=>`Касса ринга пополнилась! ${n} готовится к разрушению!`,
  n=>`Экономисты плачут. ${n} смеётся. Его боец растёт!`,
];
const REVIVE_LINES = [
  n=>`${n} возвращается в бой!`,
  n=>`${n} поднялся с канвата и снова на ринге!`,
  n=>`Нашатырь подействовал — ${n} снова в деле!`,
  n=>`${n} не сдаётся! Возвращение на ринг!`,
];

// urgent=true — обрывает текущую фразу и говорит сразу (как donation-хайп
// в arena2), обычные события просто встают в очередь
function pushEvent(text, urgent){
  if (urgent){
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    vSpeaking = false;
    vQueue.unshift(text);
    if (vQueue.length>12) vQueue.length = 12;
  } else {
    vQueue.push(text);
    if (vQueue.length>12) vQueue.shift();
  }
  vSpeakNext();
}

function estimateSpeechMs(text){
  return Math.min(7000, Math.max(2200, text.length*75));
}

function vSpeakNext(){
  if (vSpeaking) return;
  if (vQueue.length===0){ vScheduleQuiet(); return; }
  clearTimeout(vQuietTimer);
  const text = vQueue.shift();
  vSpeaking = true;
  const dur = estimateSpeechMs(text);
  currentEvent = { text, timer: dur, max: dur };
  if (voiceEnabled && window.speechSynthesis){
    speak(text, ()=>{ vSpeaking=false; setTimeout(vSpeakNext, 400); });
  } else {
    setTimeout(()=>{ vSpeaking=false; vSpeakNext(); }, dur);
  }
}

// в паузах (10 сек без событий) диктор сам рассказывает правила/шутки
function vScheduleQuiet(){
  clearTimeout(vQuietTimer);
  vQuietTimer = setTimeout(()=>{
    if (vSpeaking || vQueue.length>0) return;
    vQueue.push(nextQuietPhrase());
    vSpeakNext();
  }, 10000);
}

function hash(n){ const s = Math.sin(n*127.1)*43758.5453; return s - Math.floor(s); }

const CROWD_SKIN = ['#e8b48a','#c98a5e','#8a5a3a','#f0c8a0','#7a4a2e','#d9a373'];
const CROWD_HAIR  = ['#1a1220','#2a1c30','#3a2418','#241c3a','#150f1c','#000000'];
const CROWD_SHIRT = ['#3a2b52','#2e2347','#4a2e2e','#243a3a','#2e2e4a','#3a3a2e','#5c2e3a'];

function drawCrowdRow(t, w, baseY, count, rSize, phase, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  for (let i = 0; i < count; i++) {
    const seed = i + phase*37;
    const x = (i + 0.5) * (w / count) + (hash(seed*1.7) - 0.5) * (w/count) * 0.5;
    const bob = Math.sin(t/520 + seed*3.1) * 2.2;
    const y = baseY + bob;
    const r = rSize + (hash(seed*2.3) - 0.5) * rSize * 0.3;

    const shirt = CROWD_SHIRT[Math.floor(hash(seed*4.1) * CROWD_SHIRT.length)];
    const skin  = CROWD_SKIN[Math.floor(hash(seed*5.9) * CROWD_SKIN.length)];
    const hair  = CROWD_HAIR[Math.floor(hash(seed*7.3) * CROWD_HAIR.length)];

    // плечи/тело
    ctx.fillStyle = shirt;
    ctx.beginPath();
    ctx.arc(x, y + r*1.35, r*1.25, Math.PI, 0);
    ctx.fill();

    // голова
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();

    // причёска (верхняя дуга темнее)
    ctx.fillStyle = hair;
    ctx.beginPath();
    ctx.arc(x, y - r*0.15, r*1.02, Math.PI*1.05, Math.PI*1.95);
    ctx.fill();

    // глаза
    const eyeDX = r*0.36, eyeY = y + r*0.08, eyeR = Math.max(0.8, r*0.14);
    ctx.fillStyle = '#1a1015';
    ctx.beginPath(); ctx.arc(x - eyeDX, eyeY, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + eyeDX, eyeY, eyeR, 0, Math.PI*2); ctx.fill();

    // рот — открытый овал (типа кричит/болеет)
    ctx.fillStyle = 'rgba(120,30,30,0.7)';
    ctx.beginPath();
    ctx.ellipse(x, y + r*0.5, r*0.22, r*0.16, 0, 0, Math.PI*2);
    ctx.fill();

    // блик для объёма
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.beginPath();
    ctx.arc(x - r*0.35, y - r*0.3, r*0.35, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Озвучка (архитектура как в arena2.html) ──
let voiceEnabled = false, _cachedVoice = null;

function getRuVoice(){
  if(_cachedVoice) return _cachedVoice;
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  _cachedVoice = voices.find(v=>/pavel/i.test(v.name))
    || voices.find(v=>/ru/i.test(v.lang) && /male/i.test(v.name))
    || voices.find(v=>/ru[-_]/i.test(v.lang))
    || voices.find(v=>/ru/i.test(v.lang))
    || voices.find(v=>v.default)
    || voices[0] || null;
  return _cachedVoice;
}
// диктор должен читать только буквы никнейма — без "@" и без смайликов/
// эмодзи (у ников бывают любые декоративные символы из TikTok)
function speakClean(text){
  return text
    .replace(/[\u{1F1E6}-\u{1F1FF}\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2300}-\u{23FF}\u{2B00}-\u{2BFF}\u{FE0F}\u{200D}]/gu, '')
    .replace(/@/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}
// ник в TikTok может содержать ЛЮБЫЕ декоративные символы (рамки, звёздочки,
// зачёркнутые/жирные unicode-буквы, диакритику) — для озвучки оставляем
// только буквы/цифры самого ника, остальное диктор не должен произносить.
// NFKD раскладывает декоративные unicode-буквы (полноширинные, зачёркнутые,
// в кружочках и т.п.) обратно в обычные буквы перед фильтрацией.
function cleanNickForSpeech(name){
  return String(name||'')
    .normalize('NFKD')
    .replace(/[_.\-]+/g, ' ')
    .replace(/[^\p{L}\p{N} ]+/gu, '')
    .replace(/\s+/g, ' ')
    .trim();
}
// как speakText в arena2: onDone вызывается по РЕАЛЬНОМУ завершению речи
// (или через 8с как страховка) — этим тактом живёт вся очередь vQueue
function speak(text, onDone){
  const done = onDone || (()=>{});
  if(!voiceEnabled || !window.speechSynthesis){ done(); return; }
  const clean = speakClean(text);
  const u = new SpeechSynthesisUtterance(clean);
  const v = getRuVoice();
  if(v) u.voice = v;
  u.lang = 'ru-RU'; u.rate = 1.08; u.volume = 1;
  let finished = false;
  const finish = ()=>{ if(finished) return; finished = true; done(); };
  u.onend = u.onerror = finish;
  setTimeout(finish, 8000);
  try{ window.speechSynthesis.speak(u); }catch(e){ finish(); }
}

// ── Звуки боя (удары/нокаут) — синтезируются на лету, без файлов ──
let audioCtx = null;
function getAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playPunchSound(){
  if (!voiceEnabled) return;
  const ac = getAudioCtx(); const now = ac.currentTime;

  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(55, now+0.09);
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+0.13);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(now); osc.stop(now+0.14);

  const bufSize = Math.floor(ac.sampleRate*0.06);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1)*(1-i/bufSize);
  const noise = ac.createBufferSource(); noise.buffer = buf;
  const noiseGain = ac.createGain();
  noiseGain.gain.setValueAtTime(0.3, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now+0.06);
  noise.connect(noiseGain); noiseGain.connect(ac.destination);
  noise.start(now);
}
function playKOSound(){
  if (!voiceEnabled) return;
  const ac = getAudioCtx(); const now = ac.currentTime;
  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(38, now+0.5);
  gain.gain.setValueAtTime(0.32, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+0.55);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(now); osc.stop(now+0.6);
}

// ── Живое подключение к TikTok-чату (как в arena2/arena3) ──
// Сервер шлёт общие "arena_*" события на весь стрим — тут выбираем только
// нужные и растим/спавним реальных бойцов. Синтетические demo-события
// игнорируются (_gameMode!=='tiktok') — пока эфир не идёт, ринг держат боты.
let _ws = null, _wsUser = '', _gameMode = 'connecting';

function setStatus(cls, text){
  const el = document.getElementById('statusBadge');
  if (!el) return;
  el.style.display = 'block';
  el.className = cls;
  el.textContent = text;
}

function wsConnect(username){
  _wsUser = username;
  if (_ws && _ws.readyState < 2){ _ws.onclose = null; _ws.close(); }
  const proto = location.protocol==='https:' ? 'wss:' : 'ws:';
  _ws = new WebSocket(`${proto}//${location.host}?username=${encodeURIComponent(username)}`);
  _ws.onopen = ()=> setStatus('connecting', '⏳ @'+username+'…');
  _ws.onmessage = (e)=>{
    try {
      const d = JSON.parse(e.data);
      if (d.type==='init' || d.type==='status'){
        const m = d.tiktokMode || d.mode;
        _gameMode = m || 'connecting';
        if (m==='tiktok') setStatus('live', '🔴 LIVE @'+(d.username||username));
        else if (m==='demo') setStatus('demo', '🟡 Ожидание эфира…');
        else setStatus('connecting', '⏳ @'+username+'…');
      }
      if (d.type==='arena_like' && _gameMode==='tiktok') onLike(d.username);
      if (d.type==='arena_gift' && _gameMode==='tiktok') onGift(d.username, d.coins);
      if (d.type==='arena_cheat' && _gameMode==='tiktok') applyCheat(d.username, d.hp, d.damage);
      if (d.type==='top_boxing') _dbTop = (d.data||[]).map(p=>({ username:p.username, stolen:p.total_stolen }));
      if (d.type==='arena_boxing_rating'){
        _showRating(d.rank
          ? `<span style="color:#FF6688;font-size:16px;font-weight:bold;">📊 @${d.username}<br><span style="color:#FFD700">#${d.rank} место · ⚡${d.stolen} отнятой энергии</span></span>`
          : `<span style="color:#AAA;font-size:15px;">📊 @${d.username}<br>пока не в рейтинге</span>`);
      }
    } catch(err){ console.error('[boxing ws]', err); }
  };
  _ws.onclose = ()=>{ setStatus('error', '❌ Disconnected…'); setTimeout(()=>wsConnect(_wsUser), 3000); };
  _ws.onerror = ()=>{};
}

// отдельное всплывающее окошко под ответ на "rating" из чата (как в

// нога как объёмная сужающаяся форма (бедро→колено→икра→щиколотка), а не
// просто линия — даёт куда более естественный силуэт при ходьбе
function drawGirlLeg(ctx, hipX, footX, bulgeDir, skinGrad){
  const kneeY=-40, ankleY=-6, footY=0;
  const hipW=6.5, kneeW=4.3, ankleW=2.6;
  const kneeX = (hipX+footX)/2 + bulgeDir*3;
  ctx.beginPath();
  ctx.moveTo(hipX-hipW,-70);
  ctx.quadraticCurveTo(kneeX-kneeW-1, kneeY, footX-ankleW, ankleY);
  ctx.lineTo(footX-ankleW*1.3, footY);
  ctx.lineTo(footX+ankleW*1.3, footY);
  ctx.lineTo(footX+ankleW, ankleY);
  ctx.quadraticCurveTo(kneeX+kneeW+1, kneeY, hipX+hipW, -70);
  ctx.closePath();
  ctx.fillStyle = skinGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1; ctx.stroke();
  // каблук
  ctx.strokeStyle = '#221'; ctx.lineWidth = 2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(footX, footY); ctx.lineTo(footX+bulgeDir*3, footY+6); ctx.stroke();
}

// девушка с табличкой номера раунда — проходит через ринг между раундами
function drawRoundGirl() {
  if (!roundGirl) return;
  const p = clamp(roundGirl.t / ROUND_GIRL_MS, 0, 1);
  const x = -60 + p*(CW+120);
  const y = RING.yMax - 130; // ниже в ринге, ближе к камере — с учётом удвоенного роста
  const bob = Math.sin(roundGirl.t/150)*3;
  const walk = Math.sin(roundGirl.t/130);   // шаг ног
  const sway = Math.sin(roundGirl.t/130 + 0.5)*2.5; // покачивание бёдрами/волосами
  const armSwing = Math.sin(roundGirl.t/130 + Math.PI)*4; // естественный взмах свободной руки

  const hair1 = '#f6d16a', hair2 = '#e0a83a';
  const suit = '#ff2d78', suitDk = '#d61f61';

  ctx.save();
  ctx.translate(x, y+bob);
  ctx.scale(2, 2); // в два раза крупнее
  ctx.lineCap = 'round';

  // объёмная светотень кожи: свет слева, тень справа — единая для всех частей тела
  const skinGrad = ctx.createLinearGradient(-15,0,15,0);
  skinGrad.addColorStop(0, '#ffe3c2');
  skinGrad.addColorStop(0.55, '#f0c39a');
  skinGrad.addColorStop(1, '#d9a373');

  // тень на полу
  ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 2, 15, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // задняя (дальняя) нога — чуть темнее и тоньше, читается как дальний план
  ctx.save(); ctx.globalAlpha = 0.85;
  drawGirlLeg(ctx, -3, -3 - walk*13, -1, skinGrad);
  ctx.restore();

  // купальник-низ
  ctx.fillStyle = suit;
  ctx.beginPath(); ctx.ellipse(sway*0.3, -71, 8, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = suitDk; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-6,-73); ctx.quadraticCurveTo(sway*0.3,-68,6,-73); ctx.stroke();

  // передняя (ближняя) нога — поверх дальней
  drawGirlLeg(ctx, 3, 3 + walk*13, 1, skinGrad);

  // торс — плавная талия/бёдра (естественные пропорции "песочные часы")
  ctx.fillStyle = skinGrad;
  ctx.beginPath();
  ctx.moveTo(-8, -72);
  ctx.quadraticCurveTo(-10+sway*0.3, -86, -5, -100);
  ctx.lineTo(5, -100);
  ctx.quadraticCurveTo(10+sway*0.3, -86, 8, -72);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  // лёгкая тень под грудью/талией для объёма
  ctx.strokeStyle = 'rgba(160,90,60,0.35)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(-6,-90); ctx.quadraticCurveTo(0,-87,6,-90); ctx.stroke();

  // дальняя рука — свободно покачивается вдоль тела при ходьбе
  ctx.strokeStyle = skinGrad; ctx.lineWidth = 4.5;
  ctx.beginPath(); ctx.moveTo(-7,-98); ctx.quadraticCurveTo(-14+armSwing*0.5,-84,-12+armSwing,-66); ctx.stroke();

  // купальник-топ с тонкими бретельками на шею
  ctx.strokeStyle = suit; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(-5,-105); ctx.lineTo(-3,-112); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-105); ctx.lineTo(3,-112); ctx.stroke();
  const cupGrad = ctx.createRadialGradient(-6,-102,1,-5,-100,7);
  cupGrad.addColorStop(0, '#ff6fa8'); cupGrad.addColorStop(1, suit);
  ctx.fillStyle = cupGrad;
  ctx.beginPath(); ctx.ellipse(-5,-100,6.5,5.5,0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-100,6.5,5.5,-0.15,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = suitDk; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(-5,-100,6.5,5.5,0.15,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(5,-100,6.5,5.5,-0.15,0,Math.PI*2); ctx.stroke();

  // шея
  ctx.fillStyle = skinGrad; ctx.fillRect(-2,-108,4,8);

  // длинные светлые волосы за спиной — послойно, с прядями для объёма
  ctx.fillStyle = hair2;
  ctx.beginPath();
  ctx.moveTo(-8,-120);
  ctx.quadraticCurveTo(-16,-102,-12+sway*0.5,-76);
  ctx.quadraticCurveTo(-7,-84,-7,-104);
  ctx.quadraticCurveTo(-8,-116,-3,-122);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8,-120);
  ctx.quadraticCurveTo(16,-102,12+sway*0.5,-76);
  ctx.quadraticCurveTo(7,-84,7,-104);
  ctx.quadraticCurveTo(8,-116,3,-122);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = hair1;
  ctx.beginPath();
  ctx.moveTo(-7,-119);
  ctx.quadraticCurveTo(-13,-102,-10+sway*0.5,-80);
  ctx.quadraticCurveTo(-7,-90,-6,-105);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(7,-119);
  ctx.quadraticCurveTo(13,-102,10+sway*0.5,-80);
  ctx.quadraticCurveTo(7,-90,6,-105);
  ctx.closePath(); ctx.fill();
  // отдельные пряди поверх для текстуры
  ctx.strokeStyle = 'rgba(200,140,30,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-9,-115); ctx.quadraticCurveTo(-13,-98,-10+sway*0.5,-82); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9,-115); ctx.quadraticCurveTo(13,-98,10+sway*0.5,-82); ctx.stroke();

  // голова
  ctx.fillStyle = skinGrad;
  ctx.beginPath(); ctx.arc(0,-116,8.5,0,Math.PI*2); ctx.fill();

  // лицо: брови, глаза, губы, румянец
  ctx.fillStyle = '#7a5230';
  ctx.beginPath(); ctx.ellipse(-3.4,-117.5,1.6,0.5,-0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3.4,-117.5,1.6,0.5,0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1c12';
  ctx.beginPath(); ctx.ellipse(-3.2,-115.5,1,1.3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3.2,-115.5,1,1.3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,120,140,0.35)';
  ctx.beginPath(); ctx.ellipse(-5,-112.5,1.6,1,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-112.5,1.6,1,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c1667a'; ctx.lineWidth = 1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,-110.5); ctx.quadraticCurveTo(0,-109.3,2,-110.5); ctx.stroke();

  // чёлка поверх лица
  ctx.fillStyle = hair2;
  ctx.beginPath(); ctx.arc(0,-119,8.8,Math.PI*1.02,Math.PI*1.98); ctx.fill();
  ctx.fillStyle = hair1;
  ctx.beginPath(); ctx.arc(0,-120,8.5,Math.PI*1.1,Math.PI*1.55); ctx.fill();

  // ближняя рука — поднята, держит табличку
  ctx.strokeStyle = skinGrad; ctx.lineWidth = 4.8;
  ctx.beginPath(); ctx.moveTo(7,-100); ctx.quadraticCurveTo(19,-114,23,-132); ctx.stroke();
  ctx.fillStyle = skinGrad;
  ctx.beginPath(); ctx.arc(23,-133,2.6,0,Math.PI*2); ctx.fill();

  // табличка с номером раунда
  ctx.save();
  ctx.translate(29,-150);
  ctx.rotate(-0.04);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(-22,-15,48,34);
  ctx.fillStyle = 'rgba(255,255,255,0.97)';
  ctx.fillRect(-24,-17,48,34);
  ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2;
  ctx.strokeRect(-24,-17,48,34);
  ctx.fillStyle = '#111'; ctx.textAlign = 'center';
  ctx.font = 'bold 10px Arial';
  ctx.fillText('РАУНД', 0, -3);
  ctx.font = 'bold 17px Arial Black';
  ctx.fillText(String(roundNum), 0, 14);
  ctx.restore();

  ctx.restore();
}

function formatRoundTime(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function drawEventBanner() {
  if (!currentEvent) return;
  const { text, timer, max } = currentEvent;
  const fadeIn = Math.min(1, (max-timer)/350);
  const fadeOut = Math.min(1, timer/350);
  const alpha = Math.min(fadeIn, fadeOut);
  if (alpha<=0) return;

  const y = WALL_TOP + 40;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 19px Arial Black';
  ctx.textAlign = 'center';
  const tw = Math.min(ctx.measureText(text).width, CW-40);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(CW/2 - tw/2 - 14, y-24, tw+28, 34);
  ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 4;
  ctx.strokeText(text, CW/2, y, CW-40);
  ctx.fillStyle = '#ffcf4d';
  ctx.fillText(text, CW/2, y, CW-40);
  ctx.restore();
}

function drawCrowd(t, w, wallBot) {
  drawCrowdRow(t, w, wallBot-52, Math.round(w/34), 8, 1, 0.55);  // дальний ряд — мельче, тусклее
  drawCrowdRow(t, w, wallBot-22, Math.round(w/26), 11, 2, 0.9);  // ближний ряд — крупнее, ярче
}

// кирпичная кладка на стене — читается как зал бокса, а не абстрактный фон
function drawBrickWall(w, top, bot) {
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  const brickH = 17, brickW = 44;
  let row = 0;
  for (let y = top; y < bot; y += brickH) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    const offset = (row % 2) * brickW/2;
    for (let x = -offset; x < w; x += brickW) {
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,Math.min(y+brickH,bot)); ctx.stroke();
    }
    row++;
  }
  ctx.restore();
}

// боксёрская груша, свисающая с потолка зала
function drawHeavyBag(cx, topY, h) {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx,topY); ctx.lineTo(cx,topY+16); ctx.stroke();
  const g = ctx.createLinearGradient(cx-15,0,cx+15,0);
  g.addColorStop(0,'#4a1010'); g.addColorStop(0.5,'#7a1f1f'); g.addColorStop(1,'#3a0c0c');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(cx-14, topY+16);
  ctx.quadraticCurveTo(cx-18, topY+16+h*0.5, cx-12, topY+16+h);
  ctx.lineTo(cx+12, topY+16+h);
  ctx.quadraticCurveTo(cx+18, topY+16+h*0.5, cx+14, topY+16);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.moveTo(cx,topY+16); ctx.lineTo(cx,topY+16+h); ctx.stroke();
  [0.3,0.62].forEach(f=>{
    ctx.beginPath(); ctx.ellipse(cx, topY+16+h*f, 13*(1-f*0.2), 3, 0, 0, Math.PI*2); ctx.stroke();
  });
  ctx.restore();
}

// пара перчаток, повешенных на шнурках на гвоздь — деталь раздевалки зала
function drawHangingGloves(cx, topY) {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5;
  [-6,6].forEach(dx=>{
    ctx.beginPath(); ctx.moveTo(cx, topY); ctx.lineTo(cx+dx, topY+20); ctx.stroke();
  });
  [[-6,'#c1121f'],[6,'#e63946']].forEach(([dx,col])=>{
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(cx+dx, topY+30, 9, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(cx+dx, topY+22, 6, 5, 0, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawBackground(t) {
  const w = canvas.width;
  const wallBot = FLOOR_TOP - 60;

  const sky = ctx.createLinearGradient(0,WALL_TOP,0,wallBot);
  sky.addColorStop(0, '#2b2140');
  sky.addColorStop(1, '#4a3763');
  ctx.fillStyle = sky;
  ctx.fillRect(0,WALL_TOP,w,wallBot-WALL_TOP);

  drawBrickWall(w, WALL_TOP, wallBot);
  drawHeavyBag(w*0.14, WALL_TOP+6, 52);
  drawHangingGloves(w*0.86, WALL_TOP+8);

  ctx.save();
  ctx.globalAlpha = 0.10;
  for (const cx of [w*0.18, w*0.5, w*0.82]) {
    const grad = ctx.createLinearGradient(cx,WALL_TOP,cx,wallBot);
    grad.addColorStop(0,'#fff'); grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx-70,WALL_TOP); ctx.lineTo(cx+70,WALL_TOP); ctx.lineTo(cx+150,wallBot); ctx.lineTo(cx-150,wallBot);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  ctx.fillStyle = '#1b1530';
  ctx.fillRect(0, wallBot-76, w, 76);
  drawCrowd(t, w, wallBot);

  ctx.strokeStyle = '#e63946';
  ctx.lineWidth = 5;
  [FLOOR_TOP-40, FLOOR_TOP-25, FLOOR_TOP-10].forEach(y=>{
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  });

  ctx.fillStyle = '#c1121f';
  ctx.fillRect(16, FLOOR_TOP-55, 12, 60);
  ctx.fillRect(w-28, FLOOR_TOP-55, 12, 60);

  const floor = ctx.createLinearGradient(0,FLOOR_TOP,0,FLOOR_BOT);
  floor.addColorStop(0,'#e0d3b8');
  floor.addColorStop(1,'#c9b98f');
  ctx.fillStyle = floor;
  ctx.fillRect(0,FLOOR_TOP,w,FLOOR_BOT-FLOOR_TOP);

  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 16;
  for (let x=-FLOOR_BOT; x<w+FLOOR_BOT; x+=42) {
    ctx.beginPath(); ctx.moveTo(x,FLOOR_BOT); ctx.lineTo(x+(FLOOR_BOT-FLOOR_TOP)*0.4,FLOOR_TOP); ctx.stroke();
  }
}

    ctx.strokeText(r.text, 8, rY + i*rStep, CW/2 - 10);
    ctx.fillStyle = r.color;
    ctx.fillText(r.text, 8, rY + i*rStep, CW/2 - 10);

  // раунд + обратный отсчёт — под правилами, тут как раз есть свободное место
  const roundY = rY + rules.length*rStep;

  ctx.strokeText(roundLabel, 8, roundY, CW/2-10);

  ctx.font = 'bold 24px Arial Black';
  ctx.strokeStyle = 'rgba(0,0,0,0.9)'; ctx.lineWidth = 4.5;

  // _dbTop, не сбрасывается между боями/стримами), НЕ текущая сила/энергия боя
  const top = _dbTop.slice(0,5).map(p=>({ name:p.username, stolenEnergy:p.stolen }));
  const rankColors = ['#FFD700','#C0C0C0','#CD7F32','#AAAAAA','#666666'];
  const ranks = ['👑','2.','3.','4.','5.'];
  const tX = CW/2 + 8, tY = T+88, tStep = 31;

    ctx.font = i===0 ? 'bold 21px Arial Black' : 'bold 19px Arial Black';

    ctx.strokeText(ranks[i], tX, y);
    ctx.fillStyle=rankColors[i];
    ctx.fillText(ranks[i], tX, y);
    ctx.strokeText(p.name, tX+26, y, 148);

    ctx.fillText(p.name, tX+26, y, 148);

    ctx.fillStyle='#7fd3ff'; ctx.fillText('⚡'+p.stolenEnergy, CW-8, y);
  }
  ctx.font = '9px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.textAlign = 'center'; ctx.fillText('all-time отнятая энергия', CW*0.75, T+TH-6);
}

// все бойцы ОДНОГО размера (как totalSc в arena2) — глубина влияет только на позицию/порядок отрисовки, не на масштаб
const FIGHTER_SCALE = 0.85;

function drawFighter(v) {
  if (v.eliminated) return; // насовсем исчез с ринга

  const s = FIGHTER_SCALE;
  const cx = v.x, floorY = v.y;
  const img = (v.frames[v.animName] || v.frames.idle)[v.frameIdx];

  ctx.save();
  ctx.globalAlpha = v.alive ? 0.25 : 0.15;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx, floorY, 28*s, 7*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  const baseH = 130*s;
  let dh = baseH;
  if (img && img.complete && img.naturalWidth) {
    // некоторые кадры удара сильно шире (вытянутая рука) — ограничиваем
    // ширину, а не растягиваем, чтобы не было "кляксы"; масштаб равномерный
    const maxW = baseH*1.55;
    let scale = baseH / img.naturalHeight;
    if (img.naturalWidth*scale > maxW) scale = maxW/img.naturalWidth;
    const dw = img.naturalWidth*scale;
    dh = img.naturalHeight*scale;
    ctx.save();
    ctx.translate(cx, floorY);
    ctx.rotate(v.lean||0); // лёгкий наклон в сторону движения — заменяет отсутствующий цикл ходьбы
    if (v.facing < 0) ctx.scale(-1,1);
    ctx.drawImage(img, -dw/2, -dh+8, dw, dh);
    ctx.restore();
  }

  const headTopY = floorY - dh + 8;
  const labelY = headTopY - 16*s;

  ctx.textAlign = 'center';
  ctx.font = `bold ${16*s}px Arial Black`;
  const tag = v.isBot ? '🤖' : '';
  const nameTxt = v.alive ? tag+v.name : tag+v.name+' 💤';

  // тёмная подложка под ником — читаемость не зависит от цвета фона за спиной
  const nameW = ctx.measureText(nameTxt).width;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(cx - nameW/2 - 6*s, labelY - 14*s, nameW + 12*s, 18*s);

  ctx.fillStyle = v.alive ? v.color : '#888';
  ctx.strokeStyle = 'rgba(0,0,0,0.95)';
  ctx.lineWidth = 4.5;
  ctx.strokeText(nameTxt, cx, labelY);
  ctx.fillText(nameTxt, cx, labelY);

  // ⚡ Энергия и 💪 Сила — в стиле _drawLabels из arena3.html (сердечки убраны — Энергия теперь и есть здоровье)
  ctx.font = `bold ${13*s}px Arial`;
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.9)';
  const enTxt = `❤️ ${Math.max(0,v.energy)}`;
  ctx.strokeText(enTxt, cx, labelY + 18*s);
  ctx.fillStyle = '#FF6688'; ctx.fillText(enTxt, cx, labelY + 18*s);

  const pwTxt = `💪 ${v.power}`;
  ctx.strokeText(pwTxt, cx, labelY + 33*s);
  ctx.fillStyle = '#ff9d5c'; ctx.fillText(pwTxt, cx, labelY + 33*s);
}

// ── Игровая логика: движение по рингу, столкновения, урон, нокаут ──
// урон наносит ТОЛЬКО тот, кто реально попал (один "победитель обмена" за
// столкновение, не оба одновременно — так реалистичнее)
// урон = Сила атакующего напрямую (Сила и Энергия растут из одного
// источника лайки/донаты, так что шкалы соразмерны)
function damageFor(power){ return Math.max(1, power); }

function advanceAnim(v, dt){
  const key = v.state==='walk' ? 'walk'
    : v.state==='punch' ? v.animName
    : v.state==='hurt' ? 'hurt'
    : v.state==='ko' ? 'ko'
    : 'idle';
  const def = ANIM_DEFS[key];
  v.frameTimer += dt;
  const frameDur = 1000/def.fps;
  if (v.frameTimer >= frameDur){
    v.frameTimer -= frameDur;
    v.frameIdx++;
    if (v.frameIdx >= def.count) v.frameIdx = def.loop ? 0 : def.count-1;
  }
  v.animName = key;
}

const ROUND_RESULT_LINES = [
  (n,rd,d)=>`🏆 Раунд ${rd}: ${n} — лучший этим раундом! (+${d}⚡)`,
  (n,rd,d)=>`👊 Раунд ${rd} за ${n} — больше всех навешал! (+${d}⚡)`,
  (n,rd,d)=>`🎖️ ${n} выигрывает раунд ${rd}! (+${d}⚡)`,
  (n,rd,d)=>`🔥 Раунд ${rd}: все смотрели на ${n}! (+${d}⚡)`,
];
const NO_LEADER_LINES = [
  rd=>`🔔 Раунд ${rd} завершён — тишина на ринге...`,
  rd=>`😴 Раунд ${rd} прошёл вяло — где лайки?`,
];

// разводит живых бойцов по разным углам/бокам ринга на время прохода
// девушки с табличкой — чисто визуальная пауза, бой не сбрасывается
function sendFightersToCorners(){
  const alive = VARIANTS.filter(v=>v.alive && !v.eliminated);
  const rows = Math.max(1, Math.ceil(alive.length/2));
  alive.forEach((v,i)=>{
    const side = i%2===0 ? RING.xMin+35 : RING.xMax-35;
    const row = Math.floor(i/2);
    const y = RING.yMin + (row+0.5) * ((RING.yMax-RING.yMin)/rows);
    v.tx = side; v.ty = clamp(y, RING.yMin, RING.yMax);
    v.wanderPause = ROUND_GIRL_MS + 300;
  });
}

// раунд — таймер поверх непрерывного боя: победитель раунда = кто больше
// всех отжал энергии у соперников ИМЕННО за этот раунд (не all-time счёт).
// Снимок очков хранится на самом бойце (v.roundStartStolen), а не по
// индексу массива — ростер меняется динамически из-за подсадки ботов.
// Боты не участвуют в подсчёте победителя раунда (не в рейтинге).
function endRound(){
  let best = null, bestDelta = 0;
  VARIANTS.forEach(v=>{
    if (v.isBot) return;
    const delta = v.stolenEnergy - (v.roundStartStolen||0);
    if (delta > bestDelta){ bestDelta = delta; best = v; }
  });
  if (best) pushEvent(pick(ROUND_RESULT_LINES)(cleanNickForSpeech(best.name), roundNum, bestDelta), true);
  else pushEvent(pick(NO_LEADER_LINES)(roundNum), true);

  sendFightersToCorners();
  roundGirl = { t: 0 };

  roundNum = roundNum >= ROUND_TOTAL ? 1 : roundNum + 1;
  VARIANTS.forEach(v=>{ v.roundStartStolen = v.stolenEnergy; });
  roundTimer = ROUND_DURATION_MS;
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const KO_LINES = [
  (w,l,st)=>`⚔️ ${w} нокаутировал ${l}! (+${st}⚡)`,
  (w,l,st)=>`💥 ${w} впечатал ${l} в канаты! (+${st}⚡)`,
  (w,l,st)=>`🥊 ${l} досчитался до десяти от ${w}! (+${st}⚡)`,
  (w,l,st)=>`😵 ${w} выключил свет для ${l}! (+${st}⚡)`,
  (w,l,st)=>`🌟 ${l} увидел звёзды после удара ${w}! (+${st}⚡)`,
  (w,l,st)=>`🏥 ${l} отправляется в нокдаун стараниями ${w}! (+${st}⚡)`,
];
const TIRED_LINES = [
  l=>`💦 ${l} выдохся и упал!`,
  l=>`🥵 ${l} сдулся без сил!`,
  l=>`😮‍💨 ${l} рухнул от истощения!`,
  l=>`🫠 ${l} закончился раньше боя!`,
];

function collapse(loser, winner){
  if (!loser.alive) return;
  loser.alive = false;
  loser.state = 'ko'; loser.animName = 'ko'; loser.frameIdx = 0; loser.frameTimer = 0;
  loser.koTimer = KO_FALL_MS;
  playKOSound();

  // нокаут обнуляет ВСЮ накопленную статистику реального бойца (не только
  // текущую энергию) — следующий лайк/донат от этого зрителя стартует его
  // заново с нуля, а не восстанавливает прежнюю силу
  if (!loser.isBot){
    loser.likeEnergy = 0; loser.giftEnergy = 0;
    loser.likePower = 0; loser.giftPower = 0;
    loser.energyMax = 0; loser.energy = 0;
    loser.powerMax = 0; loser.power = 0;
  }
  if (winner){
    const stolen = damageFor(winner.power) + 100;
    winner.stolenEnergy += stolen;
    // боты не пишутся в БД/рейтинг — очки за победу над кем угодно
    // засчитываются только реальному зрителю-победителю
    if (!winner.isBot) reportStolen(winner.name, stolen);
    // диктор объявляет только реальных победителей — бот-победитель молчит
    if (!winner.isBot) pushEvent(pick(KO_LINES)(cleanNickForSpeech(winner.name), cleanNickForSpeech(loser.name), stolen), true);
  } else if (!loser.isBot) {
    pushEvent(pick(TIRED_LINES)(cleanNickForSpeech(loser.name)), true);
  }
}

// как в arena2.html: при столкновении бьют ОБА (не один случайный
// атакующий), удар ничего не стоит — ограничен только кулдауном между
// обменами. Урон = Сила напрямую, пропущенный удар ослабляет Силу
// защищавшегося на 30% от урона (в arena2 — 40%, тут 30% по договорённости).
// За один обмен каждый может попасть серией 1-3 ударов — но НЕ одним кадром:
// удары розыгрываются по одному, по очереди между бойцами, так что на
// экране видно ровно столько попаданий, сколько было по факту.
let activeExchanges = [];
const PUNCH_TICK_MS = 240; // пауза между отдельными ударами внутри серии

function startExchange(a, b){
  a.punchCooldown = 999999; b.punchCooldown = 999999;
  a.inExchange = true; b.inExchange = true;
  a.facing = b.x>=a.x ? -1 : 1;
  b.facing = a.x>=b.x ? -1 : 1;

  const hits = 1 + Math.floor(Math.random()*3);
  const queue = [];
  for (let i=0; i<hits; i++){
    // порядок внутри пары рандомный, а не всегда "a первый" - иначе тот,
    // кто оказался a по индексу спавна, всегда бьёт раньше и может убить
    // соперника до того, как дойдёт очередь до его ответного удара
    if (Math.random() < 0.5){
      queue.push({ attacker:a, defender:b });
      queue.push({ attacker:b, defender:a });
    } else {
      queue.push({ attacker:b, defender:a });
      queue.push({ attacker:a, defender:b });
    }
  }
  activeExchanges.push({ a, b, queue, idx:0, timer:0 });
}

function throwPunch(attacker, defender){
  const punchNames = ['punch1','punch2','punch3'];
  attacker.state='punch'; attacker.animName=punchNames[Math.floor(Math.random()*3)]; attacker.frameIdx=0; attacker.frameTimer=0; attacker.stateTimer=PUNCH_TICK_MS;
  defender.state='hurt'; defender.animName='hurt'; defender.frameIdx=0; defender.frameTimer=0; defender.stateTimer=PUNCH_TICK_MS;
  attacker.facing = defender.x>=attacker.x ? -1 : 1;
  defender.facing = attacker.x>=defender.x ? -1 : 1;

  const dmg = damageFor(attacker.power);
  defender.energy -= dmg;
  defender.power = Math.max(1, defender.power - Math.max(1, Math.floor(dmg*0.3)));
  defender.lastAttacker = attacker;
  playPunchSound();

  if (defender.energy<=0) collapse(defender, attacker);
}

function finishExchange(ex){
  const { a, b } = ex;
  const cd = 1000 + Math.random()*500;
  a.punchCooldown = cd; b.punchCooldown = cd;
  a.inExchange = false; b.inExchange = false;
  if (a.alive) a.state = 'idle';
  if (b.alive) b.state = 'idle';
  if (a.alive && b.alive){
    const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1, push=75;
    a.tx = clamp(a.x - dx/d*push, RING.xMin, RING.xMax);
    a.ty = clamp(a.y - dy/d*push, RING.yMin, RING.yMax);
    b.tx = clamp(b.x + dx/d*push, RING.xMin, RING.xMax);
    b.ty = clamp(b.y + dy/d*push, RING.yMin, RING.yMax);
    a.wanderPause = 500; b.wanderPause = 500;
  }
}

function updateExchanges(dt){
  for (let i=activeExchanges.length-1; i>=0; i--){
    const ex = activeExchanges[i];
    ex.timer -= dt;
    if (ex.timer > 0) continue;

    if (!ex.a.alive || !ex.b.alive || ex.idx >= ex.queue.length){
      finishExchange(ex);
      activeExchanges.splice(i,1);
      continue;
    }

    const { attacker, defender } = ex.queue[ex.idx];
    ex.idx++;
    ex.timer = PUNCH_TICK_MS;
    if (attacker.alive && defender.alive) throwPunch(attacker, defender);
  }
}

function update(dt){
  for (const v of VARIANTS){
    advanceAnim(v, dt);

    if (!v.alive){
      if (!v.eliminated){
        v.koTimer -= dt;
        if (v.koTimer<=0) v.eliminated = true; // исчезает с ринга насовсем (до конца раунда)
      }
      continue;
    }

    if (v.energy<=0){ collapse(v, v.lastAttacker); continue; } // выдохся сам по себе, не только от удара

    // 15 минут без лайков/донатов — Сила капает по 1/сек, не ниже 1
    // (ботов не касается — у них нет зрителя-владельца)
    if (!v.isBot && v.power>1 && Date.now()-v.lastActiveAt >= INACTIVITY_MS){
      v.powerDecayAcc = (v.powerDecayAcc||0) + dt;
      while (v.powerDecayAcc >= POWER_DECAY_INTERVAL_MS && v.power>1){
        v.powerDecayAcc -= POWER_DECAY_INTERVAL_MS;
        v.power -= 1;
      }
    } else if (!v.isBot){
      v.powerDecayAcc = 0;
    }

    if (v.punchCooldown>0) v.punchCooldown -= dt;

    if (v.state==='punch' || v.state==='hurt'){
      v.stateTimer -= dt;
      if (v.stateTimer<=0) v.state='idle';
      continue;
    }

    // во время серии ударов боец стоит на месте и ждёт своего следующего
    // удара/реакции — не убегает бродить между отдельными попаданиями
    if (v.inExchange) continue;

    v.wanderPause -= dt;
    const dx=v.tx-v.x, dy=v.ty-v.y, dist=Math.hypot(dx,dy);
    if (dist<6 && v.wanderPause<=0){
      v.tx = RING.xMin + Math.random()*(RING.xMax-RING.xMin);
      v.ty = RING.yMin + Math.random()*(RING.yMax-RING.yMin);
      v.wanderPause = 500 + Math.random()*1400;
    }
    if (dist>6){
      const speed = 0.05;
      v.x += (dx/dist)*speed*dt;
      v.y += (dy/dist)*speed*dt;
      v.facing = dx>=0 ? -1 : 1; // спрайт по умолчанию смотрит влево — флип нужен при движении вправо
      v.state = 'walk';
    } else {
      v.state = 'idle';
      v.lean = (v.lean||0)*0.85;
    }
  }

  // мягкое разведение — живые бойцы не должны залипать друг в друге
  const MIN_SEP = 58;
  for (let i=0;i<VARIANTS.length;i++){
    const a = VARIANTS[i];
    if (!a.alive) continue;
    for (let j=i+1;j<VARIANTS.length;j++){
      const b = VARIANTS[j];
      if (!b.alive) continue;
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||0.001;
      if (d < MIN_SEP){
        const push = (MIN_SEP-d)/2, ux=dx/d, uy=dy/d;
        a.x = clamp(a.x-ux*push, RING.xMin, RING.xMax);
        a.y = clamp(a.y-uy*push, RING.yMin, RING.yMax);
        b.x = clamp(b.x+ux*push, RING.xMin, RING.xMax);
        b.y = clamp(b.y+uy*push, RING.yMin, RING.yMax);
      }
    }
  }

  for (let i=0;i<VARIANTS.length;i++){
    const a = VARIANTS[i];
    if (!a.alive || a.punchCooldown>0) continue;
    for (let j=i+1;j<VARIANTS.length;j++){
      const b = VARIANTS[j];
      if (!b.alive || b.punchCooldown>0) continue;
      if (Math.hypot(a.x-b.x, a.y-b.y) < FIGHT_DIST) startExchange(a,b);
    }
  }

  updateExchanges(dt);
  updateBotSpawns(dt);

  // раунд — чисто визуальный таймер (3 мин × 12), не связан с нокаутами
  roundTimer -= dt;
  if (roundTimer<=0) endRound();
  if (roundGirl){
    roundGirl.t += dt;
    if (roundGirl.t >= ROUND_GIRL_MS) roundGirl = null;
  }

  // сама очередь двигается по завершению речи (см. vSpeakNext) — тут только
  // тикает таймер затухания баннера
  if (currentEvent) currentEvent.timer = Math.max(0, currentEvent.timer - dt);
}

let _lastT = 0;
function loop(t) {
  if (!_lastT) _lastT = t;
  const dt = Math.min(50, t-_lastT);
  _lastT = t;

  update(dt);

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground(t);

  const sorted = [...VARIANTS].sort((a,b)=>a.y-b.y);
  for (const v of sorted) drawFighter(v);

  drawRoundGirl();
  drawEventBanner();
  drawHUD();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
