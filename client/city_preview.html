<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌙 Night City Map Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
    h2 { margin-bottom: 6px; font-size: 20px; color: #AA44FF; letter-spacing: 2px; }
    p  { margin-bottom: 14px; font-size: 12px; color: #666; }
    canvas { border: 1px solid #333; border-radius: 10px; }
  </style>
</head>
<body>
  <h2>🌙 NIGHT CITY MAP — ПРЕВЬЮ</h2>
  <p>Небоскрёбы, неон, мокрый асфальт с отражениями</p>
  <canvas id="c" width="600" height="520"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = 600, CH = 520, SKY_H = 200;

const rain = Array.from({length: 80}, () => ({
  x: Math.random() * CW,
  y: Math.random() * CH,
  len: 8 + Math.random() * 12,
  spd: 6 + Math.random() * 6,
  alpha: 0.15 + Math.random() * 0.35
}));

const neonSigns = [
  { x: 65,  y: 215, text: 'PIZZA', col: '#FF2266', w: 52 },
  { x: 145, y: 185, text: 'BAR',   col: '#00FFCC', w: 38 },
  { x: 430, y: 200, text: 'CLUB',  col: '#AA22FF', w: 46 },
  { x: 510, y: 225, text: 'GYM',   col: '#FF8800', w: 38 },
];

function drawBuilding(x, y, w, h, col, winCols) {
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
  // Windows
  const cols = Math.floor(w / 14);
  const rows = Math.floor(h / 18);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.sin(x * 0.3 + r * 7 + c * 13) > 0.1) {
        const wc = winCols[Math.floor(Math.abs(Math.sin(x + r * c)) * winCols.length)];
        ctx.fillStyle = wc;
        ctx.fillRect(x + 5 + c * 14, y + 6 + r * 18, 8, 10);
      }
    }
  }
  // Rooftop antenna
  ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y - 15); ctx.stroke();
  ctx.fillStyle = '#FF2200'; ctx.beginPath(); ctx.arc(x + w/2, y - 16, 2.5, 0, Math.PI * 2); ctx.fill();
}

function drawScene(now) {
  ctx.clearRect(0, 0, CW, CH);

  // Sky — deep night
  const sky = ctx.createLinearGradient(0, 0, 0, SKY_H);
  sky.addColorStop(0, '#020408');
  sky.addColorStop(0.6, '#05080f');
  sky.addColorStop(1, '#0a0a18');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, SKY_H);

  // Stars
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + 50) % 560) + 20;
    const sy = ((i * 89 + 10) % 120) + 5;
    ctx.globalAlpha = 0.3 + Math.sin(now * 0.001 + i) * 0.2;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(sx, sy, 0.7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#C8D8E8';
  ctx.beginPath(); ctx.arc(520, 38, 18, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#05080f';
  ctx.beginPath(); ctx.arc(528, 34, 16, 0, Math.PI * 2); ctx.fill();

  // City glow on horizon
  const cityGlow = ctx.createLinearGradient(0, SKY_H - 60, 0, SKY_H);
  cityGlow.addColorStop(0, 'rgba(80,20,120,0)');
  cityGlow.addColorStop(1, 'rgba(80,20,120,0.4)');
  ctx.fillStyle = cityGlow; ctx.fillRect(0, SKY_H - 60, CW, 60);

  // Buildings — background (far)
  const farBldgs = [
    [0, 120, 55, 80, '#0a0a15', ['rgba(255,240,180,0.5)', 'rgba(180,220,255,0.3)', '#000']],
    [50, 100, 45, 100, '#080810', ['rgba(255,240,180,0.4)', '#000', 'rgba(180,255,220,0.3)']],
    [90, 90, 60, 110, '#0c0c1a', ['rgba(255,200,100,0.5)', 'rgba(150,200,255,0.4)', '#000']],
    [145, 70, 50, 130, '#0a0a18', ['rgba(255,240,180,0.5)', '#000', 'rgba(200,150,255,0.4)']],
    [190, 85, 55, 115, '#080810', ['rgba(255,200,100,0.4)', 'rgba(180,255,220,0.35)', '#000']],
    [380, 80, 50, 120, '#0a0a18', ['rgba(255,240,180,0.5)', '#000', 'rgba(180,220,255,0.3)']],
    [425, 65, 60, 135, '#0c0c1a', ['rgba(255,200,100,0.5)', 'rgba(200,150,255,0.4)', '#000']],
    [480, 90, 55, 110, '#080810', ['rgba(255,240,180,0.4)', 'rgba(150,200,255,0.3)', '#000']],
    [530, 100, 70, 100, '#0a0a15', ['rgba(255,200,100,0.5)', '#000', 'rgba(180,255,220,0.4)']],
  ];
  farBldgs.forEach(([x, y, w, h, col, wc]) => drawBuilding(x, y, w, h, col, wc));

  // Neon signs
  neonSigns.forEach(s => {
    const pulse = 0.8 + Math.sin(now * 0.003 + s.x) * 0.2;
    ctx.save();
    ctx.shadowColor = s.col; ctx.shadowBlur = 18;
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = s.col; ctx.lineWidth = 2;
    ctx.strokeRect(s.x - s.w/2 - 4, s.y - 14, s.w + 8, 20);
    ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = s.col; ctx.fillText(s.text, s.x, s.y);
    ctx.restore();
  });

  // Ground — wet asphalt
  const road = ctx.createLinearGradient(0, SKY_H, 0, CH);
  road.addColorStop(0, '#111118');
  road.addColorStop(0.4, '#0d0d14');
  road.addColorStop(1, '#0a0a10');
  ctx.fillStyle = road; ctx.fillRect(0, SKY_H, CW, CH - SKY_H);

  // Wet reflection on ground
  const reflY = SKY_H + 20;
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.translate(0, reflY * 2);
  ctx.scale(1, -0.3);
  farBldgs.forEach(([x, y, w, h, col]) => {
    ctx.fillStyle = col; ctx.fillRect(x, y, w, h);
  });
  ctx.restore();

  // Neon reflections on wet ground
  neonSigns.forEach(s => {
    const pulse = 0.6 + Math.sin(now * 0.003 + s.x) * 0.2;
    const rg = ctx.createLinearGradient(s.x, SKY_H + 10, s.x, SKY_H + 80);
    rg.addColorStop(0, s.col.replace(')', ',0.25)').replace('rgb', 'rgba').replace('#', 'rgba(').replace('rgba(', 'rgba(').replace('FF2266', '255,34,102,').replace('00FFCC', '0,255,204,').replace('AA22FF', '170,34,255,').replace('FF8800', '255,136,0,'));
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = s.col + '30';
    ctx.globalAlpha = pulse * 0.4;
    ctx.fillRect(s.x - 25, SKY_H + 5, 50, 70);
    ctx.globalAlpha = 1;
  });

  // Street lines
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 2;
  ctx.setLineDash([30, 20]);
  ctx.beginPath(); ctx.moveTo(0, SKY_H + 120); ctx.lineTo(CW, SKY_H + 120); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, SKY_H + 220); ctx.lineTo(CW, SKY_H + 220); ctx.stroke();
  ctx.setLineDash([]);

  // Streetlights
  [[80, SKY_H + 50], [280, SKY_H + 50], [480, SKY_H + 50]].forEach(([lx, ly]) => {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(lx, ly + 60); ctx.lineTo(lx, ly); ctx.lineTo(lx + 20, ly); ctx.stroke();
    const lg = ctx.createRadialGradient(lx + 20, ly, 1, lx + 20, ly, 40);
    lg.addColorStop(0, 'rgba(255,240,180,0.6)');
    lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.arc(lx + 20, ly, 40, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFF8D0';
    ctx.beginPath(); ctx.arc(lx + 20, ly, 4, 0, Math.PI * 2); ctx.fill();
    // Reflection on ground
    ctx.globalAlpha = 0.1;
    const rgl = ctx.createRadialGradient(lx + 20, SKY_H + 15, 2, lx + 20, SKY_H + 40, 50);
    rgl.addColorStop(0, '#FFF8D0');
    rgl.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rgl;
    ctx.beginPath(); ctx.ellipse(lx + 20, SKY_H + 25, 40, 15, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Rain
  ctx.strokeStyle = 'rgba(180,210,255,1)'; ctx.lineWidth = 1;
  rain.forEach(r => {
    r.y += r.spd; r.x -= r.spd * 0.2;
    if (r.y > CH) { r.y = -10; r.x = Math.random() * CW; }
    ctx.globalAlpha = r.alpha;
    ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x - 1, r.y + r.len); ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Arena zone
  ctx.save();
  ctx.strokeStyle = 'rgba(150,80,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(300, 360, 160, 55, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.font = 'bold 13px Arial'; ctx.fillStyle = 'rgba(180,100,255,0.7)';
  ctx.textAlign = 'center'; ctx.fillText('🏟️  ARENA ZONE', 300, 365);
  ctx.restore();

  requestAnimationFrame(drawScene);
}
requestAnimationFrame(drawScene);
</script>
</body>
</html>
