<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liu Kang Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
  h2 { margin-bottom: 6px; font-size: 20px; color: #FF4400; letter-spacing: 2px; text-shadow: 0 0 14px rgba(255,80,0,0.8); }
  p { margin-bottom: 18px; font-size: 12px; color: #666; }
  canvas { border: 1px solid #1a0000; border-radius: 14px; background: radial-gradient(ellipse at 50% 60%, #0a0402 0%, #020101 100%); }
</style>
</head>
<body>
  <h2>🔥 ЛЮ КАН</h2>
  <p>Mortal Kombat Champion</p>
  <canvas id="c" width="300" height="380"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawLiuKang(cx, cy, now) {
  ctx.save();
  ctx.translate(cx, cy);
  const bob = Math.sin(now * 0.0016) * 2.5;
  ctx.translate(0, bob);
  const armSwing = Math.sin(now * 0.0016) * 4;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 8, 22, 5, 0, 0, Math.PI*2); ctx.fill();

  // ── BOOTS ──
  ctx.fillStyle = '#1a0a04';
  ctx.beginPath(); ctx.roundRect(-14,-30,12,30,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,  -30,12,30,3); ctx.fill();
  ctx.fillStyle = '#0e0602';
  ctx.beginPath(); ctx.ellipse(-8,-2,11,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, -2,11,5,0,0,Math.PI*2); ctx.fill();
  // boot shine
  ctx.fillStyle = 'rgba(120,50,20,0.25)';
  ctx.beginPath(); ctx.ellipse(-10,-16,3,7,0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,  -16,3,7,-0.1,0,Math.PI*2); ctx.fill();

  // ── PANTS — black with red stripe ──
  const pantsG = ctx.createLinearGradient(-14,-80,14,-28);
  pantsG.addColorStop(0,'#141414'); pantsG.addColorStop(0.5,'#1e1e1e'); pantsG.addColorStop(1,'#111');
  ctx.fillStyle = pantsG;
  ctx.beginPath(); ctx.roundRect(-13,-75,11,46,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2,  -75,11,46,3); ctx.fill();
  // red side stripes on pants
  ctx.fillStyle = '#cc2200';
  ctx.beginPath(); ctx.roundRect(-14,-74,3,44,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(11, -74,3,44,1); ctx.fill();

  // ── SASH (front red cloth) ──
  const sashG = ctx.createLinearGradient(0,-76,0,-32);
  sashG.addColorStop(0,'#cc2200'); sashG.addColorStop(0.5,'#aa1800'); sashG.addColorStop(1,'#880e00');
  ctx.fillStyle = sashG;
  const sw = Math.sin(now*0.001)*2;
  ctx.beginPath();
  ctx.moveTo(-10,-76); ctx.bezierCurveTo(-12,-58,-11+sw,-44,-9+sw,-32);
  ctx.lineTo(9+sw,-32); ctx.bezierCurveTo(11+sw,-44,12,-58,10,-76);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(180,40,0,0.4)'; ctx.lineWidth=0.8; ctx.stroke();

  // ── BELT ──
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(-18,-80,36,8,2); ctx.fill();
  ctx.fillStyle = '#cc2200';
  ctx.beginPath(); ctx.roundRect(-5,-81,10,9,2); ctx.fill();
  ctx.fillStyle = '#ff4400';
  ctx.beginPath(); ctx.roundRect(-3,-80,6,7,1); ctx.fill();

  // ── TORSO — bare muscular chest ──
  const skinG = ctx.createLinearGradient(-18,-148,18,-78);
  skinG.addColorStop(0,'#c88040'); skinG.addColorStop(0.4,'#b87030'); skinG.addColorStop(1,'#a06028');
  ctx.fillStyle = skinG;
  ctx.beginPath(); ctx.roundRect(-18,-148,36,70,4); ctx.fill();

  // Muscle definition
  // chest pecs
  ctx.fillStyle = 'rgba(80,30,5,0.2)';
  ctx.beginPath(); ctx.ellipse(-8,-128,8,9,0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, -128,8,9,-0.1,0,Math.PI*2); ctx.fill();
  // chest center line
  ctx.strokeStyle='rgba(60,25,5,0.3)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(0,-148); ctx.lineTo(0,-100); ctx.stroke();
  // abs
  ctx.strokeStyle='rgba(70,28,5,0.25)'; ctx.lineWidth=0.9;
  ctx.beginPath(); ctx.moveTo(-12,-108); ctx.lineTo(12,-108); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12,-98); ctx.lineTo(12,-98); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12,-88); ctx.lineTo(12,-88); ctx.stroke();
  // torso highlight
  ctx.fillStyle='rgba(220,140,60,0.15)';
  ctx.beginPath(); ctx.roundRect(-6,-146,8,30,3); ctx.fill();

  // ── SHOULDER WRAPS / WRISTBANDS ──
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.roundRect(-33,-138,8,6,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(25, -138,8,6,2); ctx.fill();
  // wrist wraps
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.roundRect(-32,-98-armSwing,10,6,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(22, -95,10,6,2); ctx.fill();

  // ── LEFT ARM — bare skin ──
  ctx.fillStyle='#b87030';
  ctx.beginPath(); ctx.roundRect(-32,-148-armSwing,12,52,4); ctx.fill();
  // forearm
  ctx.fillStyle='#b06828';
  ctx.beginPath(); ctx.roundRect(-32,-112-armSwing,12,24,3); ctx.fill();
  // fist
  ctx.fillStyle='#a86020';
  ctx.beginPath(); ctx.ellipse(-26,-90-armSwing,7,6,0,0,Math.PI*2); ctx.fill();
  // knuckles
  ctx.strokeStyle='rgba(60,25,5,0.4)'; ctx.lineWidth=0.8;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc(-23+i*3,-88-armSwing,1.5,0,Math.PI*2); ctx.stroke();
  }

  // ── RIGHT ARM ──
  ctx.fillStyle='#b87030';
  ctx.beginPath(); ctx.roundRect(20,-148,12,52,4); ctx.fill();
  ctx.fillStyle='#b06828';
  ctx.beginPath(); ctx.roundRect(20,-112,12,24,3); ctx.fill();
  ctx.fillStyle='#a86020';
  ctx.beginPath(); ctx.ellipse(26,-90,7,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(60,25,5,0.4)'; ctx.lineWidth=0.8;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.arc(23+i*3,-88,1.5,0,Math.PI*2); ctx.stroke();
  }

  // ── FIRE GLOW around fists ──
  const fA=0.15+Math.sin(now*0.004)*0.08;
  ctx.globalAlpha=fA;
  [[-26,-90-armSwing],[26,-90]].forEach(([fx,fy])=>{
    const fg=ctx.createRadialGradient(fx,fy,3,fx,fy,20);
    fg.addColorStop(0,'rgba(255,120,0,0.8)'); fg.addColorStop(1,'rgba(255,40,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(fx,fy,20,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // ── NECK ──
  ctx.fillStyle='#b87030';
  ctx.beginPath(); ctx.roundRect(-5,-160,10,14,3); ctx.fill();

  // ── HEAD ──
  const headG = ctx.createRadialGradient(-3,-175,3,0,-172,18);
  headG.addColorStop(0,'#d09050'); headG.addColorStop(0.6,'#b87838'); headG.addColorStop(1,'#9a6025');
  ctx.fillStyle = headG;
  ctx.beginPath(); ctx.ellipse(0,-172,16,20,0,0,Math.PI*2); ctx.fill();

  // Jaw definition
  ctx.strokeStyle='rgba(80,40,5,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-14,-164); ctx.quadraticCurveTo(0,-158,14,-164); ctx.stroke();

  // ── EYES ──
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-6,-175,4.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -175,4.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a1a08';
  ctx.beginPath(); ctx.arc(-6,-175,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -175,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0604';
  ctx.beginPath(); ctx.arc(-6,-175,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -175,1.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(-7,-176,0.7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -176,0.7,0,Math.PI*2); ctx.fill();
  // determined eyebrows
  ctx.strokeStyle='#2a1004'; ctx.lineWidth=1.6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,-180); ctx.quadraticCurveTo(-6,-183,-1,-180); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-180); ctx.quadraticCurveTo(6,-183,1,-180); ctx.stroke();

  // ── NOSE ──
  ctx.strokeStyle='#8a5020'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,-170); ctx.lineTo(-3,-167); ctx.lineTo(-1,-166); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-170); ctx.lineTo(3,-167); ctx.lineTo(1,-166); ctx.stroke();

  // ── MOUTH — determined expression ──
  ctx.strokeStyle='#7a4018'; ctx.lineWidth=1.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-6,-163); ctx.lineTo(6,-163); ctx.stroke();

  // ── RED HEADBAND ──
  const hbG = ctx.createLinearGradient(-16,-188,16,-178);
  hbG.addColorStop(0,'#aa1800'); hbG.addColorStop(0.3,'#ee2200'); hbG.addColorStop(0.7,'#dd2000'); hbG.addColorStop(1,'#aa1800');
  ctx.fillStyle=hbG;
  ctx.beginPath(); ctx.roundRect(-16,-190,32,10,2); ctx.fill();
  ctx.strokeStyle='rgba(200,50,0,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
  // headband knot at back / side
  ctx.fillStyle='#cc2000';
  ctx.beginPath(); ctx.roundRect(-4,-192,8,12,3); ctx.fill();
  // headband tails flowing to the right
  ctx.fillStyle='#cc2000';
  ctx.beginPath();
  ctx.moveTo(16,-188);
  ctx.bezierCurveTo(22,-186,26,-180+sw*0.5,24,-176+sw);
  ctx.lineTo(22,-176+sw);
  ctx.bezierCurveTo(24,-180,20,-186,14,-188);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(16,-185);
  ctx.bezierCurveTo(28,-182,32,-174+sw,28,-168+sw*1.2);
  ctx.lineTo(26,-169+sw*1.2);
  ctx.bezierCurveTo(30,-175,26,-182,14,-185);
  ctx.closePath(); ctx.fill();

  // ── HAIR — black, slicked back ──
  ctx.fillStyle='#0a0a0a';
  ctx.beginPath();
  ctx.moveTo(-14,-188);
  ctx.bezierCurveTo(-12,-200,-8,-205,0,-204);
  ctx.bezierCurveTo(8,-205,12,-200,14,-188);
  ctx.bezierCurveTo(8,-192,0,-192,-14,-188);
  ctx.closePath(); ctx.fill();
  // hair highlight
  ctx.fillStyle='rgba(80,40,10,0.2)';
  ctx.beginPath(); ctx.ellipse(3,-200,4,5,-0.2,0,Math.PI*2); ctx.fill();

  // ── FIRE AURA ──
  ctx.globalAlpha=0.05+Math.sin(now*0.002)*0.025;
  const aura=ctx.createRadialGradient(0,-110,15,0,-110,95);
  aura.addColorStop(0,'rgba(255,100,0,0.7)'); aura.addColorStop(1,'rgba(200,20,0,0)');
  ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,-110,95,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // ── FIRE PARTICLES around fists ──
  const ft=now*0.003;
  [[-26,-90-armSwing],[26,-90]].forEach(([hx,hy],hi)=>{
    for(let fi=0;fi<4;fi++){
      const ang=ft*1.2+fi*1.57+hi*0.8;
      const d=8+Math.sin(ft+fi)*3;
      const px=hx+Math.cos(ang)*d;
      const py=hy+Math.sin(ang)*d;
      ctx.globalAlpha=(0.6-fi*0.12)*(0.7+Math.sin(ft*2+fi)*0.2);
      ctx.fillStyle=fi<2?'#ff6600':'#ff3300';
      ctx.beginPath(); ctx.arc(px,py,2.5-fi*0.4,0,Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha=1;

  ctx.restore();
}

function drawLabels(now) {
  ctx.save(); ctx.textAlign='center';
  const hp=0.9;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(150-34,46,68,9,3); ctx.fill();
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.roundRect(150-33,47,66*hp,7,2); ctx.fill();
  ctx.font='bold 11px Arial Black';
  ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=3;
  ctx.strokeText('Liu Kang',150,44);
  ctx.fillStyle='#ff4400'; ctx.fillText('Liu Kang',150,44);
  ctx.font='9px Arial';
  const stats=['❤️ 480','⚔️ 55','💀 44'];
  stats.forEach((s,i)=>{
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(150-34+i*23,58,22,13,3); ctx.fill();
    ctx.fillStyle='#ffaa88'; ctx.fillText(s,150-23+i*23,68);
  });
  ctx.restore();
}

function loop(ts) {
  ctx.clearRect(0,0,300,380);
  drawLiuKang(150,290,ts);
  drawLabels(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
