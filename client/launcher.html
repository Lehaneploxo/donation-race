<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Выбери игру</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Arial Black', 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow-y: auto;
    }

    /* ── Two game panels ── */
    .games-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 500px;
    }

    .game-panel {
      position: relative;
      width: 100%;
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }

    /* Background canvas preview per panel */
    .game-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.18;
      background-size: cover;
      background-position: center;
      pointer-events: none;
      z-index: 0;
    }
    .panel-race::before {
      background-image: linear-gradient(135deg, #1a0a00 0%, #3d2200 40%, #1a0a00 100%);
      opacity: 1;
    }
    .panel-war::before {
      background-image: linear-gradient(135deg, #000818 0%, #0a0030 40%, #000818 100%);
      opacity: 1;
    }

    .game-panel > * { position: relative; z-index: 1; }

    /* Title */
    .panel-title {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      letter-spacing: 2px;
    }
    .panel-race .panel-title  { color: #FFD700; text-shadow: 0 0 18px #FF6600; }
    .panel-war  .panel-title  { color: #88CCFF; text-shadow: 0 0 18px #0055FF; }

    .panel-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      font-weight: normal;
      margin-top: -6px;
    }

    /* Input */
    .nick-input {
      font-size: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.6);
      color: #fff;
      text-align: center;
      width: 100%;
      outline: none;
      font-family: 'Arial', sans-serif;
      transition: border-color 0.2s;
    }
    .nick-input::placeholder { color: rgba(255,255,255,0.3); }
    .panel-race .nick-input:focus { border-color: #FFD700; }
    .panel-war  .nick-input:focus { border-color: #4488FF; }

    /* Buttons */
    .btn-start {
      width: 100%;
      font-size: 18px;
      font-weight: 900;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-start:hover { transform: scale(1.03); }
    .btn-start:active { transform: scale(0.98); }

    .panel-race .btn-start {
      background: linear-gradient(90deg, #FF6600, #FFD700);
      color: #000;
      box-shadow: 0 4px 20px rgba(255,140,0,0.4);
    }
    .panel-war .btn-start {
      background: linear-gradient(90deg, #0033CC, #3388FF);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,100,255,0.4);
    }

    .btn-demo {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-demo:hover { color: rgba(255,255,255,0.65); }

    /* Error */
    .error-msg {
      display: none;
      font-size: 13px;
      color: #FF6666;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Status */
    .status-msg {
      display: none;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Divider label between panels */
    .divider {
      width: 100%;
      max-width: 500px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      padding: 6px 0;
      letter-spacing: 3px;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Animated bottom stripe */
    .stripe {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FF6600, #FFD700, #4488FF, #FF6600);
      background-size: 300%;
      animation: stripe 4s linear infinite;
    }
    @keyframes stripe {
      from { background-position: 0%; }
      to   { background-position: 300%; }
    }

    @media (min-width: 700px) {
      body { overflow: hidden; }
      .games-wrap {
        flex-direction: row;
        max-width: 900px;
        height: 100vh;
      }
      .game-panel {
        flex: 1;
        justify-content: center;
        border-bottom: none;
        border-right: 2px solid rgba(255,255,255,0.08);
        padding: 48px 40px;
      }
      .game-panel:last-child { border-right: none; }
      .divider { display: none; }
    }
  </style>
</head>
<body>

<div class="games-wrap">

  <!-- ── STREET RACE ── -->
  <div class="game-panel panel-race">
    <div class="panel-title">🏁 STREET RACE! 🏁</div>
    <div class="panel-sub">Лайки · подарки · пиши GO в чате</div>

    <input class="nick-input" id="raceInput" type="text"
           placeholder="@your_username"
           autocomplete="off" autocorrect="off" spellcheck="false">

    <div class="error-msg" id="raceError">Введи никнейм TikTok</div>

    <button class="btn-start" id="raceStart">▶ START</button>
    <button class="btn-demo"  id="raceDemo">Демо-режим (без TikTok)</button>

    <div class="status-msg" id="raceStatus">⏳ Открываю игру…</div>
  </div>

  <div class="divider">— ИЛИ —</div>

  <!-- ── BLUE vs RED WAR ── -->
  <div class="game-panel panel-war">
    <div class="panel-title">⚔️ BLUE vs RED WAR ⚔️</div>
    <div class="panel-sub">Пиши "blue" или "red" в чате</div>

    <input class="nick-input" id="warInput" type="text"
           placeholder="@your_username"
           autocomplete="off" autocorrect="off" spellcheck="false">

    <div class="error-msg" id="warError">Введи никнейм TikTok</div>

    <button class="btn-start" id="warStart">⚔️ START WAR</button>
    <button class="btn-demo"  id="warDemo">Демо-режим (без TikTok)</button>

    <div class="status-msg" id="warStatus">⏳ Открываю игру…</div>
  </div>

</div>

<div class="stripe"></div>

<script>
  // Prefill saved nick into both inputs
  const saved = localStorage.getItem('tiktok_username') || '';
  document.getElementById('raceInput').value = saved;
  document.getElementById('warInput').value  = saved;

  // Sync both inputs when typing
  document.getElementById('raceInput').addEventListener('input', function() {
    if (this.value.startsWith('@')) this.value = this.value.slice(1);
    document.getElementById('warInput').value = this.value;
  });
  document.getElementById('warInput').addEventListener('input', function() {
    if (this.value.startsWith('@')) this.value = this.value.slice(1);
    document.getElementById('raceInput').value = this.value;
  });

  function go(username, path, statusId, startId, demoId) {
    const s  = document.getElementById(statusId);
    const b1 = document.getElementById(startId);
    const b2 = document.getElementById(demoId);
    s.style.display = 'block';
    b1.disabled = b2.disabled = true;
    setTimeout(() => { window.location.href = path + '?username=' + encodeURIComponent(username); }, 300);
  }

  function handleClick(inputId, errorId, statusId, startId, demoId, path) {
    const val = document.getElementById(inputId).value.replace(/^@/, '').trim();
    if (!val) {
      const e = document.getElementById(errorId);
      e.style.display = 'block';
      setTimeout(() => e.style.display = 'none', 2500);
      document.getElementById(inputId).focus();
      return;
    }
    localStorage.setItem('tiktok_username', val);
    go(val, path, statusId, startId, demoId);
  }

  // Race
  document.getElementById('raceStart').addEventListener('click', () =>
    handleClick('raceInput','raceError','raceStatus','raceStart','raceDemo','/game'));
  document.getElementById('raceDemo').addEventListener('click', () =>
    go('demo', '/game', 'raceStatus', 'raceStart', 'raceDemo'));
  document.getElementById('raceInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('raceStart').click();
  });

  // War
  document.getElementById('warStart').addEventListener('click', () =>
    handleClick('warInput','warError','warStatus','warStart','warDemo','/war'));
  document.getElementById('warDemo').addEventListener('click', () =>
    go('demo', '/war', 'warStatus', 'warStart', 'warDemo'));
  document.getElementById('warInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('warStart').click();
  });
</script>

</body>
</html>
