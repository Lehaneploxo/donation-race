<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Цивилизация</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; min-height:100vh; overflow:hidden; }
#scaleWrapper { position:relative; width:563px; height:1000px; flex-shrink:0; }
canvas { display:block; }
#uiOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; font-family:'Arial Black',Arial,sans-serif; }
#topBar { position:absolute; top:0; left:0; right:0; background:linear-gradient(180deg,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0) 100%); padding:10px 14px 24px; display:flex; flex-direction:column; gap:5px; }
#eraLabel { font-size:24px; font-weight:900; color:#fff; text-shadow:0 0 14px rgba(255,255,255,0.7),0 2px 4px rgba(0,0,0,0.9); text-align:center; letter-spacing:2px; }
#eraYear { font-size:14px; font-weight:700; color:#FFD700; text-align:center; font-family:'Segoe UI',sans-serif; text-shadow:0 0 8px rgba(255,215,0,0.6),0 1px 3px rgba(0,0,0,1); margin-top:-2px; letter-spacing:1px; }
#popLabel { font-size:17px; font-weight:700; color:#fff; text-align:center; font-family:'Segoe UI',sans-serif; text-shadow:0 1px 4px rgba(0,0,0,1); }
#popBarWrap { height:12px; background:rgba(0,0,0,0.5); border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.2); }
#popBar { height:100%; background:linear-gradient(90deg,#44CC00,#AAFF44); border-radius:8px; transition:width 0.4s; }
#leaderboard { position:absolute; top:148px; left:8px; display:flex; flex-direction:column; gap:6px; pointer-events:none; max-width:175px; }
.lb-king { background:rgba(0,0,0,0.88); border-radius:10px; padding:8px 12px; border:2.5px solid #FFD700; font-family:'Segoe UI',sans-serif; }
.lb-king-title { font-size:13px; font-weight:900; color:#FFD700; letter-spacing:1.5px; margin-bottom:3px; text-shadow:0 0 8px #FFD700; }
.lb-king-name { font-size:18px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:155px; text-shadow:0 1px 4px rgba(0,0,0,1); }
.lb-king-count { font-size:14px; font-weight:700; color:rgba(255,255,255,0.9); margin-top:2px; text-shadow:0 1px 3px rgba(0,0,0,1); }
.lb-row { background:rgba(0,0,0,0.82); border-radius:8px; padding:6px 10px; font-family:'Segoe UI',sans-serif; display:flex; align-items:center; gap:6px; border-left:4px solid #888; }
.lb-rank { font-size:15px; font-weight:900; min-width:16px; text-shadow:0 0 6px currentColor; }
.lb-nick { font-size:14px; font-weight:800; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100px; text-shadow:0 1px 3px rgba(0,0,0,1); }
.lb-cnt  { font-size:13px; font-weight:700; color:rgba(255,255,255,0.85); margin-left:auto; white-space:nowrap; text-shadow:0 1px 3px rgba(0,0,0,1); }
#bottomBar { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0) 100%); padding:18px 14px 12px; }
#disasterMsg { font-size:32px; font-weight:900; text-align:center; color:#FF4444; text-shadow:0 0 24px #FF0000,0 2px 6px rgba(0,0,0,1); display:none; animation:shake 0.15s infinite alternate; letter-spacing:2px; }
@keyframes shake { from{transform:translateX(-4px)} to{transform:translateX(4px)} }
#likeBarWrap { height:12px; background:rgba(0,0,0,0.5); border-radius:8px; overflow:hidden; margin-top:5px; border:1px solid rgba(255,255,255,0.2); }
#likeFill { height:100%; background:linear-gradient(90deg,#FF44AA,#FF0044,#FF6600); border-radius:8px; transition:width 0.15s; }
#likeLabel { font-size:19px; font-weight:900; color:#FF8888; font-family:'Arial Black',Arial,sans-serif; text-align:center; margin-top:4px; text-shadow:0 0 10px rgba(255,80,80,0.6),0 2px 4px rgba(0,0,0,1); letter-spacing:0.5px; }
#connMsg { position:absolute; bottom:50px; left:50%; transform:translateX(-50%); font-size:14px; font-weight:700; color:rgba(255,255,255,0.6); font-family:'Segoe UI',sans-serif; text-align:center; white-space:nowrap; text-shadow:0 1px 4px rgba(0,0,0,1); }
#coinHint {
  position:absolute; top:148px; right:10px;
  background:rgba(0,0,0,0.82); border-radius:10px;
  padding:7px 10px; display:flex; flex-direction:column; gap:0;
  border:1.5px solid rgba(255,215,0,0.4);
  pointer-events:none;
}
#coinHint canvas { display:block; }
</style>
</head>
<body>
<div id="scaleWrapper">
  <canvas id="cvs" width="563" height="1000"></canvas>
  <div id="uiOverlay">
    <div id="topBar">
      <div id="eraLabel">🦕 PRIMITIVE ERA</div>
      <div id="eraYear">20,000 BC</div>
      <div id="popLabel">Population: 0 / 200</div>
      <div id="popBarWrap"><div id="popBar" style="width:0%"></div></div>
      <div id="likeBarWrap"><div id="likeFill" style="width:0%"></div></div>
      <div id="likeLabel">❤️ 0 / 1000 until disaster</div>
    </div>
    <div id="leaderboard"></div>
    <div id="coinHint">
      <div style="display:flex;align-items:center;gap:5px;">
        <canvas id="coinCanvas" width="22" height="28"></canvas>
        <span style="font-size:16px;color:rgba(255,255,255,0.7);font-weight:900;">=</span>
        <canvas id="personCanvas" width="22" height="28"></canvas>
        <span style="font-size:13px;font-weight:900;color:#FFD700;font-family:'Segoe UI',sans-serif;">× 1</span>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.12);margin:4px 0;"></div>
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="font-size:13px;font-weight:900;color:#fff;font-family:'Segoe UI',sans-serif;">"man"</span>
        <span style="font-size:16px;color:rgba(255,255,255,0.7);font-weight:900;">=</span>
        <canvas id="neutralCanvas" width="22" height="28"></canvas>
      </div>
    </div>
    <div id="bottomBar">
      <div id="disasterMsg">☄️ DISASTER!</div>
    </div>
    <div id="connMsg">⏳ Connecting…</div>
  </div>
</div>

<!-- ── DEV PANEL (localhost only) ── -->
<div id="devPanel" style="display:none">
  <div class="dev-title">🎮 TEST</div>
  <div class="dev-divider"></div>
  <div class="dev-section">
    <div class="dev-label">💀 disasters</div>
    <div class="dev-row">
      <button onclick="testDisaster('meteor')">☄️ Meteor</button>
      <button onclick="testDisaster('fire')">🔥 Fire</button>
      <button onclick="testDisaster('invasion')">⚔️ Invasion</button>
      <button onclick="testDisaster('plague')">☠️ Plague</button>
      <button onclick="testDisaster('tsunami')">🌊 Flood</button>
      <button onclick="testDisaster('tornado')">🌪️ Tornado</button>
    </div>
  </div>
  <div class="dev-divider"></div>
  <div class="dev-section">
    <div class="dev-label">👥 people</div>
    <div class="dev-row">
      <button onclick="spawnPeople('test',20)">+20</button>
      <button onclick="spawnPeople('test',100)">+100</button>
      <button onclick="spawnPeople('test',500)">+500</button>
      <button onclick="spawnNeutral()">🤍 man</button>
    </div>
  </div>
  <div class="dev-divider"></div>
  <div class="dev-section">
    <div class="dev-label">🏛️ era</div>
    <div class="dev-row">
      <button onclick="setEra(0)">🦕 Prim.</button>
      <button onclick="setEra(1)">🏛️ Greece</button>
      <button onclick="setEra(2)">⚔️ Middle</button>
      <button onclick="setEra(3)">🎩 Indust.</button>
      <button onclick="setEra(4)">🏙️ Modern</button>
      <button onclick="setEra(5)">🚀 Future</button>
    </div>
  </div>
</div>

<style>
#devPanel {
  position:fixed; right:8px; top:50%; transform:translateY(-50%); z-index:9999;
  background:rgba(10,10,20,0.92); border:1px solid rgba(255,255,255,0.12);
  border-radius:10px; padding:8px 7px; display:flex; flex-direction:column; gap:7px;
  backdrop-filter:blur(4px); min-width:110px;
}
.dev-title { font-family:'Segoe UI',sans-serif; font-size:9px; font-weight:900; color:rgba(255,255,255,0.35); letter-spacing:1.5px; text-align:center; }
.dev-section { display:flex; flex-direction:column; gap:3px; }
.dev-label { font-family:'Segoe UI',sans-serif; font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:0.5px; text-align:center; }
.dev-row { display:flex; flex-direction:column; gap:3px; }
#devPanel button {
  font-size:11px; padding:4px 6px; border:none; border-radius:5px;
  cursor:pointer; font-family:'Segoe UI',sans-serif; font-weight:600;
  background:rgba(255,255,255,0.08); color:#ddd;
  border:1px solid rgba(255,255,255,0.1);
  transition:background 0.15s, transform 0.1s;
  text-align:left; white-space:nowrap;
}
#devPanel button:hover { background:rgba(255,255,255,0.18); color:#fff; transform:scale(1.03); }
#devPanel button:active { transform:scale(0.97); }
.dev-divider { height:1px; background:rgba(255,255,255,0.08); margin:1px 0; }
</style>

<script>
(function(){
  const W=563,H=1000,wrap=document.getElementById('scaleWrapper');
  function r(){const s=Math.min(innerWidth/W,innerHeight/H);wrap.style.transform=`scale(${s})`;wrap.style.transformOrigin='top left';wrap.style.marginLeft=((innerWidth-W*s)/2)+'px';wrap.style.marginTop=((innerHeight-H*s)/2)+'px';}
  r();addEventListener('resize',r);
})();

const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
const W=563,H=1000,GND=145,SEA_Y=H-88;

// ── Eras ──────────────────────────────────────────────────────────────────────
const ERAS=[
  {name:'🦕 PRIMITIVE ERA',    year:'20,000 BC', minPop:0,    maxPop:200,  skyT:'#120800',skyB:'#3d2200',gndT:'#4a3010',gndM:'#5a4020',gndB:'#2d1e08'},
  {name:'🏛️ ANCIENT GREECE',   year:'3,000 BC',  minPop:200,  maxPop:500,  skyT:'#0a1a3d',skyB:'#1a4a8a',gndT:'#8B9B5A',gndM:'#6B7B3A',gndB:'#4d5e2a'},
  {name:'⚔️ MIDDLE AGES',      year:'900 AD',    minPop:500,  maxPop:1000, skyT:'#080a18',skyB:'#1a2040',gndT:'#3d4820',gndM:'#4a5828',gndB:'#252d12'},
  {name:'🎩 INDUSTRIAL AGE',   year:'1700 AD',   minPop:1000, maxPop:3000, skyT:'#1a1a2e',skyB:'#2d3d5a',gndT:'#405530',gndM:'#506040',gndB:'#283520'},
  {name:'🏙️ MODERN ERA',       year:'2025 AD',   minPop:3000, maxPop:5000, skyT:'#000818',skyB:'#0a1a30',gndT:'#303838',gndM:'#404848',gndB:'#1a2020'},
  {name:'🚀 THE FUTURE',       year:'2150 AD',   minPop:5000, maxPop:9999, skyT:'#000005',skyB:'#050018',gndT:'#0a0a20',gndM:'#101030',gndB:'#050510'},
];
const ERA_VARIANTS=[4,4,6,6,6,5];

// ── Terrain cache ─────────────────────────────────────────────────────────────
const tc=document.createElement('canvas');tc.width=W;tc.height=H;
const tx=tc.getContext('2d');
let cachedEra=-1;
function prand(n){n=(n^61)^(n>>16);n+=(n<<3);n^=(n>>4);n*=0x27d4eb2d;n^=(n>>15);return((n>>>0)%10000)/10000;}

function drawTerrain(ei){
  if(ei===cachedEra)return;cachedEra=ei;
  const e=ERAS[ei];tx.clearRect(0,0,W,H);
  const sg=tx.createLinearGradient(0,0,0,GND);
  sg.addColorStop(0,e.skyT);sg.addColorStop(1,e.skyB);
  tx.fillStyle=sg;tx.fillRect(0,0,W,GND);
  if(ei>=2){tx.fillStyle='rgba(255,255,255,0.85)';for(let i=0;i<90;i++){tx.beginPath();tx.arc(prand(ei*997+i*3)*W,prand(ei*997+i*3+1)*(GND-10)+5,prand(ei*997+i*3+2)*1.4+0.3,0,Math.PI*2);tx.fill();}}
  if(ei===5){const ng=tx.createRadialGradient(270,68,5,270,68,90);ng.addColorStop(0,'rgba(80,0,180,0.25)');ng.addColorStop(1,'rgba(0,0,0,0)');tx.fillStyle=ng;tx.fillRect(0,0,W,GND);}
  if(ei<=1){const sg2=tx.createRadialGradient(75,72,2,75,72,44);sg2.addColorStop(0,'rgba(255,240,140,0.95)');sg2.addColorStop(0.5,'rgba(255,200,60,0.4)');sg2.addColorStop(1,'rgba(0,0,0,0)');tx.fillStyle=sg2;tx.fillRect(0,0,W,H);tx.fillStyle='#FFE878';tx.beginPath();tx.arc(75,72,17,0,Math.PI*2);tx.fill();}
  else if(ei<=3){tx.fillStyle='rgba(200,200,230,0.9)';tx.beginPath();tx.arc(452,62,15,0,Math.PI*2);tx.fill();tx.fillStyle=e.skyT;tx.beginPath();tx.arc(462,58,13,0,Math.PI*2);tx.fill();}
  const gg=tx.createLinearGradient(0,GND,0,H);
  gg.addColorStop(0,e.gndT);gg.addColorStop(0.4,e.gndM);gg.addColorStop(1,e.gndB);
  tx.fillStyle=gg;tx.beginPath();tx.moveTo(0,GND);
  tx.bezierCurveTo(142,GND-12,282,GND+10,422,GND-8);
  tx.bezierCurveTo(472,GND-10,530,GND+6,W,GND);
  tx.lineTo(W,H);tx.lineTo(0,H);tx.closePath();tx.fill();
  if(ei<=4){for(let gy=GND+20;gy<SEA_Y;gy+=38){tx.fillStyle='rgba(60,120,10,0.10)';tx.fillRect(0,gy,W,7);}}
  else{tx.strokeStyle='rgba(0,180,255,0.07)';tx.lineWidth=1;for(let gx=0;gx<W;gx+=38){tx.beginPath();tx.moveTo(gx,GND);tx.lineTo(gx,SEA_Y);tx.stroke();}for(let gy=GND;gy<SEA_Y;gy+=38){tx.beginPath();tx.moveTo(0,gy);tx.lineTo(W,gy);tx.stroke();}}
  if(ei<5){const alpha=ei===4?0.55:0.72;const rcol=ei===1?`rgba(55,135,220,${alpha})`:`rgba(45,105,175,${alpha})`;tx.strokeStyle=rcol;tx.lineWidth=13;tx.lineCap='round';tx.beginPath();tx.moveTo(432,GND+5);tx.bezierCurveTo(382,GND+188,302,GND+277,252,GND+399);tx.bezierCurveTo(202,GND+521,162,GND+627,108,GND+805);tx.stroke();tx.strokeStyle='rgba(255,255,255,0.15)';tx.lineWidth=3;tx.beginPath();tx.moveTo(430,GND+7);tx.bezierCurveTo(380,GND+190,300,GND+279,250,GND+401);tx.bezierCurveTo(200,GND+523,160,GND+629,106,GND+807);tx.stroke();}
  drawNature(tx,ei);
}

// ── Nature ────────────────────────────────────────────────────────────────────
const TREE_POS=[[22,178],[540,172],[28,248],[536,242],[16,320],[548,314],[24,400],[540,392],[20,480],[544,472],[26,560],[538,553],[18,640],[546,632],[22,720],[540,712],[88,192],[180,185],[310,180],[430,188],[500,195],[70,295],[200,285],[340,278],[460,290],[520,300],[55,420],[170,412],[290,408],[420,415],[510,425],[100,550],[240,542],[380,538],[490,548],[130,670],[270,662],[410,658],[160,780],[300,774],[440,768]];
const ROCK_POS=[[382,212],[178,230],[422,390],[138,372],[362,522],[198,512],[300,650],[450,640],[120,760],[400,755]];
function drawTreePrim(c,x,y){c.fillStyle='#5a3a10';c.fillRect(x-3,y-22,6,22);c.fillStyle='#2d5a10';c.beginPath();c.arc(x,y-28,16,0,Math.PI*2);c.fill();c.fillStyle='#3a6a18';c.beginPath();c.arc(x-5,y-22,10,0,Math.PI*2);c.fill();}
function drawTreeConifer(c,x,y){c.fillStyle='#4a3010';c.fillRect(x-2,y-18,5,18);c.fillStyle='#1a4a10';[[36,y-18],[28,y-28],[20,y-38]].forEach(([w,ty])=>{c.beginPath();c.moveTo(x-w/2,ty+12);c.lineTo(x,ty);c.lineTo(x+w/2,ty+12);c.closePath();c.fill();});}
function drawTreeBroad(c,x,y){c.fillStyle='#5a3a15';c.fillRect(x-3,y-24,6,24);c.fillStyle='#2a5a18';c.beginPath();c.ellipse(x,y-30,14,18,0,0,Math.PI*2);c.fill();c.fillStyle='#3a7020';c.beginPath();c.ellipse(x-6,y-24,10,12,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(x+6,y-26,9,11,0,0,Math.PI*2);c.fill();}
function drawTreeModern(c,x,y){c.fillStyle='#303830';c.fillRect(x-2,y-20,5,20);c.fillStyle='#1a2e18';c.beginPath();c.arc(x,y-26,12,0,Math.PI*2);c.fill();}
function drawCrystal(c,x,y){c.strokeStyle='rgba(0,200,255,0.6)';c.lineWidth=1;c.fillStyle='rgba(0,100,180,0.3)';c.beginPath();c.moveTo(x,y-28);c.lineTo(x-8,y);c.lineTo(x+8,y);c.closePath();c.fill();c.stroke();}
function drawRock(c,x,y,ei){c.fillStyle=ei>=4?'#303838':'#706050';c.beginPath();c.ellipse(x,y,9,5,0,0,Math.PI*2);c.fill();}
function drawNature(c,ei){
  if(ei===5){TREE_POS.forEach(([x,y],i)=>{if(i%2===0)drawCrystal(c,x,y);});return;}
  TREE_POS.forEach(([x,y])=>{if(ei===0)drawTreePrim(c,x,y);else if(ei<=2)drawTreeConifer(c,x,y);else if(ei===3)drawTreeBroad(c,x,y);else drawTreeModern(c,x,y);});
  ROCK_POS.forEach(([x,y])=>drawRock(c,x,y,ei));
}

// ── Buildings ─────────────────────────────────────────────────────────────────
function drawBuilding(cx,x,y,ei,v,s){cx.save();cx.translate(x,y);cx.scale(s,s);[bPrim,bGreek,bMed,bEng,bMod,bFut][ei](cx,v);cx.restore();}

// ПЕРВОБЫТНАЯ
function bPrim(c,v){
  if(v===0){// Костёр
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2;c.fillStyle='#555';c.beginPath();c.ellipse(Math.cos(a)*10,Math.sin(a)*5,5,4,0,0,Math.PI*2);c.fill();}
    c.strokeStyle='#5a2800';c.lineWidth=2;c.beginPath();c.moveTo(-6,0);c.lineTo(0,-18);c.stroke();c.beginPath();c.moveTo(6,0);c.lineTo(0,-18);c.stroke();
    c.fillStyle='#CC2200';c.beginPath();c.moveTo(-7,0);c.lineTo(0,-14);c.lineTo(7,0);c.closePath();c.fill();
    c.fillStyle='#FF6600';c.beginPath();c.moveTo(-5,0);c.lineTo(0,-20);c.lineTo(5,0);c.closePath();c.fill();
    c.fillStyle='#FFD700';c.beginPath();c.moveTo(-3,0);c.lineTo(0,-24);c.lineTo(3,0);c.closePath();c.fill();
    c.fillStyle='rgba(255,100,0,0.18)';c.beginPath();c.ellipse(0,-4,14,8,0,0,Math.PI*2);c.fill();
  }else if(v===1){// Шалаш
    c.fillStyle='#8B6A3A';c.beginPath();c.moveTo(-16,0);c.lineTo(0,-28);c.lineTo(16,0);c.closePath();c.fill();
    c.strokeStyle='#5a3010';c.lineWidth=2;c.beginPath();c.moveTo(-16,0);c.lineTo(0,-28);c.stroke();c.beginPath();c.moveTo(16,0);c.lineTo(0,-28);c.stroke();
    c.fillStyle='#3a1800';c.beginPath();c.moveTo(-4,0);c.lineTo(0,-12);c.lineTo(4,0);c.closePath();c.fill();
  }else if(v===2){// Большой шалаш (tepee)
    c.fillStyle='#A07840';c.beginPath();c.moveTo(-20,0);c.lineTo(0,-44);c.lineTo(20,0);c.closePath();c.fill();
    c.strokeStyle='#7a5020';c.lineWidth=1.5;
    for(let i=0;i<4;i++){const t=i/4;c.beginPath();c.moveTo(-20+t*20,0);c.lineTo(-10+t*10,-44+t*44);c.stroke();}
    c.strokeStyle='#5a3008';c.lineWidth=2;c.beginPath();c.moveTo(-2,-44);c.lineTo(-4,-54);c.stroke();c.beginPath();c.moveTo(2,-44);c.lineTo(4,-54);c.stroke();c.beginPath();c.moveTo(0,-44);c.lineTo(0,-56);c.stroke();
    c.fillStyle='#2a1200';c.beginPath();c.moveTo(-5,0);c.lineTo(0,-14);c.lineTo(5,0);c.closePath();c.fill();
  }else{// Стоянка (dome hut)
    c.fillStyle='#7a5530';c.beginPath();c.ellipse(0,-14,22,14,0,0,Math.PI,true);c.lineTo(-22,0);c.closePath();c.fill();
    c.strokeStyle='#4a3018';c.lineWidth=1;
    for(let i=1;i<5;i++){c.beginPath();c.ellipse(0,-2,22,14*i/5,0,0,Math.PI,true);c.stroke();}
    c.fillStyle='#2a1200';c.fillRect(-5,0,10,-8);c.beginPath();c.arc(-5,-8,5,0,Math.PI);c.fill();
    c.fillStyle='#604020';c.beginPath();c.ellipse(0,0,22,5,0,0,Math.PI*2);c.fill();
  }
}

// ГРЕЦИЯ
function bGreek(c,v){
  const marble='#F0EDE0',shadow='#C8C5B0',gold='#D4A800';
  if(v===0){// Дом греческий
    c.fillStyle=marble;c.fillRect(-20,0,40,-34);
    c.fillStyle=shadow;c.fillRect(-20,0,4,-34);

    c.fillStyle=concrete;c.fillRect(-18,0,36,-58);

  }else if(v===1){// Высотный дом 12 этажей

    c.fillStyle=metal;c.fillRect(-16,-96,32,-5);

    c.strokeStyle='rgba(255,50,50,0.4)';c.lineWidth=4;c.stroke();
  }else if(v===2){// Завод

  cx.beginPath();cx.moveTo(0,-9);cx.lineTo(3-as*3,-2);cx.stroke();

let _ac=null;
function ac(){
  if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
  return _ac;
}

function sndMeteor(){
  const a=ac(),t=a.currentTime;
  // deep boom
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(18,t+1.8);
  g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+2);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+2);
  // impact noise burst
  const buf=a.createBuffer(1,a.sampleRate*0.6,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=a.createBufferSource(),g2=a.createGain();
  g2.gain.setValueAtTime(0.7,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  s.buffer=buf;s.connect(g2);g2.connect(a.destination);s.start(t);
}

function sndFire(){
  const a=ac(),t=a.currentTime;
  // crackling filtered noise
  const buf=a.createBuffer(1,a.sampleRate*4,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=a.createBufferSource();s.buffer=buf;s.loop=false;
  const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=0.5;
  const g=a.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.3);
  g.gain.setValueAtTime(0.35,t+3);g.gain.linearRampToValueAtTime(0,t+4);
  s.connect(f);f.connect(g);g.connect(a.destination);s.start(t);
}

function sndPlague(){

function sndNewEra(){

let eraTransition=null;// {t, dur, name, year}
function drawEraTransition(cx,tr){
  const p=tr.t/tr.dur;// 0→1
  // flash phase: 0-0.15 flash in, 0.15-0.35 hold, 0.35-0.55 fade out
  const flashAlpha=p<0.1?(p/0.1)*0.7:p<0.3?0.7*(1-(p-0.1)/0.2):0;
  if(flashAlpha>0){cx.fillStyle=`rgba(255,255,255,${flashAlpha})`;cx.fillRect(0,0,W,H);}
  // text phase: 0.1-0.9
  if(p>0.08&&p<0.95){
    const tp=(p-0.08)/0.87;// 0→1 within text phase
    const textAlpha=tp<0.12?(tp/0.12):tp>0.8?Math.max(0,1-(tp-0.8)/0.2):1;
    const scale=tp<0.12?(0.4+tp/0.12*0.7):tp>0.8?(1+( tp-0.8)*0.5):1;
    cx.save();cx.translate(W/2,H/2);cx.scale(scale,scale);
    // glow bg
    const gg=cx.createRadialGradient(0,0,0,0,0,220);
    gg.addColorStop(0,`rgba(0,0,0,${textAlpha*0.75})`);gg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=gg;cx.beginPath();cx.arc(0,0,220,0,Math.PI*2);cx.fill();
    // "NEW ERA!" text
    cx.font=`900 ${Math.round(64)}px 'Arial Black',Arial,sans-serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=`rgba(255,215,0,${textAlpha})`;
    cx.shadowColor='rgba(255,180,0,0.9)';cx.shadowBlur=30;
    cx.fillText('NEW ERA!',0,-38);
    cx.shadowBlur=0;
    // era name
    cx.font=`800 28px 'Arial Black',Arial,sans-serif`;
    cx.fillStyle=`rgba(255,255,255,${textAlpha*0.95})`;
    cx.shadowColor='rgba(0,0,0,1)';cx.shadowBlur=8;
    cx.fillText(tr.name,0,18);
    // year
    cx.font=`700 20px 'Segoe UI',sans-serif`;
    cx.fillStyle=`rgba(255,215,0,${textAlpha*0.85})`;
    cx.fillText(tr.year,0,52);
    cx.shadowBlur=0;
    cx.restore();
  }
}

function triggerDisaster(){

  } else if(d.type==='fire'){
    extra={ox,oy,particles:[],maxR:110,killAt:1400,dur:5000};
  } else if(d.type==='invasion'){
    const warriors=[];
    for(let i=0;i<10;i++) warriors.push({x:-40-i*22,y:GND+80+Math.random()*(SEA_Y-GND-160),phase:Math.random()*Math.PI*2,dead:false,fleeing:false});
    extra={warriors,killAt:2000,dur:5000};
  } else if(d.type==='plague'){

    extra={waveY:SEA_Y,particles:[],killAt:1800,dur:5000};
  } else if(d.type==='tornado'){
    // рандомное появление: слева, справа или сверху

    const startX=side===0?W+80:-80;
    extra={tx:startX,ty:GND+100+Math.random()*(SEA_Y-GND-180),particles:[],killAt:2000,dur:5000};
  }
  disasterAnim={...d,...extra,t:0,kn,killed:false};
  const msg=document.getElementById('disasterMsg');
  msg.textContent=d.name+` -${kn} people!`;msg.style.display='block';
  try{DISASTER_SOUNDS[d.type]&&DISASTER_SOUNDS[d.type]();}catch(e){}
}

function applyDisasterDamage(a){
  const kn=a.kn;
  if(a.type==='meteor'){
    figures.sort((x,b)=>{const da=Math.hypot(x.x-a.tx,x.y-a.ty),db=Math.hypot(b.x-a.tx,b.y-a.ty);return da-db;});
    buildings.sort((x,b)=>Math.hypot(x.x-a.tx,x.y-a.ty)-Math.hypot(b.x-a.tx,b.y-a.ty));
  } else if(a.type==='fire'){
    figures.sort((x,b)=>{const da=Math.hypot(x.x-a.ox,x.y-a.oy),db=Math.hypot(b.x-a.ox,b.y-a.oy);return da-db;});
    buildings.sort((x,b)=>Math.hypot(x.x-a.ox,x.y-a.oy)-Math.hypot(b.x-a.ox,b.y-a.oy));
  } else if(a.type==='tsunami'){
    figures.sort((x,b)=>b.y-x.y);
    buildings.sort((x,b)=>b.y-x.y);
  } else if(a.type==='tornado'){
    figures.sort((x,b)=>Math.abs(x.x-a.tx+200)-Math.abs(b.x-a.tx+200));
    buildings.sort((x,b)=>Math.abs(x.x-a.tx)-Math.abs(b.x-a.tx));
  } else {
    // plague/invasion: random figures
    for(let i=figures.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[figures[i],figures[j]]=[figures[j],figures[i]];}
  }
  // Remove proportional % of visible figures (figures.length <= 250, civPop can be 5000+)
  const figKill=Math.max(1,Math.round(figures.length*a.kill));
  figures.splice(0,Math.min(figKill,figures.length));
  // Destroy some buildings near disaster epicenter
  const bkill=Math.max(1,Math.floor(buildings.length*a.kill*0.5));
  const blockUntil=performance.now()+10000;// blocked during disaster (5s) + 5s after
  // Save positions before removing so we can block them
  for(let i=0;i<Math.min(bkill,buildings.length);i++){
    blockedZones.push({x:buildings[i].x,y:buildings[i].y,r:MIN_BLDG_DIST,until:blockUntil});
  }
  // Also block the disaster epicenter area (larger radius)
  const epicX=a.type==='meteor'?a.tx:a.type==='fire'?a.ox:a.type==='plague'?a.ox:a.type==='tornado'?a.tx:W/2;
  const epicY=a.type==='meteor'?a.ty:a.type==='fire'?a.oy:a.type==='plague'?a.oy:a.type==='tornado'?a.ty:(GND+SEA_Y)/2;
  blockedZones.push({x:epicX,y:epicY,r:130,until:blockUntil});
  buildings.splice(0,Math.min(bkill,buildings.length));
  civPop=Math.max(0,civPop-kn);
  updateEra();updateUI();
}

    for(let i=0;i<8;i++){
      const tp=Math.max(0,prog-i*0.08);
      const tx2=a.sx+(a.tx-a.sx)*tp, ty2=a.sy+(a.ty-a.sy)*tp;
      const alpha=(1-i/8)*0.7;
      cx.fillStyle=`rgba(255,${150+i*10},0,${alpha})`;
      cx.beginPath();cx.arc(tx2,ty2,6-i*0.6,0,Math.PI*2);cx.fill();
    }
    // meteor head
    const g=cx.createRadialGradient(mx,my,0,mx,my,12);
    g.addColorStop(0,'rgba(255,255,200,1)');g.addColorStop(0.4,'rgba(255,150,0,0.9)');g.addColorStop(1,'rgba(255,50,0,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(mx,my,14,0,Math.PI*2);cx.fill();
  }
  if(t>=800&&t<2500){
    const ep=Math.min(1,(t-800)/600);
    const blastR=ep*90;
    // shockwave ring
    cx.strokeStyle=`rgba(255,200,80,${(1-ep)*0.8})`;cx.lineWidth=4;
    cx.beginPath();cx.arc(a.tx,a.ty,blastR,0,Math.PI*2);cx.stroke();
    // inner glow
    if(ep<0.5){const ig=cx.createRadialGradient(a.tx,a.ty,0,a.tx,a.ty,blastR*0.7);ig.addColorStop(0,`rgba(255,255,150,${(0.5-ep)})`);ig.addColorStop(1,'rgba(255,100,0,0)');cx.fillStyle=ig;cx.beginPath();cx.arc(a.tx,a.ty,blastR*0.7,0,Math.PI*2);cx.fill();}
    // debris particles (spawn once)
    if(a.particles.length===0&&ep>0.05){
      for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2;const spd=2+Math.random()*4;a.particles.push({x:a.tx,y:a.ty,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,life:1});}
    }
  }
  // update & draw debris
  a.particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.015;
    if(p.life>0){cx.fillStyle=`rgba(180,80,0,${p.life})`;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();}
  });
  // crater + smoke
  if(t>1200){
    const sp=Math.min(1,(t-1200)/600);
    cx.fillStyle=`rgba(60,30,0,${sp*0.7})`;cx.beginPath();cx.ellipse(a.tx,a.ty,30*sp,15*sp,0,0,Math.PI*2);cx.fill();
    for(let s=0;s<4;s++){const sy=a.ty-40-s*20-(t-1200)*0.02;const sa=Math.max(0,0.3-s*0.06-(t-2500)*0.0002);if(sa>0){cx.fillStyle=`rgba(100,90,80,${sa})`;cx.beginPath();cx.arc(a.tx+(s-2)*8,sy,10+s*5,0,Math.PI*2);cx.fill();}}
  }
}

function drawTsunamiAnim(cx,a,now){
  const t=a.t;
  // wave front moves from SEA_Y upward
  const maxUp=SEA_Y-GND-40;
  const waveProg=Math.min(1,Math.max(0,(t-200)/2800));
  const waveY=SEA_Y-waveProg*maxUp;
  const receding=t>3500;
  const recProg=receding?Math.min(1,(t-3500)/1800):0;
  const displayY=waveY+recProg*maxUp;

  // water mass behind wave
  if(!receding||recProg<0.9){
    const alpha=Math.max(0,0.82-recProg*0.9);
    cx.fillStyle=`rgba(15,65,160,${alpha})`;
    cx.beginPath();
    cx.moveTo(0,displayY+20);
    for(let x=0;x<=W;x+=10){cx.lineTo(x,displayY+10+Math.sin(x*0.04+now*0.004)*8);}
    cx.lineTo(W,SEA_Y+10);cx.lineTo(0,SEA_Y+10);cx.closePath();cx.fill();
  }
  // wave crest
  if(!receding){
    cx.strokeStyle='rgba(180,230,255,0.9)';cx.lineWidth=6;
    cx.beginPath();cx.moveTo(-20,waveY);
    for(let x=0;x<=W+20;x+=8){cx.lineTo(x,waveY-18+Math.sin(x*0.05+now*0.008)*10);}
    cx.stroke();
    // foam top
    cx.strokeStyle='rgba(255,255,255,0.8)';cx.lineWidth=3;
    cx.beginPath();cx.moveTo(-20,waveY-8);
    for(let x=0;x<=W+20;x+=6){cx.lineTo(x,waveY-26+Math.sin(x*0.07+now*0.01)*8);}
    cx.stroke();
  }
  // spray particles at wave front
  if(!receding&&Math.random()<0.4){
    a.particles.push({x:Math.random()*W,y:waveY-10,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*3,life:0.9,size:3+Math.random()*5});
  }
  a.particles=a.particles.filter(p=>p.life>0);
  a.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.03;cx.fillStyle=`rgba(200,230,255,${p.life})`;cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();});
}

function drawTornadoAnim(cx,a,now){
  const t=a.t;
  // tornado direction: if started from right → move left, else move right
  if(!a.dir) a.dir = a.tx > W/2 ? -1 : 1;
  a.tx += 0.7 * a.dir;
  const tx=a.tx, ty=a.ty;
  if(tx<-80)return;
  const wobble=Math.sin(now*0.003)*12;
  // funnel layers (wide at top, narrow at bottom)
  for(let layer=0;layer<8;layer++){
    const lp=layer/8;
    const layerW=(1-lp)*60+8; // wide at top, narrow at bottom
    const layerY=ty-lp*180;
    const spin=now*0.004*(1+lp);
    const alpha=0.25+lp*0.15;
    cx.strokeStyle=`rgba(160,140,120,${alpha})`;cx.lineWidth=2;
    cx.beginPath();cx.ellipse(tx+wobble*lp,layerY,layerW,layerW*0.35,spin,0,Math.PI*2);cx.stroke();
  }
  // dark core
  const cg=cx.createLinearGradient(tx,ty-180,tx,ty);
  cg.addColorStop(0,'rgba(60,50,40,0.6)');cg.addColorStop(1,'rgba(80,60,40,0.2)');
  cx.fillStyle=cg;cx.beginPath();cx.moveTo(tx+wobble,ty);cx.lineTo(tx-8+wobble*0.5,ty-180);cx.lineTo(tx+8+wobble*0.5,ty-180);cx.closePath();cx.fill();
  // debris spinning around
  if(Math.random()<0.4){a.particles.push({ang:Math.random()*Math.PI*2,r:20+Math.random()*50,y:ty-Math.random()*160,speed:(Math.random()-0.5)*0.15,life:1,size:2+Math.random()*4});}
  a.particles=a.particles.filter(p=>p.life>0);
  a.particles.forEach(p=>{
    p.ang+=p.speed;p.y-=0.5;p.life-=0.012;
    const px=tx+Math.cos(p.ang)*p.r, py=p.y;
    cx.fillStyle=`rgba(120,100,60,${p.life*0.8})`;cx.beginPath();cx.arc(px,py,p.size,0,Math.PI*2);cx.fill();
  });
  // ground swirl
  cx.strokeStyle='rgba(100,80,40,0.4)';cx.lineWidth=2;
  cx.beginPath();cx.ellipse(tx+wobble,ty,40,12,0,0,Math.PI*2);cx.stroke();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop(now){
  const dt=Math.min(now-lastTime,64);lastTime=now;
  // No demo mode — civilization is TikTok-only
  figures.forEach(f=>{
    f.phase+=dt*0.005;f.x+=f.vx;f.y+=f.vy;
    if(f.x<15){f.x=15;f.vx=Math.abs(f.vx);}if(f.x>W-15){f.x=W-15;f.vx=-Math.abs(f.vx);}
    if(f.y<GND+5){f.y=GND+5;f.vy=Math.abs(f.vy);}if(f.y>SEA_Y-15){f.y=SEA_Y-15;f.vy=-Math.abs(f.vy);}
    if(Math.random()<0.002){f.vx=(Math.random()-0.5)*0.8;f.vy=(Math.random()-0.5)*0.4;}
  });

  drawTerrain(eraIdx);
  ctx.drawImage(tc,0,0);
  drawSea(ctx,now);

  // Port (era 1-4)
  if(eraIdx>=1&&eraIdx<=4) drawPort(ctx,eraIdx);

  // Ships (era 1-4)
  if(eraIdx>=1&&eraIdx<=4){
    const s1x=((now*0.018)%(W+200))-100;
    const s2x=W-(((now*0.013)+400)%(W+200))+100;
    drawShip(ctx,s1x,SEA_Y+24,eraIdx,false);
    drawShip(ctx,s2x,SEA_Y+42,eraIdx,true);
  }

  // Planes (era 4 - Modern)
  if(eraIdx===4){
    const p1x=((now*0.028)%(W+160))-80;
    const p2x=W-(((now*0.019)+500)%(W+160))+80;
    const p3x=((now*0.014)+200)%(W+160)-80;
    drawPlane(ctx,p1x,GND*0.28,false);
    drawPlane(ctx,p2x,GND*0.55,true);
    drawPlane(ctx,p3x,GND*0.75,false);
  }

  // UFOs (era 5 - Future)
  if(eraIdx===5){
    const u1x=((now*0.016)%(W+140))-70;
    const u1y=GND*0.25+Math.sin(now*0.0012)*10;
    const u2x=W-(((now*0.021)+300)%(W+140))+70;
    const u2y=GND*0.6+Math.sin(now*0.0018+2)*8;
    const u3x=((now*0.009)+400)%(W+140)-70;
    const u3y=GND*0.45+Math.sin(now*0.001+4)*12;
    drawUFO(ctx,u1x,u1y,now);
    drawUFO(ctx,u2x,u2y,now);
    drawUFO(ctx,u3x,u3y,now);
  }

  // Buildings - add one per frame until target count reached
  const tgt=targetBldgCount();
  if(buildings.length<tgt) tryAddBuilding();
  [...buildings].sort((a,b)=>a.y-b.y).forEach(b=>{
    const depth=(b.y-GND)/(H-GND);
    drawBuilding(ctx,b.x,b.y,b.era,b.variant,0.35+depth*0.68);
  });

  // Figures
  [...figures].sort((a,b)=>a.y-b.y).forEach(f=>{
    const depth=(f.y-GND)/(H-GND);
    drawStick(ctx,f.x,f.y,f.phase,eraIdx,0.38+depth*0.62,f.donorColor);
  });

  // Disaster animation tick
  if(disasterAnim){
    disasterAnim.t+=dt;
    // Apply damage at the right moment
    if(!disasterAnim.killed&&disasterAnim.t>=disasterAnim.killAt){
      applyDisasterDamage(disasterAnim);
      disasterAnim.killed=true;
    }
    drawDisasterAnim(ctx,disasterAnim,now);
    // End animation
    if(disasterAnim.t>=disasterAnim.dur){
      disasterAnim=null;
      document.getElementById('disasterMsg').style.display='none';
    }
  }

  // Era transition overlay
  if(eraTransition){
    eraTransition.t+=dt;
    drawEraTransition(ctx,eraTransition);
    if(eraTransition.t>=eraTransition.dur) eraTransition=null;
  }

  requestAnimationFrame(gameLoop);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let socket;
const username=new URLSearchParams(location.search).get('username')||'demo';
const connMsg=document.getElementById('connMsg');
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  socket=new WebSocket(`${proto}://${location.host}?username=${encodeURIComponent(username)}`);
  socket.addEventListener('open',()=>{connMsg.textContent='🔗 Connected';setTimeout(()=>connMsg.style.display='none',2000);});
  socket.addEventListener('message',e=>{let m;try{m=JSON.parse(e.data);}catch{return;}handleEvent(m);});
  socket.addEventListener('close',()=>{connMsg.textContent='⚠️ Reconnecting…';connMsg.style.display='block';setTimeout(connectWS,3000);});
  socket.addEventListener('error',()=>socket.close());
}
function spawnNeutral(){
  civPop+=1;
  if(figures.length<MAX_FIGURES){const p=randZone();figures.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.3,phase:Math.random()*Math.PI*2,donorColor:'#FFFFFF'});}
  updateEra();updateUI();
}
function handleEvent(m){
  // Dedicated civilization events (always fired, not gated by race)
  if(m.type==='civ_gift'){
    spawnPeople(m.username||'?', Math.max(1, Number(m.coins)||1));
  }
  else if(m.type==='civ_like'){
    const n=Math.max(1,Math.floor((m.likes||1)));
    for(let i=0;i<n;i++) addLike();
  }
  // Fallback: legacy events
  else if(m.type==='arena_gift'||m.type==='gift'){spawnPeople(m.username||m.uniqueId||'?',Math.max(1,Number(m.coins||m.diamondCount)||1));}
  else if(m.type==='arena_like'||m.type==='like'){addLike();}
  else if(m.type==='arena_member'||m.type==='member'){/* ignore — civ_gift already handles it */}
  else if(m.type==='chat'||m.type==='comment'){
    const txt=(m.comment||m.message||'').toLowerCase();
    if(txt.includes('man')) spawnNeutral();
  }
  else if(m.type==='tiktok_connected'){connMsg.textContent=`✅ ${username} online`;setTimeout(()=>connMsg.style.display='none',2000);}
  else if(m.type==='tiktok_error'){connMsg.textContent='⚠️ TikTok error';connMsg.style.display='block';}
}

  document.getElementById('devPanel').style.display='flex';
}

// Always connect to WebSocket — no demo mode for civilization
connMsg.textContent='⏳ Waiting for stream…';
connectWS();
updateUI();
requestAnimationFrame(t=>{lastTime=t;gameLoop(t);});

// ── Dev panel functions ───────────────────────────────────────────────────────
function testDisaster(type){
  if(disasterAnim)return; // уже идёт катастрофа
  if(civPop<5) spawnPeople('test',50); // спавним людей если нет
  const d=DISASTERS.find(x=>x.type===type)||DISASTERS[0];
  const kn=Math.max(1,Math.floor(civPop*d.kill));
  const ox=80+Math.random()*(W-160), oy=GND+80+Math.random()*(SEA_Y-GND-160);
  let extra={};
  if(type==='meteor'){extra={sx:W*0.7+Math.random()*W*0.3,sy:-60,tx:ox,ty:oy,particles:[],killAt:900,dur:5000};}
  else if(type==='fire'){extra={ox,oy,particles:[],maxR:110,killAt:1400,dur:5000};}
  else if(type==='invasion'){const warriors=[];for(let i=0;i<10;i++)warriors.push({x:-40-i*22,y:GND+80+Math.random()*(SEA_Y-GND-160),phase:Math.random()*Math.PI*2,dead:false,fleeing:false});extra={warriors,killAt:2000,dur:5000};}
  else if(type==='plague'){extra={ox,oy,particles:[],r:0,killAt:1500,dur:5000};}
  else if(type==='tsunami'){extra={waveY:SEA_Y,particles:[],killAt:1800,dur:5000};}
  else if(type==='tornado'){const side=Math.floor(Math.random()*2);const startX=side===0?W+80:-80;extra={tx:startX,ty:GND+100+Math.random()*(SEA_Y-GND-180),particles:[],killAt:2000,dur:5000};}
  disasterAnim={...d,...extra,t:0,kn,killed:false};
  const msg=document.getElementById('disasterMsg');
  msg.textContent=d.name+` -${kn} people!`;msg.style.display='block';
  try{DISASTER_SOUNDS[type]&&DISASTER_SOUNDS[type]();}catch(e){console.warn('sound err',e);}
}

function setEra(idx){
  eraIdx=idx; cachedEra=-1;
  civPop=ERAS[idx].minPop+50;
  buildings.length=0; // clear buildings, let them respawn for new era
  updateUI();
}
</script>
