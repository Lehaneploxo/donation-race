<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>⚔️ Blue vs Red War!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #0a0a14;
      overflow: hidden;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    #scaleWrapper {
      position: absolute;
      top: 0; left: 0;
      width: 1000px; height: 1000px;
      transform-origin: top left;
    }
    #gameCanvas { position: absolute; top: 0; left: 0; display: block; }

    /* Username overlay */
    #usernameOverlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 14px;
    }
    #usernameOverlay h2 {
      color: #FFD700; font-size: 38px;
      text-shadow: 0 0 24px #FF6600;
      text-align: center;
    }
    #usernameOverlay p { color: #AAA; font-size: 18px; }
    #usernameInput {
      font-size: 24px; padding: 12px 20px;
      border-radius: 10px; border: 3px solid #FFD700;
      background: #111; color: #FFF;
      text-align: center; width: 380px; outline: none;
    }
    #usernameInput:focus { border-color: #4488FF; }
    #usernameBtn {
      font-size: 20px; font-weight: bold;
      padding: 12px 44px; border-radius: 10px; border: none;
      background: linear-gradient(90deg, #1133CC, #3388FF);
      color: #FFF; cursor: pointer; transition: transform 0.1s;
    }
    #usernameBtn:hover { transform: scale(1.04); }
    #demoWarBtn {
      font-size: 14px; color: #888; background: none;
      border: none; cursor: pointer; text-decoration: underline;
    }
    #demoWarBtn:hover { color: #CCC; }

    /* Status */
    #statusBadge {
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      font-size: 15px; padding: 5px 14px;
      border-radius: 8px; border: 2px solid #555;
      background: rgba(0,0,0,0.75); color: #AAA;
      white-space: nowrap; z-index: 100; display: none;
    }
    #statusBadge.live  { color: #00FF88; border-color: #00FF88; }
    #statusBadge.demo  { color: #FF9900; border-color: #FF9900; }
    #statusBadge.error { color: #FF4444; border-color: #FF4444; }

    /* UI buttons */
    .ui-btn {
      position: fixed; z-index: 99999;
      width: 24px; height: 24px; font-size: 11px;
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .ui-btn:hover { background: rgba(255,255,255,0.15); }
    #fsBtn  { top: calc(50% + 34px); right: 10px; }
    #backBtn { top: calc(50% - 12px); right: 10px; }
  </style>
</head>
<body>
<button id="fsBtn"  class="ui-btn" title="Fullscreen">⛶</button>
<button id="backBtn" class="ui-btn" title="Back to menu">⌂</button>

<div id="scaleWrapper">
  <canvas id="gameCanvas" width="1000" height="1000"></canvas>

  <div id="usernameOverlay">
    <h2>⚔️ BLUE vs RED WAR ⚔️</h2>
    <p>Enter TikTok username for stream</p>
    <input id="usernameInput" type="text" placeholder="@your_username" autocomplete="off" spellcheck="false">
    <button id="usernameBtn">▶ START</button>
    <button id="demoWarBtn">Demo mode (no TikTok)</button>
  </div>

  <div id="statusBadge">⏳ Connecting…</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// SOUND ENGINE (Web Audio API — synthesized, no files)
// ═══════════════════════════════════════════════════════════
let _actx = null;
let _lastAttack = 0, _lastDeath = 0, _lastBaseHit = 0;

function getACtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function playAttack() {
  const now = Date.now();
  if (now - _lastAttack < 160) return;
  _lastAttack = now;
  try {
    const ctx = getACtx(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    const flt = ctx.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 800; flt.Q.value = 4;
    osc.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(650, t);
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.07);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    osc.start(t); osc.stop(t + 0.13);
  } catch(e) {}
}

function playDeath() {
  const now = Date.now();
  if (now - _lastDeath < 220) return;
  _lastDeath = now;
  try {
    const ctx = getACtx(), t = ctx.currentTime;
    const bufSz = Math.floor(ctx.sampleRate * 0.18);
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSz * 0.25));
    const src = ctx.createBufferSource(), g = ctx.createGain();
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 380;
    src.buffer = buf; src.connect(f); f.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.28, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    src.start(t);
  } catch(e) {}
}

function playBaseHit() {
  const now = Date.now();
  if (now - _lastBaseHit < 300) return;
  _lastBaseHit = now;
  try {
    const ctx = getACtx(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(110, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.22);
    g.gain.setValueAtTime(0.32, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.32);
  } catch(e) {}
}

function playTowerCollapse() {
  try {
    const ctx = getACtx(), t = ctx.currentTime;
    // Low boom
    const osc = ctx.createOscillator(), g1 = ctx.createGain();
    osc.connect(g1); g1.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t); osc.frequency.exponentialRampToValueAtTime(18, t + 1.8);
    g1.gain.setValueAtTime(0.55, t); g1.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
    osc.start(t); osc.stop(t + 2.5);
    // Rumble noise
    const bufSz = Math.floor(ctx.sampleRate * 2.0);
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate);
    const nd = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) nd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSz * 0.55));
    const src = ctx.createBufferSource(), g2 = ctx.createGain();
    const flt = ctx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 280;
    src.buffer = buf; src.connect(flt); flt.connect(g2); g2.connect(ctx.destination);
    g2.gain.setValueAtTime(0.45, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
    src.start(t);
  } catch(e) {}
}

function playVictory() {
  try {
    const ctx = getACtx();
    // C-E-G-C ascending fanfare
    [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.17;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'triangle'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.28, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t); osc.stop(t + 0.42);
    });
    // Second phrase after 0.8s
    setTimeout(() => {
      try {
        [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
          const t2 = ctx.currentTime + i * 0.15;
          const osc2 = ctx.createOscillator(), g2 = ctx.createGain();
          osc2.connect(g2); g2.connect(ctx.destination);
          osc2.type = 'triangle'; osc2.frequency.value = freq;
          g2.gain.setValueAtTime(0.22, t2); g2.gain.exponentialRampToValueAtTime(0.001, t2 + 0.55);
          osc2.start(t2); osc2.stop(t2 + 0.6);
        });
      } catch(e) {}
    }, 800);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
// IMAGES
// ═══════════════════════════════════════════════════════════
const IMG = {};
['tiktok_gift','rose_gift','crown_gift','heart_gift'].forEach(name => {
  const img = new Image(); img.src = '/img/' + name + '.jpg'; IMG[name] = img;
});

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const CW = 1000, CH = 1000;
const BATTLE_Y   = 650;
const UNIT_SPEED = 72;
const UNIT_HP    = 100;
const UNIT_DMG   = 20;
const ATK_CD     = 1000;
const ATK_RANGE  = 40;
const SPACING    = 50;
const BASE_HP    = 2000;
const BASE_DMG   = 30;
const BASE_X_L   = 20;
const BASE_W     = 148;
const BASE_Y     = 80;
const BASE_H     = 600;
const BASE_X_R   = CW - BASE_X_L - BASE_W;
const VICTORY_MS = 7000;

// Конфиги типов юнитов
const UTYPE = {
  soldier: { hpM: 1,   dmgM: 1,   spd: 1.0, range: 1.0 },
  cavalry: { hpM: 4,   dmgM: 4,   spd: 1.3, range: 1.2 },
  boss:    { hpM: 100, dmgM: 100,  spd: 0.7, range: 1.5 },
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let units = [], uidSeq = 0;
let particles = [], debris = [], meteors = [];
let playerStats = {};
let blueWins = 0, redWins = 0;
let phase = 'playing';
let victoryTeam = '';
let victoryTimer = 0;

// Meteor shower
let totalLikes = 0;
let meteorShower = false;
let meteorTimer  = 0;
let meteorDmgAcc = 0;

let blueBase = { x: BASE_X_L, y: BASE_Y, w: BASE_W, h: BASE_H, hp: BASE_HP, maxHp: BASE_HP, dmg: BASE_DMG };
let redBase  = { x: BASE_X_R, y: BASE_Y, w: BASE_W, h: BASE_H, hp: BASE_HP, maxHp: BASE_HP, dmg: BASE_DMG };

// ═══════════════════════════════════════════════════════════
// SPAWN / RESET
// ═══════════════════════════════════════════════════════════
function spawnUnit(team, username, type) {
  if (phase !== 'playing') return;
  type = type || 'soldier';
  const cfg    = UTYPE[type] || UTYPE.soldier;
  const isBlue = team === 'blue';
  const atkR   = ATK_RANGE * cfg.range;
  units.push({
    id:         ++uidSeq,
    team, type,
    username:   username || 'viewer',
    x:          isBlue ? blueBase.x + blueBase.w + 6 : redBase.x - 6,
    y:          BATTLE_Y + (Math.random() * 16 - 8),
    hp:         UNIT_HP  * cfg.hpM,
    maxHp:      UNIT_HP  * cfg.hpM,
    dmg:        UNIT_DMG * cfg.dmgM,
    speed:      UNIT_SPEED * cfg.spd,
    atkRange:   atkR,
    atkTimer:   ATK_CD * 0.5,
    state:      'moving',
    target:     null,
    flashTimer: 0,
    dead:       false,
    deathTimer: 0,
  });
}

function handleChatMessage(username, team) {
  if (phase !== 'playing') return;
  const t = (team || '').toLowerCase();
  if (t !== 'blue' && t !== 'red') return;
  if (!playerStats[username]) playerStats[username] = { blue: 0, red: 0, total: 0 };
  playerStats[username][t]++;
  playerStats[username].total++;
  spawnUnit(t, username, 'soldier');
}

function handleGiftMessage(username, team, unitType) {
  if (phase !== 'playing') return;
  spawnUnit(team, username, unitType);
}

function handleLikes(count) {
  totalLikes += count;
  if (totalLikes >= 1000 && !meteorShower) {
    totalLikes -= 1000;
    triggerMeteorShower();
  }
}

function triggerMeteorShower() {
  meteorShower = true;
  meteorTimer  = 10000;
  meteorDmgAcc = 0;
  console.log('[War] Meteor Shower!');
  for (let i = 0; i < 6; i++) spawnMeteor();
}

function spawnMeteor() {
  meteors.push({
    x: CW * 0.2 + Math.random() * CW * 0.8,
    y: -40 - Math.random() * 200,
    vx: -(60 + Math.random() * 80),
    vy:  350 + Math.random() * 200,
    r:   9 + Math.random() * 12,
    trail: [],
    life: 3000, max: 3000,
  });
}

function resetRound() {
  units = []; particles = []; debris = []; meteors = [];
  playerStats = {};
  blueBase.hp = BASE_HP;
  redBase.hp  = BASE_HP;
  phase = 'playing';
  victoryTeam = '';
  victoryTimer = 0;
  totalLikes = 0;
  meteorShower = false;
  meteorTimer  = 0;
  meteorDmgAcc = 0;
}

// ═══════════════════════════════════════════════════════════
// UPDATE — UNITS
// ═══════════════════════════════════════════════════════════
function killUnit(u) {
  u.dead = true;
  u.hp = 0;
  u.deathTimer = 400;
  u.state = 'dead';
  playDeath();
  spawnDeathFX(u.x, u.y, u.team);
}

function updateUnits(dt) {
  for (const u of units) {
    // Мёртвый юнит — только анимация падения, потом удаляем
    if (u.dead) {
      u.deathTimer -= dt;
      continue;
    }

    u.flashTimer = Math.max(0, u.flashTimer - dt);
    u.atkTimer   = Math.max(0, u.atkTimer - dt);

    if (u.state === 'fighting') {
      const tgt = u.target;
      // Цель умерла или мертва — ищем нового врага
      if (!tgt || tgt.dead || tgt.hp <= 0) {
        u.state = 'moving'; u.target = null;
      } else if (u.atkTimer <= 0) {
        tgt.hp -= u.dmg;
        u.atkTimer = ATK_CD;
        u.flashTimer = 120;
        if (tgt.hp <= 0) {
          killUnit(tgt);
          u.state = 'moving'; u.target = null;
        } else {
          playAttack();
          spawnHitFX(tgt.x, tgt.y);
        }
        // Если юнит стоит у вражеской базы — бьёт и по базе тоже
        const eBase = u.team === 'blue' ? redBase : blueBase;
        const distToBase = u.team === 'blue'
          ? eBase.x - u.x
          : u.x - (eBase.x + eBase.w);
        if (distToBase <= ATK_RANGE + 5) {
          eBase.hp = Math.max(0, eBase.hp - u.dmg);
          playBaseHit();
          if (eBase.hp <= 0) triggerVictory(u.team);
        }
      }
      continue;
    }

    if (u.state === 'atk_base') {
      const base = u.team === 'blue' ? redBase : blueBase;
      if (base.hp <= 0) { u.state = 'moving'; continue; }
      if (u.atkTimer <= 0) {
        base.hp = Math.max(0, base.hp - u.dmg);
        u.atkTimer = ATK_CD; u.flashTimer = 120;
        playBaseHit();
        spawnHitFX(u.x, u.y);
        if (base.hp <= 0) triggerVictory(u.team);
      }
      continue;
    }

    // state === 'moving'
    const dir = u.team === 'blue' ? 1 : -1;
    const eBase = u.team === 'blue' ? redBase : blueBase;
    const distToBase = u.team === 'blue'
      ? eBase.x - u.x
      : u.x - (eBase.x + eBase.w);

    if (distToBase <= ATK_RANGE + 5) {
      u.state = 'atk_base'; u.atkTimer = 0; continue;
    }

    // Ближайший живой враг
    let nearestEnemy = null, nearestED = Infinity;
    for (const o of units) {
      if (o === u || o.team === u.team || o.dead) continue;
      const d = Math.abs(u.x - o.x);
      if (d < nearestED) { nearestED = d; nearestEnemy = o; }
    }
    if (nearestEnemy && nearestED < u.atkRange) {
      u.state = 'fighting'; u.target = nearestEnemy; u.atkTimer = 280; continue;
    }

    // Очередь — держать дистанцию от союзника впереди
    const mySpacing = SPACING * (u.type === 'boss' ? 2.5 : u.type === 'cavalry' ? 1.5 : 1);
    let frontDist = Infinity;
    for (const a of units) {
      if (a === u || a.team !== u.team || a.dead) continue;
      const d = dir > 0 ? (a.x - u.x) : (u.x - a.x);
      if (d > 0 && d < frontDist) frontDist = d;
    }
    if (frontDist < mySpacing) {
      const gap = Math.max(0, frontDist - mySpacing + 1);
      u.x += dir * Math.min(u.speed * dt / 1000, gap);
      continue;
    }

    u.x += dir * u.speed * dt / 1000;
  }

  // Удаляем тех у кого кончилась анимация смерти
  units = units.filter(u => !u.dead || u.deathTimer > 0);
}

// ═══════════════════════════════════════════════════════════
// PARTICLES & DEBRIS
// ═══════════════════════════════════════════════════════════
function spawnHitFX(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({ x, y,
      vx: (Math.random() - 0.5) * 90, vy: (Math.random() - 0.5) * 90 - 25,
      life: 350, max: 350, r: 2 + Math.random() * 3, col: '#FFD700' });
  }
}

function spawnDeathFX(x, y, team) {
  const col = team === 'blue' ? '#3388FF' : '#FF3333';
  for (let i = 0; i < 14; i++) {
    particles.push({ x, y,
      vx: (Math.random() - 0.5) * 140, vy: (Math.random() - 0.5) * 110 - 40,
      life: 600, max: 600, r: 3 + Math.random() * 5, col });
  }
}

function spawnBaseCollapseFX(base) {
  const stoneCol = ['#888', '#666', '#999', '#555'];
  const woodCol  = ['#8B4513', '#A0522D', '#6B3410'];
  for (let i = 0; i < 40; i++) {
    const isStone = i < 25;
    debris.push({
      x: base.x + Math.random() * base.w,
      y: base.y + Math.random() * base.h * 0.6,
      vx: (Math.random() - 0.5) * 260,
      vy: -Math.random() * 320 - 80,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 9,
      life: 1600 + Math.random() * 1200,
      max:  2800,
      w: isStone ? 8 + Math.random() * 28 : 10 + Math.random() * 36,
      h: isStone ? 8 + Math.random() * 22 : 5  + Math.random() * 16,
      col: isStone ? stoneCol[i % stoneCol.length] : woodCol[i % woodCol.length],
    });
  }
}

function updateFX(dt) {
  const g = 220;
  for (const p of particles) {
    p.x += p.vx * dt / 1000; p.y += p.vy * dt / 1000;
    p.vy += g * dt / 1000;   p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  for (const d of debris) {
    d.x += d.vx * dt / 1000; d.y += d.vy * dt / 1000;
    d.vy += g * 1.8 * dt / 1000;
    d.rot += d.rotV * dt / 1000; d.life -= dt;
    if (d.y > CH + 100) d.life = 0;
  }
  debris = debris.filter(d => d.life > 0);

  // Meteors
  for (const m of meteors) {
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 10) m.trail.shift();
    m.x += m.vx * dt / 1000;
    m.y += m.vy * dt / 1000;
    m.life -= dt;
    if (m.y > CH + 60) m.life = 0;
  }
  meteors = meteors.filter(m => m.life > 0);
}

function updateMeteorShower(dt) {
  if (!meteorShower) return;
  meteorTimer  -= dt;
  meteorDmgAcc += dt;

  // Спавн метеоров
  if (Math.random() < dt / 300) spawnMeteor();

  // Урон всем юнитам раз в секунду
  if (meteorDmgAcc >= 1000) {
    meteorDmgAcc -= 1000;
    for (const u of units) {
      if (!u.dead) {
        u.hp -= 1;
        if (u.hp <= 0) killUnit(u);
      }
    }
  }

  if (meteorTimer <= 0) {
    meteorShower = false;
    meteorTimer  = 0;
    meteorDmgAcc = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// VICTORY
// ═══════════════════════════════════════════════════════════
function triggerVictory(team) {
  if (phase !== 'playing') return;
  phase = 'victory';
  victoryTeam = team;
  victoryTimer = VICTORY_MS;
  if (team === 'blue') blueWins++; else redWins++;
  const losingBase = team === 'blue' ? redBase : blueBase;
  playTowerCollapse();
  spawnBaseCollapseFX(losingBase);
  setTimeout(playVictory, 900);
}

// ═══════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');

function drawMeteors() {
  for (const m of meteors) {
    const baseA = Math.min(1, m.life / 400);
    // Trail
    for (let i = 1; i < m.trail.length; i++) {
      const t0 = m.trail[i - 1], t1 = m.trail[i];
      ctx.save();
      ctx.globalAlpha = baseA * (i / m.trail.length) * 0.55;
      ctx.strokeStyle = '#FF7700';
      ctx.lineWidth = m.r * (i / m.trail.length) * 1.4;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(t0.x, t0.y); ctx.lineTo(t1.x, t1.y); ctx.stroke();
      ctx.restore();
    }
    // Core glow
    ctx.save();
    ctx.globalAlpha = baseA;
    const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r);
    g.addColorStop(0, '#FFFFFF'); g.addColorStop(0.3, '#FFEE00');
    g.addColorStop(0.7, '#FF4400'); g.addColorStop(1, '#880000');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawMeteorAnnouncement() {
  const pulse = 0.82 + Math.sin(Date.now() / 190) * 0.18;
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 54px Arial Black';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#FF8800';
  ctx.fillText('☄️ METEOR SHOWER', CW / 2, 148);
  ctx.shadowBlur = 0;
  // Countdown bar
  const pct = Math.max(0, meteorTimer / 10000);
  const bw = 300;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(CW / 2 - bw / 2, 158, bw, 12);
  ctx.fillStyle = '#FF5500';
  ctx.fillRect(CW / 2 - bw / 2, 158, bw * pct, 12);
  ctx.restore();
}

function draw(now) {
  ctx.clearRect(0, 0, CW, CH);
  drawBackground();
  drawBases();
  drawParticles();
  drawDebris();
  if (meteorShower) drawMeteors();
  drawUnits(now);
  drawHUD();
  if (meteorShower) drawMeteorAnnouncement();
  if (phase === 'victory') drawVictoryScreen();
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, CH);
  sky.addColorStop(0,   '#0a0a2e');
  sky.addColorStop(0.5, '#1a0e00');
  sky.addColorStop(1,   '#3d2200');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CW, CH);

  // Ground — на уровне ворот
  const gr = ctx.createLinearGradient(0, 660, 0, CH);
  gr.addColorStop(0, '#3a2508'); gr.addColorStop(1, '#1e1200');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 660, CW, CH - 660);

  // Dashed battle line
  ctx.strokeStyle = 'rgba(255,120,0,0.25)';
  ctx.lineWidth = 2; ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(blueBase.x + blueBase.w + 10, BATTLE_Y);
  ctx.lineTo(redBase.x - 10, BATTLE_Y);
  ctx.stroke(); ctx.setLineDash([]);

  // Center glow divider
  ctx.fillStyle = 'rgba(255,140,0,0.1)';
  ctx.fillRect(CW / 2 - 4, CH * 0.08, 8, CH * 0.84);
}

function drawBase(base, team) {
  const isBlue = team === 'blue';
  const col    = isBlue ? '#1a55ee' : '#ee1515';
  const dark   = isBlue ? '#0a2b8a' : '#8a0a0a';
  const hp     = base.hp / base.maxHp;
  const dead   = base.hp <= 0;

  // Shake when damaged
  let sx = 0, sy = 0;
  if (hp < 0.3 && !dead) { sx = (Math.random() - 0.5) * 5; sy = (Math.random() - 0.5) * 5; }
  ctx.save(); ctx.translate(sx, sy);

  if (dead) {
    // Rubble heap
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.moveTo(base.x, base.y + base.h);
    ctx.lineTo(base.x + base.w / 2, base.y + base.h * 0.75);
    ctx.lineTo(base.x + base.w, base.y + base.h);
    ctx.fill();
    ctx.fillStyle = '#555';
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(base.x + i * 28, base.y + base.h * 0.78 + i * 5, 20, 14);
    }
    ctx.restore(); return;
  }

  // Main wall
  const grd = ctx.createLinearGradient(base.x, 0, base.x + base.w, 0);
  grd.addColorStop(0, dark); grd.addColorStop(0.5, col); grd.addColorStop(1, dark);
  ctx.fillStyle = grd;
  ctx.fillRect(base.x, base.y, base.w, base.h);

  // Stone texture lines
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  for (let row = 0; row < 10; row++) {
    const ry = base.y + row * (base.h / 10);
    ctx.beginPath(); ctx.moveTo(base.x, ry); ctx.lineTo(base.x + base.w, ry); ctx.stroke();
  }

  // Battlements (crenellations) at top
  const bmW = 20, bmH = 28, bmGap = 10;
  const numBm = Math.floor(base.w / (bmW + bmGap));
  ctx.fillStyle = col;
  for (let i = 0; i < numBm; i++) {
    ctx.fillRect(base.x + i * (bmW + bmGap), base.y - bmH, bmW, bmH);
  }

  // Corner towers
  const tw = 36;
  ctx.fillStyle = dark;
  ctx.fillRect(base.x - tw / 2,           base.y - 50, tw, base.h * 0.45 + 50);
  ctx.fillRect(base.x + base.w - tw / 2,  base.y - 50, tw, base.h * 0.45 + 50);
  // Tower caps
  ctx.fillStyle = col;
  ctx.fillRect(base.x - tw / 2 - 6,          base.y - 68, tw + 12, 20);
  ctx.fillRect(base.x + base.w - tw / 2 - 6, base.y - 68, tw + 12, 20);

  // Gate arch — большие ворота на уровне земли
  const gw = 68, gh = 120;
  const gx = base.x + (base.w - gw) / 2;
  const gy = base.y + base.h - gh;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.rect(gx, gy + gh * 0.35, gw, gh * 0.65);
  ctx.arc(gx + gw / 2, gy + gh * 0.35, gw / 2, Math.PI, 0);
  ctx.fill();

  // Flag pole + flag
  const fpx = base.x + base.w / 2;
  const fpy = base.y - 90;
  ctx.strokeStyle = '#AAA'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(fpx, fpy); ctx.lineTo(fpx, fpy + 65); ctx.stroke();
  const wave = Math.sin(Date.now() / 400) * 4;
  ctx.fillStyle = isBlue ? '#44AAFF' : '#FF4444';
  ctx.beginPath();
  ctx.moveTo(fpx, fpy);
  ctx.lineTo(fpx + 38 + wave, fpy + 12);
  ctx.lineTo(fpx, fpy + 26);
  ctx.fill();

  // Fire effects at low HP
  if (hp < 0.6) {
    drawFire(base.x + base.w * 0.28, base.y + 30, 1 - hp);
    drawFire(base.x + base.w * 0.72, base.y + 60, 1 - hp);
    if (hp < 0.3) drawFire(base.x + base.w * 0.5, base.y + 10, 1 - hp);
  }

  ctx.restore();

  // HP bar (outside shake so it stays readable)
  const bx = base.x - 10, by = base.y + base.h + 18;
  const bw = base.w + 20, bh = 22;
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = hp > 0.5 ? '#00cc44' : hp > 0.25 ? '#FF8800' : '#FF2222';
  ctx.fillRect(bx, by, bw * hp, bh);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(base.hp) + ' HP', base.x + base.w / 2, by + bh - 4);

  // Team label above flag
  ctx.fillStyle = isBlue ? '#66BBFF' : '#FF7777';
  ctx.font = 'bold 26px Arial Black'; ctx.textAlign = 'center';
  ctx.fillText(isBlue ? 'BLUE' : 'RED', base.x + base.w / 2, base.y - 110);
}

function drawFire(x, y, intensity) {
  const t = Date.now() / 200;
  const h = 25 + intensity * 45;
  for (let i = 0; i < 6; i++) {
    const fx = x + Math.sin(t + i * 1.3) * 8 - 4;
    const fy = y - i * h / 6;
    const r  = (6 - i) * 3.5 * intensity;
    if (r <= 0) continue;
    const a  = (1 - i / 6) * 0.85;
    ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fillStyle = i < 3 ? `rgba(255,200,0,${a})` : `rgba(255,50,0,${a})`;
    ctx.fill();
  }
}

function drawBases() {
  drawBase(blueBase, 'blue');
  drawBase(redBase,  'red');
}

// ── Солдат (копейщик) ────────────────────────────────────────────────────
function drawSoldier(x, y, dir, isBlue, flash, state, now, s) {
  s = s || 1;
  const col  = flash ? '#FFF' : (isBlue ? '#3388FF' : '#FF3333');
  const dark = isBlue ? '#0a2fcc' : '#cc0a0a';
  const legS = state === 'moving'   ? Math.sin(now / 115) * 9  * s : 0;
  const atkB = state === 'fighting' ? Math.sin(now / 70)  * 5  * s : 0;

  ctx.strokeStyle = dark; ctx.lineWidth = 5 * s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y - 22*s); ctx.lineTo(x, y - 2*s); ctx.stroke();
  ctx.lineWidth = 4 * s;
  ctx.beginPath(); ctx.moveTo(x, y - 2*s); ctx.lineTo(x - 7*s + legS, y + 15*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - 2*s); ctx.lineTo(x + 7*s - legS, y + 15*s); ctx.stroke();
  ctx.lineWidth = 3 * s;
  ctx.beginPath(); ctx.moveTo(x, y - 18*s); ctx.lineTo(x - dir * 14*s, y - 9*s); ctx.stroke();
  const ax = x + dir * 18*s, ay = y - 18*s + atkB;
  ctx.beginPath(); ctx.moveTo(x, y - 18*s); ctx.lineTo(ax, ay); ctx.stroke();
  ctx.strokeStyle = '#7a5200'; ctx.lineWidth = 3 * s;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax + dir * 28*s, ay - 14*s); ctx.stroke();
  ctx.fillStyle = '#D0D0D0';
  ctx.beginPath();
  ctx.moveTo(ax + dir*38*s, ay - 18*s); ctx.lineTo(ax + dir*28*s, ay - 10*s);
  ctx.lineTo(ax + dir*28*s, ay - 26*s); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y - 32*s, 9*s, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth = 2*s; ctx.stroke();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(x, y - 34*s, 10*s, Math.PI, 0); ctx.fill();
  ctx.fillStyle = isBlue ? '#88CCFF' : '#FF9999';
  ctx.fillRect(x - 3*s, y - 47*s, 6*s, 13*s);
}

// ── Конница ──────────────────────────────────────────────────────────────
function drawCavalry(x, y, dir, isBlue, flash, state, now) {
  const col      = flash ? '#FFF' : (isBlue ? '#4499FF' : '#FF4444');
  const dark     = isBlue ? '#0a2fcc' : '#cc0a0a';
  const horseCol = isBlue ? '#7a5a20' : '#6B2010';
  const legS     = state === 'moving' ? Math.sin(now / 90) * 12 : 0;
  const atkB     = state === 'fighting' ? Math.sin(now / 60) * 6 : 0;

  // Тень
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y + 6, 34, 7, 0, 0, Math.PI * 2); ctx.fill();

  // Ноги лошади (4 шт.)
  ctx.strokeStyle = horseCol; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x + dir*18, y - 6); ctx.lineTo(x + dir*18 + legS*0.5, y + 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + dir*8,  y - 6); ctx.lineTo(x + dir*8  - legS*0.7, y + 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - dir*14, y - 6); ctx.lineTo(x - dir*14 - legS*0.5, y + 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - dir*22, y - 6); ctx.lineTo(x - dir*22 + legS*0.7, y + 18); ctx.stroke();

  // Тело лошади
  ctx.fillStyle = horseCol;
  ctx.beginPath(); ctx.ellipse(x, y - 12, 34, 16, 0, 0, Math.PI * 2); ctx.fill();

  // Голова лошади
  ctx.beginPath(); ctx.ellipse(x + dir*34, y - 22, 14, 9, dir > 0 ? -0.4 : 0.4, 0, Math.PI * 2); ctx.fill();
  // Ухо
  ctx.fillStyle = '#5a3a10';
  ctx.beginPath(); ctx.moveTo(x + dir*34, y - 30); ctx.lineTo(x + dir*38, y - 38); ctx.lineTo(x + dir*30, y - 32); ctx.fill();
  // Грива
  ctx.strokeStyle = '#4a2a08'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x - dir*5, y - 26); ctx.lineTo(x - dir*2, y - 18); ctx.stroke();

  // Тело всадника
  ctx.strokeStyle = dark; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - dir*4, y - 28); ctx.lineTo(x - dir*4, y - 52); ctx.stroke();
  // Рука с мечом
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x - dir*4, y - 44); ctx.lineTo(x + dir*18, y - 44 + atkB); ctx.stroke();
  // Меч (шире и длиннее чем копьё)
  ctx.strokeStyle = '#CCC'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(x + dir*18, y - 44 + atkB); ctx.lineTo(x + dir*46, y - 56 + atkB); ctx.stroke();
  // Гарда меча
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x + dir*22, y - 47 + atkB); ctx.lineTo(x + dir*22, y - 40 + atkB); ctx.stroke();
  // Голова всадника
  ctx.beginPath(); ctx.arc(x - dir*4, y - 60, 12, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth = 2; ctx.stroke();
  // Шлем
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(x - dir*4, y - 62, 13, Math.PI, 0); ctx.fill();
  ctx.fillStyle = isBlue ? '#88CCFF' : '#FF9999';
  ctx.fillRect(x - dir*4 - 3, y - 78, 6, 16);
}

// ── Босс ─────────────────────────────────────────────────────────────────
function drawBoss(x, y, dir, isBlue, flash, state, now) {
  const S    = 3.2;  // масштаб
  const col  = flash ? '#FFF' : (isBlue ? '#2266EE' : '#EE2222');
  const dark = isBlue ? '#0a1a88' : '#880a0a';
  const legS = state === 'moving'   ? Math.sin(now / 150) * 11 * S : 0;
  const atkB = state === 'fighting' ? Math.sin(now / 80)  * 6  * S : 0;

  // Большая тень
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(x, y + 8, 38, 10, 0, 0, Math.PI * 2); ctx.fill();

  // Тело
  ctx.strokeStyle = dark; ctx.lineWidth = 7 * S; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y - 22*S); ctx.lineTo(x, y - 2*S); ctx.stroke();
  // Ноги
  ctx.lineWidth = 5 * S;
  ctx.beginPath(); ctx.moveTo(x, y - 2*S); ctx.lineTo(x - 8*S + legS, y + 14*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - 2*S); ctx.lineTo(x + 8*S - legS, y + 14*S); ctx.stroke();
  // Широкие плечи / броня
  ctx.fillStyle = dark;
  ctx.fillRect(x - 20*S, y - 36*S, 40*S, 20*S);
  // Нагрудник
  ctx.fillStyle = isBlue ? '#3355AA' : '#AA3333';
  ctx.fillRect(x - 14*S, y - 34*S, 28*S, 18*S);
  // Руки
  ctx.strokeStyle = dark; ctx.lineWidth = 6*S;
  ctx.beginPath(); ctx.moveTo(x - 18*S, y - 32*S); ctx.lineTo(x - dir*30*S, y - 24*S); ctx.stroke();
  const ax = x + dir * 20*S, ay = y - 32*S + atkB;
  ctx.beginPath(); ctx.moveTo(x + 18*S * dir, y - 32*S); ctx.lineTo(ax, ay); ctx.stroke();
  // Огромный топор/меч
  ctx.strokeStyle = '#AAA'; ctx.lineWidth = 7*S;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax + dir*32*S, ay - 20*S); ctx.stroke();
  // Лезвие
  ctx.fillStyle = '#CCC';
  ctx.beginPath();
  ctx.moveTo(ax + dir*32*S, ay - 20*S);
  ctx.lineTo(ax + dir*50*S, ay - 8*S);
  ctx.lineTo(ax + dir*48*S, ay - 32*S);
  ctx.fill();
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(ax + dir*32*S, ay - 20*S);
  ctx.lineTo(ax + dir*26*S, ay - 6*S);
  ctx.lineTo(ax + dir*48*S, ay - 8*S);
  ctx.fill();
  // Голова
  ctx.beginPath(); ctx.arc(x, y - 42*S, 11*S, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.strokeStyle = dark; ctx.lineWidth = 2*S; ctx.stroke();
  // Рогатый шлем
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(x, y - 44*S, 13*S, Math.PI, 0); ctx.fill();
  // Рога
  ctx.fillStyle = isBlue ? '#5577CC' : '#CC5533';
  ctx.beginPath(); ctx.moveTo(x - 10*S, y - 52*S); ctx.lineTo(x - 18*S, y - 72*S); ctx.lineTo(x - 4*S, y - 52*S); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + 10*S, y - 52*S); ctx.lineTo(x + 18*S, y - 72*S); ctx.lineTo(x + 4*S,  y - 52*S); ctx.fill();
  // Глаза светящиеся
  ctx.fillStyle = isBlue ? '#00FFFF' : '#FF6600';
  ctx.beginPath(); ctx.arc(x - 4*S, y - 43*S, 2.5*S, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4*S, y - 43*S, 2.5*S, 0, Math.PI * 2); ctx.fill();
}

function drawUnit(u, now) {
  const dying  = u.dead;
  const alpha  = dying ? Math.max(0, u.deathTimer / 400) : 1;
  const flash  = u.flashTimer > 0;
  const isBlue = u.team === 'blue';
  const dir    = isBlue ? 1 : -1;

  ctx.save();
  ctx.globalAlpha = alpha;

  const x = u.x, y = u.y;
  const dark = isBlue ? '#0a2fcc' : '#cc0a0a';

  // Анимация смерти — падение
  if (dying) {
    const S = u.type === 'boss' ? 3.2 : u.type === 'cavalry' ? 1.6 : 1;
    const angle = dir * (Math.PI / 2) * (1 - u.deathTimer / 400);
    ctx.translate(x, y); ctx.rotate(angle);
    ctx.strokeStyle = dark; ctx.lineWidth = 5 * S; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -30 * S); ctx.lineTo(0, 10 * S); ctx.stroke();
    ctx.restore(); return;
  }

  // Тень
  const shadowW = u.type === 'boss' ? 38 : u.type === 'cavalry' ? 25 : 15;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y + 10, shadowW, 5, 0, 0, Math.PI * 2); ctx.fill();

  // Отрисовка по типу
  if (u.type === 'boss') {
    drawBoss(x, y, dir, isBlue, flash, u.state, now);
  } else if (u.type === 'cavalry') {
    drawCavalry(x, y, dir, isBlue, flash, u.state, now);
  } else {
    drawSoldier(x, y, dir, isBlue, flash, u.state, now, 1);
  }

  // HP bar (масштабируется по типу)
  const hpR = u.hp / u.maxHp;
  const S   = u.type === 'boss' ? 3.2 : u.type === 'cavalry' ? 1.8 : 1;
  const pw  = 32 * S, ph = 6 * Math.max(1, S * 0.6);
  const hpY = u.type === 'boss' ? y - 80*S : u.type === 'cavalry' ? y - 88 : y - 60;
  ctx.fillStyle = '#111'; ctx.fillRect(x - pw/2, hpY, pw, ph);
  ctx.fillStyle = hpR > 0.5 ? '#00cc44' : hpR > 0.25 ? '#FF8800' : '#FF2222';
  ctx.fillRect(x - pw/2, hpY, pw * hpR, ph);

  ctx.restore();
}

function drawUnits(now) {
  // Draw in order (furthest from their base first for correct overlap)
  const sorted = [...units].sort((a, b) => {
    const da = a.team === 'blue' ? a.x : CW - a.x;
    const db = b.team === 'blue' ? b.x : CW - b.x;
    return db - da;
  });
  for (const u of sorted) drawUnit(u, now);
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawDebris() {
  for (const d of debris) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.life / d.max);
    ctx.translate(d.x, d.y); ctx.rotate(d.rot);
    ctx.fillStyle = d.col;
    ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    ctx.restore();
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, CW, 92);

  // Blue wins
  ctx.fillStyle = '#4488FF'; ctx.font = 'bold 42px Arial Black'; ctx.textAlign = 'center';
  ctx.fillText('BLUE ' + blueWins, CW * 0.16, 56);

  // Like counter bar (top-center)
  const likesPct = Math.min(1, totalLikes / 1000);
  const lbW = 230, lbH = 14, lbX = CW / 2 - lbW / 2, lbY = 12;
  ctx.fillStyle = '#1a0010'; ctx.fillRect(lbX, lbY, lbW, lbH);
  const lbGrad = ctx.createLinearGradient(lbX, 0, lbX + lbW, 0);
  lbGrad.addColorStop(0, '#FF3399'); lbGrad.addColorStop(1, '#FF9944');
  ctx.fillStyle = lbGrad; ctx.fillRect(lbX, lbY, lbW * likesPct, lbH);
  ctx.strokeStyle = '#553355'; ctx.lineWidth = 1; ctx.strokeRect(lbX, lbY, lbW, lbH);
  ctx.fillStyle = '#FFD0EE'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
  ctx.fillText('❤️ ' + Math.floor(totalLikes) + ' / 1000  →  ☄️ METEOR', CW / 2, lbY + lbH + 16);

  // VS
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 30px Arial Black';
  ctx.fillText('VS', CW / 2, 78);

  // Red wins
  ctx.fillStyle = '#FF4444'; ctx.font = 'bold 42px Arial Black';
  ctx.fillText('RED ' + redWins, CW * 0.84, 56);

  // Unit counts
  const bc = units.filter(u => u.team === 'blue' && !u.dead).length;
  const rc = units.filter(u => u.team === 'red'  && !u.dead).length;
  ctx.fillStyle = 'rgba(68,136,255,0.9)'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'left';
  ctx.fillText('⚔ ' + bc + ' воинов', 28, CH - 12);

function drawVictoryScreen() {
  const winCol = victoryTeam === 'blue' ? '#4488FF' : '#FF4444';
  const elapsed = VICTORY_MS - victoryTimer;
  const fadeIn  = Math.min(1, elapsed / 600);

  ctx.save();
  ctx.globalAlpha = fadeIn * 0.86;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CW, CH);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = fadeIn;

  // Victory headline
  ctx.font = 'bold 82px Arial Black'; ctx.textAlign = 'center';
  ctx.shadowColor = winCol; ctx.shadowBlur = 40;
  ctx.fillStyle = winCol;
  const pulse = Math.sin(Date.now() / 280) * 4;
  ctx.fillText('TEAM ' + victoryTeam.toUpperCase() + ' WINS!', CW / 2, 185 + pulse);
  ctx.shadowBlur = 0;

  // Top players header
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 38px Arial Black';
  ctx.fillText('TOP PLAYERS', CW / 2, 268);

  // Separator
  ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(CW / 2 - 260, 282); ctx.lineTo(CW / 2 + 260, 282); ctx.stroke();

  // Players list
  const top = Object.entries(playerStats)
    .sort((a, b) => b[1].total - a[1].total)
    .slice(0, 8);

  top.forEach(([name, stats], i) => {
    const py = 336 + i * 64;
    const rankCol = ['#FFD700', '#C0C0C0', '#CD7F32'][i] || '#FFFFFF';
    const medal   = ['🥇', '🥈', '🥉'][i] || (i + 1) + '.';
    ctx.font = `bold ${i < 3 ? 32 : 27}px Arial`; ctx.fillStyle = rankCol;
    ctx.textAlign = 'left';
    ctx.fillText(medal + ' ' + name, CW / 2 - 275, py);
    ctx.fillStyle = winCol; ctx.textAlign = 'right'; ctx.font = 'bold 28px Arial';
    ctx.fillText(stats[victoryTeam] + ' ' + victoryTeam + ' / ' + stats.total + ' total', CW / 2 + 275, py);
  });

  if (top.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '26px Arial'; ctx.textAlign = 'center';
    ctx.fillText('No players this round', CW / 2, 400);
  }

  // Countdown
  const secs = Math.ceil(victoryTimer / 1000);
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
  ctx.fillText('New round in ' + secs + 's…', CW / 2, 908);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastT = 0;

function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(now - (lastT || now), 100);
  lastT = now;

  if (phase === 'playing') updateUnits(dt);
  updateFX(dt);
  updateMeteorShower(dt);

  if (phase === 'victory') {
    victoryTimer -= dt;
    if (victoryTimer <= 0) resetRound();
  }

  draw(now);
}

requestAnimationFrame(gameLoop);

// ═══════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════
let _ws = null, _wsUser = '';

function wsConnect(username) {
  _wsUser = username;
  if (_ws && _ws.readyState < 2) { _ws.onclose = null; _ws.close(); }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  _ws = new WebSocket(`${proto}//${location.host}?username=${encodeURIComponent(username)}`);

  _ws.onopen = () => {
    console.log('[War WS] connected @' + username);
    setStatus('connecting', '⏳ @' + username + '…');
  };

  _ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'war_chat') {
        handleChatMessage(data.username, data.team);
      }
      if (data.type === 'war_gift') {
        handleGiftMessage(data.username, data.team, data.unitType);
      }
      if (data.type === 'war_like') {
        handleLikes(data.likes || 0);
      }
      if (data.type === 'init' || data.type === 'status') {
        if (data.mode === 'tiktok') setStatus('live', '🔴 LIVE @' + (data.username || username));
        else if (data.mode === 'demo') setStatus('demo', '🟡 DEMO — type blue/red in chat sim');
        else setStatus('connecting', '⏳ @' + username + '…');
      }
    } catch(e) {}
  };

  _ws.onclose = () => {
    setStatus('error', '❌ Disconnected — reconnecting…');
    setTimeout(() => wsConnect(_wsUser), 3000);
  };

  _ws.onerror = () => {};
}

function setStatus(cls, text) {
  const el = document.getElementById('statusBadge');
  if (!el) return;
  el.style.display = 'block';
  el.className = cls;
  el.textContent = text;
}

// ═══════════════════════════════════════════════════════════
// INIT — USERNAME / URL PARAMS
// ═══════════════════════════════════════════════════════════
(function init() {
  const params = new URLSearchParams(location.search);
  const username = (params.get('username') || '').replace(/^@/, '').trim();

  if (username) {
    wsConnect(username);
    document.getElementById('usernameOverlay').style.display = 'none';
  } else {
    document.getElementById('usernameOverlay').style.display = 'flex';
  }

  // Start button
  document.getElementById('usernameBtn').addEventListener('click', () => {
    const val = document.getElementById('usernameInput').value.replace(/^@/, '').trim();
    if (!val) return;
    localStorage.setItem('tiktok_username', val);
    const u = new URL(location.href);
    u.searchParams.set('username', val);
    history.replaceState({}, '', u);
    document.getElementById('usernameOverlay').style.display = 'none';
    wsConnect(val);
  });

  document.getElementById('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('usernameBtn').click();
  });

  // Demo button
  document.getElementById('demoWarBtn').addEventListener('click', () => {
    const u = new URL(location.href);
    u.searchParams.set('username', 'demo');
    history.replaceState({}, '', u);
    document.getElementById('usernameOverlay').style.display = 'none';
    wsConnect('demo');
  });

  // Prefill last saved username
  const saved = localStorage.getItem('tiktok_username');
  if (saved) document.getElementById('usernameInput').value = saved;

  // Unlock audio on first user touch
  document.addEventListener('click',     () => { try { getACtx(); } catch(e) {} }, { once: true });
  document.addEventListener('touchstart', () => { try { getACtx(); } catch(e) {} }, { once: true });
})();

// ═══════════════════════════════════════════════════════════
// SCALE / RESIZE + PINCH-TO-ZOOM + DRAG
// ═══════════════════════════════════════════════════════════
(function scaleSetup() {
  var wrapper    = document.getElementById('scaleWrapper');
  var pinchScale  = 1;
  var pinchOffset = { x: 0, y: 0 };

  function applyTransform() {
    var w = document.documentElement.clientWidth  || window.innerWidth;
    var h = document.documentElement.clientHeight || window.innerHeight;
    var baseScale  = Math.min(w / 1000, h / 1000);
    var totalScale = baseScale * pinchScale;
    var cx = (w - 1000 * totalScale) / 2 + pinchOffset.x;
    var cy = (h - 1000 * totalScale) / 2 + pinchOffset.y;
    wrapper.style.transform = 'translate(' + cx + 'px,' + cy + 'px) scale(' + totalScale + ')';
  }

  window.addEventListener('resize', applyTransform);
  window.addEventListener('orientationchange', function() { setTimeout(applyTransform, 300); });
  applyTransform();

  // ── Pinch-to-zoom ──────────────────────────────────────────
  var lastDist   = 0;
  var lastMid    = { x: 0, y: 0 };
  var isDragging = false;
  var dragStart  = { x: 0, y: 0 };
  var MIN_ZOOM = 0.5, MAX_ZOOM = 3.0;

  function touchDist(t1, t2) {
    var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function touchMid(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      lastDist   = touchDist(e.touches[0], e.touches[1]);
      lastMid    = touchMid(e.touches[0], e.touches[1]);
      isDragging = false;
    } else if (e.touches.length === 1 && pinchScale > 1.05) {
      isDragging = true;
      dragStart  = { x: e.touches[0].clientX - pinchOffset.x,
                     y: e.touches[0].clientY - pinchOffset.y };
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      isDragging = false;
      var d = touchDist(e.touches[0], e.touches[1]);
      var m = touchMid(e.touches[0], e.touches[1]);
      pinchScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchScale * (d / lastDist)));
      pinchOffset.x += (m.x - lastMid.x);
      pinchOffset.y += (m.y - lastMid.y);
      lastDist = d; lastMid = m;
      applyTransform();
    } else if (e.touches.length === 1 && isDragging) {
      pinchOffset.x = e.touches[0].clientX - dragStart.x;
      pinchOffset.y = e.touches[0].clientY - dragStart.y;
      applyTransform();
    }
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (e.touches.length === 0) isDragging = false;
  }, { passive: true });
})();

document.getElementById('fsBtn').addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen && document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen()
      .then(() => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); })
      .catch(() => {});
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  location.href = '/';
});
