<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🏴‍☠️ Pirate Ship Map Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
    h2 { margin-bottom: 6px; font-size: 20px; color: #CC8800; letter-spacing: 2px; }
    p  { margin-bottom: 14px; font-size: 12px; color: #666; }
    canvas { border: 1px solid #333; border-radius: 10px; }
  </style>
</head>
<body>
  <h2>🏴‍☠️ PIRATE SHIP MAP — ПРЕВЬЮ</h2>
  <p>Бой на палубе, море вокруг, паруса, чайки</p>
  <canvas id="c" width="600" height="520"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CW = 600, CH = 520, SKY_H = 160;

const seagulls = Array.from({length: 6}, (_, i) => ({
  x: 80 + i * 90,
  y: 40 + Math.random() * 60,
  spd: 0.4 + Math.random() * 0.3,
  wing: Math.random() * Math.PI * 2,
  dir: Math.random() > 0.5 ? 1 : -1
}));

function drawWaves(now, yBase, amplitude, color, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, yBase);
  for (let x = 0; x <= CW; x += 5) {
    const y = yBase + Math.sin(x * 0.025 + now * 0.002) * amplitude
                    + Math.sin(x * 0.05 + now * 0.0015) * (amplitude * 0.5);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(CW, CH); ctx.lineTo(0, CH);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawRope(x1, y1, x2, y2) {
  ctx.strokeStyle = '#7a5530'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 + 15;
  ctx.moveTo(x1, y1); ctx.quadraticCurveTo(mx, my, x2, y2); ctx.stroke();
}

function drawScene(now) {
  ctx.clearRect(0, 0, CW, CH);
  const sway = Math.sin(now * 0.0008) * 3;

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, SKY_H);
  sky.addColorStop(0, '#0a1a35');
  sky.addColorStop(0.5, '#1a4070');
  sky.addColorStop(1, '#2a6090');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, SKY_H);

  // Clouds
  [[100,50,70],[250,35,90],[420,55,65],[520,40,55]].forEach(([cx,cy,cr]) => {
    ctx.fillStyle = 'rgba(200,220,240,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+cr*0.5, cy+5, cr*0.7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-cr*0.4, cy+8, cr*0.6, 0, Math.PI*2); ctx.fill();
  });

  // Sun on horizon
  const sunGlow = ctx.createRadialGradient(80, SKY_H - 10, 5, 80, SKY_H - 10, 70);
  sunGlow.addColorStop(0, 'rgba(255,200,50,0.6)');
  sunGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sunGlow; ctx.beginPath(); ctx.arc(80, SKY_H - 10, 70, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFE050'; ctx.beginPath(); ctx.arc(80, SKY_H - 10, 20, 0, Math.PI*2); ctx.fill();

  // Sea (back)
  drawWaves(now, SKY_H - 10, 12, '#1a5080', 1);
  drawWaves(now + 500, SKY_H + 20, 10, '#156090', 0.8);

  // Distant island
  ctx.fillStyle = '#1a3a1a';
  ctx.beginPath(); ctx.ellipse(500, SKY_H + 5, 60, 15, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a5a2a';
  ctx.beginPath(); ctx.arc(480, SKY_H - 5, 12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(510, SKY_H - 8, 10, 0, Math.PI*2); ctx.fill();

  // ── SHIP DECK ──
  ctx.save();
  ctx.translate(0, sway);

  // Hull sides
  const hull = ctx.createLinearGradient(0, CH - 130, 0, CH);
  hull.addColorStop(0, '#5a2a08');
  hull.addColorStop(1, '#2a1004');
  ctx.fillStyle = hull;
  ctx.beginPath();
  ctx.moveTo(20, CH - 80);
  ctx.lineTo(0, CH - 20);
  ctx.lineTo(0, CH);
  ctx.lineTo(CW, CH);
  ctx.lineTo(CW, CH - 20);
  ctx.lineTo(580, CH - 80);
  ctx.closePath(); ctx.fill();

  // Hull details
  ctx.strokeStyle = '#7a4010'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(20, CH - 80); ctx.lineTo(580, CH - 80); ctx.stroke();
  ctx.strokeStyle = '#3a1808'; ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const hx = 30 + i * 77;
    ctx.beginPath(); ctx.moveTo(hx, CH - 80); ctx.lineTo(hx - 5, CH - 20); ctx.stroke();
  }

  // Deck planks
  const deckGrad = ctx.createLinearGradient(0, CH - 130, 0, CH - 75);
  deckGrad.addColorStop(0, '#8a5020');
  deckGrad.addColorStop(1, '#6a3810');
  ctx.fillStyle = deckGrad;
  ctx.fillRect(15, CH - 130, CW - 30, 50);
  // Plank lines
  ctx.strokeStyle = '#5a2808'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    const px = 15 + i * 48;
    ctx.beginPath(); ctx.moveTo(px, CH - 130); ctx.lineTo(px, CH - 80); ctx.stroke();
  }
  // Horizontal grain
  ctx.strokeStyle = 'rgba(100,50,10,0.3)'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const py = CH - 125 + i * 10;
    ctx.beginPath(); ctx.moveTo(15, py); ctx.lineTo(CW - 15, py); ctx.stroke();
  }

  // Cannons
  [[95, CH - 88], [505, CH - 88]].forEach(([cx, cy]) => {
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.ellipse(cx, cy, 22, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.rect(cx - 25, cy - 6, 30, 12); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(cx - 25, cy, 6, 0, Math.PI*2); ctx.fill();
  });

  // Barrels
  [[160, CH - 105], [440, CH - 105]].forEach(([bx, by]) => {
    ctx.fillStyle = '#6a3810';
    ctx.beginPath(); ctx.ellipse(bx, by, 18, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3a1808'; ctx.lineWidth = 2;
    [by - 10, by, by + 10].forEach(y => {
      ctx.beginPath(); ctx.ellipse(bx, y, 18, 5, 0, 0, Math.PI*2); ctx.stroke();
    });
  });

  // Main mast
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 12; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(300, CH - 130); ctx.lineTo(300, SKY_H - 120); ctx.stroke();
  // Crow's nest
  ctx.fillStyle = '#4a2808';
  ctx.beginPath(); ctx.ellipse(300, SKY_H - 70, 22, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(278, SKY_H - 85, 44, 16);
  // Flag
  const flagWave = Math.sin(now * 0.002) * 10;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(300, SKY_H - 118);
  ctx.lineTo(300 + 35 + flagWave, SKY_H - 108);
  ctx.lineTo(300 + 32 + flagWave, SKY_H - 96);
  ctx.lineTo(300, SKY_H - 100);
  ctx.closePath(); ctx.fill();
  // Skull on flag
  ctx.fillStyle = '#FFF'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
  ctx.fillText('☠', 316 + flagWave * 0.5, SKY_H - 103);

  // Side masts
  [[100, CH - 130, SKY_H - 60], [500, CH - 130, SKY_H - 55]].forEach(([mx, my, ty]) => {
    ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx, ty); ctx.stroke();
  });

  // Sails
  const sailBulge = Math.sin(now * 0.001) * 15;
  // Main sail
  ctx.fillStyle = 'rgba(230,215,180,0.92)';
  ctx.beginPath();
  ctx.moveTo(300, SKY_H - 115);
  ctx.lineTo(300 - 80, SKY_H - 60);
  ctx.quadraticCurveTo(300 - 90 - sailBulge, SKY_H + 10, 300 - 60, SKY_H + 30);
  ctx.lineTo(300, SKY_H + 25);
  ctx.lineTo(300 + 60, SKY_H + 30);
  ctx.quadraticCurveTo(300 + 90 + sailBulge, SKY_H + 10, 300 + 80, SKY_H - 60);
  ctx.closePath(); ctx.fill();
  // Sail stripe
  ctx.strokeStyle = '#CC3300'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(300, SKY_H - 115);
  ctx.quadraticCurveTo(300 + sailBulge * 0.5, SKY_H - 45, 300, SKY_H + 25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(300 - 40, SKY_H - 85);
  ctx.quadraticCurveTo(300 - 40 - sailBulge * 0.3, SKY_H - 30, 300 - 30, SKY_H + 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(300 + 40, SKY_H - 85);
  ctx.quadraticCurveTo(300 + 40 + sailBulge * 0.3, SKY_H - 30, 300 + 30, SKY_H + 12);
  ctx.stroke();

  // Side sails (smaller)
  [[100, SKY_H - 57, 50, 40], [500, SKY_H - 52, 50, 40]].forEach(([sx, sy, sw, sh]) => {
    const dir = sx < 300 ? 1 : -1;
    ctx.fillStyle = 'rgba(220,205,170,0.88)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx + dir * (sw + sailBulge * 0.5), sy + sh / 2, sx, sy + sh);
    ctx.lineTo(sx, sy); ctx.closePath(); ctx.fill();
  });

  // Ropes
  drawRope(300, SKY_H - 115, 100, SKY_H - 57);
  drawRope(300, SKY_H - 115, 500, SKY_H - 52);
  drawRope(100, SKY_H - 57, 15, CH - 130);
  drawRope(500, SKY_H - 52, 585, CH - 130);

  ctx.restore(); // end ship sway

  // Seagulls
  seagulls.forEach(g => {
    g.x += g.spd * g.dir;
    g.wing += 0.08;
    if (g.x > CW + 30) g.x = -30;
    if (g.x < -30) g.x = CW + 30;
    const wy = Math.sin(g.wing) * 4;
    ctx.strokeStyle = 'rgba(220,230,240,0.7)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(g.x - 10, g.y + wy);
    ctx.quadraticCurveTo(g.x, g.y, g.x + 10, g.y + wy);
    ctx.stroke();
  });

  // Sea (front)
  drawWaves(now, CH - 85, 8, '#1060a0', 0.9);
  drawWaves(now + 200, CH - 50, 6, '#0d5090', 1);

  // Wave foam
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let x = 0; x <= CW; x += 5) {
    const y = CH - 85 + Math.sin(x * 0.025 + now * 0.002) * 8 + Math.sin(x * 0.05 + now * 0.0015) * 4;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Arena zone
  ctx.save();
  ctx.strokeStyle = 'rgba(200,150,50,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(300, 340, 150, 40, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.font = 'bold 13px Arial'; ctx.fillStyle = 'rgba(220,170,60,0.7)';
  ctx.textAlign = 'center'; ctx.fillText('🏟️  ARENA ZONE', 300, 345);
  ctx.restore();

  requestAnimationFrame(drawScene);
}
requestAnimationFrame(drawScene);
</script>
</body>
</html>
