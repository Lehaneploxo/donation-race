<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>👤 Leha Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
    h2 { margin-bottom: 6px; font-size: 20px; color: #FFD700; letter-spacing: 2px; }
    p { margin-bottom: 18px; font-size: 12px; color: #666; }
    canvas { border: 1px solid #222; border-radius: 14px; background: radial-gradient(ellipse at 50% 60%, #1a0a2e 0%, #050510 100%); }
  </style>
</head>
<body>
  <h2>👤 LEHA NEPLOXO 21 — СОЗДАТЕЛЬ</h2>
  <p>Лысый, в кепке, с бородой</p>
  <canvas id="c" width="300" height="380"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawLeha(cx, cy, now) {
  ctx.save();
  ctx.translate(cx, cy);
  const bob = Math.sin(now * 0.002) * 3;
  ctx.translate(0, bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, 24, 22, 6, 0, 0, Math.PI*2); ctx.fill();

  // Ноги — джинсы
  ctx.strokeStyle = '#1a2a4a'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-6, -2); ctx.lineTo(-7, 24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -2); ctx.lineTo(7, 24); ctx.stroke();
  // Кеды
  ctx.fillStyle = '#EEEEEE';
  ctx.beginPath(); ctx.moveTo(-12, 22); ctx.lineTo(-2, 22); ctx.lineTo(-1, 26); ctx.lineTo(-13, 26); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12, 22); ctx.lineTo(2, 22); ctx.lineTo(1, 26); ctx.lineTo(13, 26); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(-12, 21, 11, 2);
  ctx.fillRect(2, 21, 11, 2);
  // Полоска на кедах
  ctx.strokeStyle = '#CC2200'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-12, 23); ctx.lineTo(-1, 23); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, 23); ctx.lineTo(13, 23); ctx.stroke();

  // Худи — тёмное с молнией
  ctx.fillStyle = '#1a1a2a';
  ctx.beginPath(); ctx.moveTo(-16, -44); ctx.lineTo(16, -44); ctx.lineTo(18, -2); ctx.lineTo(-18, -2); ctx.closePath(); ctx.fill();
  // Молния на худи
  ctx.strokeStyle = '#333355'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -44); ctx.lineTo(0, -2); ctx.stroke();
  // Карман кенгуру
  ctx.strokeStyle = '#252535'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-10, -16); ctx.lineTo(-10, -6); ctx.lineTo(10, -6); ctx.lineTo(10, -16); ctx.stroke();
  // Надпись на худи
  ctx.fillStyle = 'rgba(255,50,50,0.7)';
  ctx.font = 'bold 7px Arial'; ctx.textAlign = 'center';
  ctx.fillText('BOSS', 0, -26);
  // Капюшон (откинут назад)
  ctx.fillStyle = '#151525';
  ctx.beginPath(); ctx.moveTo(-16, -44); ctx.quadraticCurveTo(-22, -52, -16, -58); ctx.lineTo(-8, -52); ctx.lineTo(-8, -44); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(16, -44); ctx.quadraticCurveTo(22, -52, 16, -58); ctx.lineTo(8, -52); ctx.lineTo(8, -44); ctx.closePath(); ctx.fill();

  // Руки — в рукавах
  ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-14, -38); ctx.lineTo(-22, -18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14, -38); ctx.lineTo(22, -18); ctx.stroke();
  // Манжеты
  ctx.strokeStyle = '#252535'; ctx.lineWidth = 10;
  ctx.beginPath(); ctx.moveTo(-22, -20); ctx.lineTo(-22, -14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22, -20); ctx.lineTo(22, -14); ctx.stroke();
  // Кисти
  ctx.fillStyle = '#D4945A';
  ctx.beginPath(); ctx.arc(-22, -12, 6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, -12, 6, 0, Math.PI*2); ctx.fill();
  // Пальцы
  ctx.strokeStyle = '#C07840'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  for(let i = 0; i < 4; i++){
    ctx.beginPath(); ctx.moveTo(-24+i*2, -12); ctx.lineTo(-25+i*2, -6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20+i*2, -12); ctx.lineTo(19+i*2, -6); ctx.stroke();
  }

  // Цепочка
  const chainGlow = 0.7 + Math.sin(now * 0.003) * 0.15;
  ctx.strokeStyle = `rgba(255,215,0,${chainGlow})`; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-10, -38); ctx.quadraticCurveTo(0, -32, 10, -38);
  ctx.stroke();
  ctx.fillStyle = `rgba(255,215,0,${chainGlow})`;
  ctx.beginPath(); ctx.arc(0, -32, 3.5, 0, Math.PI*2); ctx.fill();
  // Кулон
  ctx.fillStyle = '#FF4400'; ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(0, -32, 2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

  // ШЕЯ
  ctx.fillStyle = '#C07030';
  ctx.fillRect(-5, -50, 10, 10);

  // ГОЛОВА — лысая
  ctx.fillStyle = '#C07030';
  ctx.beginPath(); ctx.arc(0, -62, 16, 0, Math.PI*2); ctx.fill();
  // Блик на лысине
  ctx.fillStyle = 'rgba(255,220,160,0.2)';
  ctx.beginPath(); ctx.ellipse(-5, -70, 7, 4, 0.3, 0, Math.PI*2); ctx.fill();
  // Тень на затылке
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.arc(4, -62, 14, 0.2, Math.PI - 0.2); ctx.fill();

  // Уши
  ctx.fillStyle = '#B86830';
  ctx.beginPath(); ctx.ellipse(-15, -62, 4, 5, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15, -62, 4, 5, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#A05820';
  ctx.beginPath(); ctx.ellipse(-15, -62, 2, 3, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15, -62, 2, 3, -0.1, 0, Math.PI*2); ctx.fill();


  // Брови — густые
  ctx.fillStyle = '#1a1008';
  ctx.beginPath(); ctx.ellipse(-6, -70, 6, 2.5, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -70, 6, 2.5, -0.1, 0, Math.PI*2); ctx.fill();

  // Глаза — карие, уверенные
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -66, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -66, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a2a0a';
  ctx.beginPath(); ctx.arc(-5.5, -66, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.5, -66, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-5.2, -66, 1.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.8, -66, 1.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.arc(-4.4, -67.4, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.6, -67.4, 0.8, 0, Math.PI*2); ctx.fill();

  // Нос
  ctx.fillStyle = '#a86030';
  ctx.beginPath(); ctx.ellipse(0, -60, 3.5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#904e20';
  ctx.beginPath(); ctx.arc(-2, -60, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -60, 1.2, 0, Math.PI*2); ctx.fill();

  // Рот — лёгкая ухмылка
  ctx.strokeStyle = '#7a3a10'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-5, -54); ctx.quadraticCurveTo(0, -51, 5, -54); ctx.stroke();
  // Ямочка
  ctx.strokeStyle = 'rgba(120,60,20,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(5.5, -54, 1, 0, Math.PI); ctx.stroke();

  // КЕПКА — с козырьком вперёд
  // Тулья кепки
  ctx.fillStyle = '#CC2200';
  ctx.beginPath();
  ctx.ellipse(0, -76, 18, 6, 0, Math.PI, 0); // основание
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-18, -76);
  ctx.quadraticCurveTo(-18, -96, 0, -98);
  ctx.quadraticCurveTo(18, -96, 18, -76);
  ctx.fill();
  // Швы на кепке
  ctx.strokeStyle = '#AA1100'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -98); ctx.lineTo(0, -76); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-18, -76); ctx.quadraticCurveTo(-14, -88, 0, -90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18, -76); ctx.quadraticCurveTo(14, -88, 0, -90); ctx.stroke();
  // Пуговка на макушке
  ctx.fillStyle = '#AA1100';
  ctx.beginPath(); ctx.arc(0, -98, 2.5, 0, Math.PI*2); ctx.fill();
  // Налобная лента (snapback полоса)
  ctx.fillStyle = '#111111';
  ctx.beginPath(); ctx.ellipse(0, -76, 18, 5, 0, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.ellipse(0, -76, 18, 2, 0, Math.PI, 0); ctx.fill();
  // КОЗЫРЁК
  ctx.fillStyle = '#BB1100';
  ctx.beginPath();
  ctx.moveTo(-16, -76);
  ctx.lineTo(-20, -70);
  ctx.lineTo(20, -70);
  ctx.lineTo(16, -76);
  ctx.closePath(); ctx.fill();
  // Козырёк снизу — тень
  ctx.fillStyle = '#881100';
  ctx.beginPath();
  ctx.moveTo(-16, -76);
  ctx.lineTo(-20, -70);
  ctx.lineTo(20, -70);
  ctx.lineTo(16, -76);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(-16, -76);
  ctx.lineTo(-20, -70);
  ctx.lineTo(20, -70);
  ctx.lineTo(16, -76);
  ctx.fill();
  // Nike swoosh на козырьке
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(-10, -72);
  ctx.bezierCurveTo(-6, -77, 4, -76, 9, -72);
  ctx.bezierCurveTo(2, -71.5, -4, -71, -10, -72);
  ctx.closePath();
  ctx.fill();

  // Специальная аура создателя
  const auraA = 0.06 + Math.sin(now * 0.002) * 0.03;
  ctx.fillStyle = `rgba(255,50,50,${auraA})`;
  ctx.beginPath(); ctx.ellipse(0, -40, 28, 50, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawLabels(cx, cy, now) {
  ctx.save();
  ctx.translate(cx, cy - 130);
  ctx.textAlign = 'center';

  // Бейдж создателя
  ctx.font = 'bold 13px Arial';
  ctx.fillStyle = '#FF4400'; ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 10;
  ctx.fillText('⚡ СОЗДАТЕЛЬ', 0, -10); ctx.shadowBlur = 0;

  ctx.font = 'bold 15px Arial';
  ctx.strokeStyle = 'rgba(0,0,0,0.95)'; ctx.lineWidth = 3.5;
  ctx.strokeText('Leha Neploxo 21', 0, 10);
  ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
  ctx.fillText('Leha Neploxo 21', 0, 10); ctx.shadowBlur = 0;

  ctx.font = 'bold 12px Arial';
  ctx.strokeText('❤️ 500', 0, 27);
  ctx.fillStyle = '#FF6688'; ctx.shadowBlur = 0; ctx.fillText('❤️ 500', 0, 27);
  ctx.strokeText('⚔️ 50', 0, 42);
  ctx.fillStyle = '#88CCFF'; ctx.fillText('⚔️ 50', 0, 42);
  ctx.strokeText('☠️ 35', 0, 57);
  ctx.fillStyle = '#FF4444'; ctx.fillText('☠️ 35', 0, 57);

  ctx.restore();
}

function render(now) {
  ctx.clearRect(0, 0, 300, 380);
  ctx.fillStyle = 'rgba(60,30,90,0.2)';
  ctx.beginPath(); ctx.ellipse(150, 310, 60, 14, 0, 0, Math.PI*2); ctx.fill();

  drawLeha(150, 290, now);
  drawLabels(150, 290, now);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
