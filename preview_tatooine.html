<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tatooine Map Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0805; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:Arial; gap:16px; }
  .label { color:#FFD0A0; font-size:16px; letter-spacing:2px; }
  canvas { border:2px solid #3a2800; border-radius:6px; }
</style>
</head>
<body>
<div class="label">🏜️ TATOOINE</div>
<canvas id="c" width="600" height="1000"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Горизонт на y=280 — персонажи ходят от y=305, всё на земле
const HORIZON = 280;


function draw(now) {
  ctx.clearRect(0,0,W,H);

  // ── SKY — розовое, только верхние 30% ──────
  const sky = ctx.createLinearGradient(0,0,0,HORIZON);
  sky.addColorStop(0,   '#1a0818');
  sky.addColorStop(0.2, '#4a1530');
  sky.addColorStop(0.5, '#9a3550');
  sky.addColorStop(0.8, '#cc6060');
  sky.addColorStop(1,   '#dd9070');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HORIZON);

  // ── SUN 1 — белое яркое (самый верх, над HUD) ──
  const s1x=W*0.28, s1y=H*0.04;
  const sg1 = ctx.createRadialGradient(s1x,s1y,0,s1x,s1y,130);
  sg1.addColorStop(0,'rgba(255,245,220,0.28)');
  sg1.addColorStop(0.5,'rgba(255,200,160,0.1)');
  sg1.addColorStop(1,'rgba(255,140,100,0)');
  ctx.fillStyle=sg1; ctx.fillRect(s1x-130,s1y-130,260,260);
  const sc1 = ctx.createRadialGradient(s1x,s1y,0,s1x,s1y,55);
  sc1.addColorStop(0,'rgba(255,255,255,1)');
  sc1.addColorStop(0.5,'rgba(255,245,210,0.7)');
  sc1.addColorStop(1,'rgba(255,180,120,0)');
  ctx.fillStyle=sc1; ctx.fillRect(s1x-55,s1y-55,110,110);
  ctx.save(); ctx.shadowColor='#FFFAE0'; ctx.shadowBlur=50;
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath(); ctx.arc(s1x,s1y,38,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── SUN 2 — большое оранжевое (самый верх, над HUD) ───────
  const s2x=W*0.66, s2y=H*0.065;
  const sg2 = ctx.createRadialGradient(s2x,s2y,0,s2x,s2y,120);
  sg2.addColorStop(0,'rgba(255,150,80,0.3)');
  sg2.addColorStop(0.5,'rgba(255,100,60,0.1)');
  sg2.addColorStop(1,'rgba(255,60,30,0)');
  ctx.fillStyle=sg2; ctx.fillRect(s2x-120,s2y-120,240,240);
  ctx.save(); ctx.shadowColor='#FF9966'; ctx.shadowBlur=30;
  const sc2 = ctx.createRadialGradient(s2x-10,s2y-10,0,s2x,s2y,62);
  sc2.addColorStop(0,'#FFF0D0');
  sc2.addColorStop(0.3,'#FFD080');
  sc2.addColorStop(0.65,'#FF9040');
  sc2.addColorStop(1,'#C03010');
  ctx.fillStyle=sc2;
  ctx.beginPath(); ctx.arc(s2x,s2y,62,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── ГОРЫ — у горизонта ──────────────────────
  // Дальние (бледно-пурпурные)
  ctx.fillStyle='rgba(130,70,90,0.4)';
  ctx.beginPath(); ctx.moveTo(0,HORIZON);
  ctx.lineTo(W*0.05,HORIZON-65); ctx.lineTo(W*0.12,HORIZON-45);
  ctx.lineTo(W*0.2,HORIZON-80); ctx.lineTo(W*0.28,HORIZON-55);
  ctx.lineTo(W*0.36,HORIZON-90); ctx.lineTo(W*0.44,HORIZON-60);
  ctx.lineTo(W*0.52,HORIZON-75); ctx.lineTo(W*0.6,HORIZON-50);
  ctx.lineTo(W*0.68,HORIZON-85); ctx.lineTo(W*0.76,HORIZON-55);
  ctx.lineTo(W*0.84,HORIZON-70); ctx.lineTo(W*0.92,HORIZON-45);
  ctx.lineTo(W,HORIZON-60); ctx.lineTo(W,HORIZON);
  ctx.closePath(); ctx.fill();

  // Средние
  ctx.fillStyle='rgba(150,80,60,0.55)';
  ctx.beginPath(); ctx.moveTo(0,HORIZON);
  ctx.lineTo(W*0.07,HORIZON-45); ctx.lineTo(W*0.15,HORIZON-30);
  ctx.lineTo(W*0.24,HORIZON-55); ctx.lineTo(W*0.33,HORIZON-38);
  ctx.lineTo(W*0.42,HORIZON-50); ctx.lineTo(W*0.51,HORIZON-35);
  ctx.lineTo(W*0.6,HORIZON-48); ctx.lineTo(W*0.69,HORIZON-32);
  ctx.lineTo(W*0.78,HORIZON-52); ctx.lineTo(W*0.87,HORIZON-35);
  ctx.lineTo(W*0.94,HORIZON-42); ctx.lineTo(W,HORIZON-30);
  ctx.lineTo(W,HORIZON); ctx.closePath(); ctx.fill();

  // Ближние (тёмно-коричневые)
  ctx.fillStyle='rgba(140,75,40,0.75)';
  ctx.beginPath(); ctx.moveTo(0,HORIZON);
  ctx.lineTo(W*0.1,HORIZON-22); ctx.lineTo(W*0.2,HORIZON-14);
  ctx.lineTo(W*0.32,HORIZON-28); ctx.lineTo(W*0.44,HORIZON-18);
  ctx.lineTo(W*0.55,HORIZON-24); ctx.lineTo(W*0.66,HORIZON-15);
  ctx.lineTo(W*0.78,HORIZON-26); ctx.lineTo(W*0.88,HORIZON-16);
  ctx.lineTo(W,HORIZON-20); ctx.lineTo(W,HORIZON);
  ctx.closePath(); ctx.fill();

  // Туман у горизонта
  const hmist = ctx.createLinearGradient(0,HORIZON-30,0,HORIZON+40);
  hmist.addColorStop(0,'rgba(210,150,110,0)');
  hmist.addColorStop(0.5,'rgba(210,150,110,0.22)');
  hmist.addColorStop(1,'rgba(190,110,70,0)');
  ctx.fillStyle=hmist; ctx.fillRect(0,HORIZON-30,W,70);

  // ── ЗЕМЛЯ — нижние 70% ──────────────────────
  const ground = ctx.createLinearGradient(0,HORIZON,0,H);
  ground.addColorStop(0,   '#c89060');
  ground.addColorStop(0.05,'#b87840');
  ground.addColorStop(0.2, '#a06030');
  ground.addColorStop(0.5, '#8a4e22');
  ground.addColorStop(1,   '#6a3810');
  ctx.fillStyle=ground; ctx.fillRect(0,HORIZON,W,H-HORIZON);

  // Цветовые пятна на земле
  ctx.fillStyle='rgba(160,90,35,0.3)';
  ctx.beginPath(); ctx.ellipse(W*0.25,HORIZON+180,160,35,0.05,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(100,50,15,0.25)';
  ctx.beginPath(); ctx.ellipse(W*0.72,HORIZON+420,200,40,-0.05,0,Math.PI*2); ctx.fill();

  // Дюны
  ctx.fillStyle='#c07020';
  ctx.beginPath(); ctx.moveTo(0,HORIZON+160);
  ctx.bezierCurveTo(W*0.15,HORIZON+80, W*0.28,HORIZON+60, W*0.4,HORIZON+120);
  ctx.bezierCurveTo(W*0.52,HORIZON+180, W*0.62,HORIZON+190, W*0.75,HORIZON+160);
  ctx.lineTo(W*0.75,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#b06818';
  ctx.beginPath(); ctx.moveTo(W*0.55,HORIZON+250);
  ctx.bezierCurveTo(W*0.65,HORIZON+180, W*0.76,HORIZON+165, W*0.88,HORIZON+200);
  ctx.bezierCurveTo(W*0.94,HORIZON+220, W,HORIZON+210, W,HORIZON+215);
  ctx.lineTo(W,H); ctx.lineTo(W*0.55,H); ctx.closePath(); ctx.fill();

  // Блики на дюнах
  ctx.strokeStyle='rgba(220,150,60,0.45)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W*0.06,HORIZON+118);
  ctx.bezierCurveTo(W*0.18,HORIZON+72, W*0.28,HORIZON+62, W*0.38,HORIZON+108);
  ctx.stroke();

  // ── СЛЕДЫ ЛЭНДСПИДЕРА (колеи в песке) ────────
  ctx.save();
  // Две колеи уходят к горизонту (перспектива)
  ctx.strokeStyle='rgba(80,45,10,0.55)'; ctx.lineWidth=4; ctx.lineCap='round';
  // Левая колея
  ctx.beginPath();
  ctx.moveTo(W*0.09, HORIZON+620);
  ctx.bezierCurveTo(W*0.10, HORIZON+400, W*0.13, HORIZON+200, W*0.19, HORIZON+60);
  ctx.stroke();
  // Правая колея
  ctx.beginPath();
  ctx.moveTo(W*0.22, HORIZON+620);
  ctx.bezierCurveTo(W*0.22, HORIZON+400, W*0.22, HORIZON+200, W*0.22, HORIZON+60);
  ctx.stroke();
  // Потемнение между колеями (примятый песок)
  ctx.fillStyle='rgba(60,30,5,0.18)';
  ctx.beginPath();
  ctx.moveTo(W*0.09, HORIZON+620); ctx.bezierCurveTo(W*0.10,HORIZON+400,W*0.13,HORIZON+200,W*0.19,HORIZON+60);
  ctx.lineTo(W*0.22, HORIZON+60); ctx.bezierCurveTo(W*0.22,HORIZON+200,W*0.22,HORIZON+400,W*0.22,HORIZON+620);
  ctx.closePath(); ctx.fill();
  // Тонкие краевые тени колей
  ctx.strokeStyle='rgba(40,20,0,0.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W*0.08,HORIZON+620); ctx.bezierCurveTo(W*0.09,HORIZON+400,W*0.12,HORIZON+200,W*0.18,HORIZON+60); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.23,HORIZON+620); ctx.bezierCurveTo(W*0.23,HORIZON+400,W*0.23,HORIZON+200,W*0.23,HORIZON+60); ctx.stroke();
  ctx.restore();

  // ── СКЕЛЕТ ЖИВОТНОГО (краньт, середина) ──────
  ctx.save();
  const sx=W*0.45, sy=HORIZON+480;
  // Тень скелета
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(sx+10,sy+8,80,10,0,0,Math.PI*2); ctx.fill();
  // Позвоночник
  ctx.strokeStyle='rgba(210,185,140,0.9)'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(sx-80,sy-5); ctx.bezierCurveTo(sx-30,sy-18,sx+30,sy-14,sx+80,sy-8); ctx.stroke();
  // Рёбра (по 6 с каждой стороны)
  ctx.lineWidth=2.5;
  for(let i=0;i<6;i++){
    const rx=sx-55+i*20, topY=sy-14;
    // Верхние рёбра
    ctx.beginPath();
    ctx.moveTo(rx,topY);
    ctx.bezierCurveTo(rx-10,topY-18, rx-18,topY-6, rx-14,topY+10);
    ctx.stroke();
    // Нижние рёбра
    ctx.beginPath();
    ctx.moveTo(rx,topY);
    ctx.bezierCurveTo(rx+4,topY+14, rx-2,topY+22, rx-8,topY+18);
    ctx.stroke();
  }
  // Череп
  ctx.fillStyle='rgba(215,190,145,0.92)';
  ctx.beginPath(); ctx.ellipse(sx-88,sy-12,16,11,0.2,0,Math.PI*2); ctx.fill();
  // Морда (вытянутая)
  ctx.beginPath(); ctx.ellipse(sx-108,sy-8,14,7,-0.15,0,Math.PI*2); ctx.fill();
  // Глазница
  ctx.fillStyle='rgba(40,20,5,0.7)';
  ctx.beginPath(); ctx.ellipse(sx-92,sy-14,4,4,0,0,Math.PI*2); ctx.fill();
  // Зубы
  ctx.fillStyle='rgba(200,175,130,0.9)';
  for(let t=0;t<4;t++){
    ctx.beginPath();
    ctx.moveTo(sx-116+t*5,sy-5);
    ctx.lineTo(sx-115+t*5,sy+4);
    ctx.lineTo(sx-113+t*5,sy-5);
    ctx.closePath(); ctx.fill();
  }
  // Хвостовые позвонки
  ctx.strokeStyle='rgba(200,175,130,0.7)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(sx+80,sy-8); ctx.bezierCurveTo(sx+100,sy-2,sx+115,sy+5,sx+125,sy+10); ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx+125,sy+10); ctx.bezierCurveTo(sx+132,sy+14,sx+138,sy+16,sx+142,sy+14); ctx.stroke();
  // Несколько упавших костей рядом
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(sx+10,sy+16); ctx.lineTo(sx+30,sy+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx-30,sy+20); ctx.lineTo(sx-10,sy+15); ctx.stroke();
  ctx.restore();

  // ── LANDSPEEDER X-34 Люка (слева) ────────────
  const lx=W*0.19, ly=HORIZON+340;
  ctx.save();

  // Парение — тень на земле (размытая)
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(lx+8,ly+18,90,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.ellipse(lx+8,ly+26,70,7,0,0,Math.PI*2); ctx.fill();

  // ── Корпус нижняя часть (брюхо) ──
  const belly = ctx.createLinearGradient(lx-88,ly+8,lx+88,ly+16);
  belly.addColorStop(0,'#4a3010'); belly.addColorStop(0.5,'#6a4818'); belly.addColorStop(1,'#3a2008');
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.moveTo(lx-82,ly+6);
  ctx.bezierCurveTo(lx-88,ly+10, lx-80,ly+18, lx-40,ly+16);
  ctx.lineTo(lx+60,ly+16);
  ctx.bezierCurveTo(lx+88,ly+14, lx+90,ly+8, lx+84,ly+4);
  ctx.closePath(); ctx.fill();

  // ── Корпус основной — кремово-бежевый ──
  const body = ctx.createLinearGradient(lx-88,ly-30,lx+88,ly+10);
  body.addColorStop(0,'#e8dbb0');
  body.addColorStop(0.25,'#f0e4c0');
  body.addColorStop(0.55,'#d8c898');
  body.addColorStop(0.8,'#b8a070');
  body.addColorStop(1,'#907850');
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.moveTo(lx-82,ly+4);
  ctx.bezierCurveTo(lx-90,ly-6,  lx-70,ly-28, lx-30,ly-30);
  ctx.lineTo(lx+28,ly-30);
  ctx.bezierCurveTo(lx+70,ly-28, lx+90,ly-10, lx+84,ly+4);
  ctx.lineTo(lx-82,ly+4);
  ctx.closePath(); ctx.fill();

  // Боковая грань (перспектива)
  const side = ctx.createLinearGradient(lx-88,ly,lx-88,ly+8);
  side.addColorStop(0,'#c0a870'); side.addColorStop(1,'#806838');
  ctx.fillStyle=side;
  ctx.beginPath();
  ctx.moveTo(lx-82,ly+4); ctx.lineTo(lx+84,ly+4);
  ctx.lineTo(lx+84,ly+10); ctx.lineTo(lx-82,ly+10);
  ctx.closePath(); ctx.fill();

  // Линии панелей на корпусе
  ctx.strokeStyle='rgba(100,70,20,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx-20,ly-30); ctx.lineTo(lx-20,ly+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx+22,ly-30); ctx.lineTo(lx+22,ly+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx-82,ly-4); ctx.lineTo(lx+84,ly-4); ctx.stroke();

  // Задний спойлер / хвост
  ctx.fillStyle='#c8b880';
  ctx.beginPath();
  ctx.moveTo(lx+70,ly-30); ctx.lineTo(lx+88,ly-38);
  ctx.lineTo(lx+90,ly-28); ctx.lineTo(lx+84,ly-22);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(80,55,15,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx+70,ly-30); ctx.lineTo(lx+88,ly-38); ctx.lineTo(lx+90,ly-28); ctx.stroke();

  // ── Кокпит — открытый, с ветровым стеклом ──
  // Яма кокпита
  ctx.fillStyle='#1a1008';
  ctx.beginPath();
  ctx.moveTo(lx-62,ly-24);
  ctx.bezierCurveTo(lx-64,ly-48, lx-20,ly-56, lx+12,ly-50);
  ctx.bezierCurveTo(lx+30,ly-44, lx+28,ly-24, lx+22,ly-24);
  ctx.closePath(); ctx.fill();

  // Ветровое стекло (отражение неба)
  const glass = ctx.createLinearGradient(lx-58,ly-50,lx+20,ly-24);
  glass.addColorStop(0,'rgba(180,220,240,0.75)');
  glass.addColorStop(0.3,'rgba(140,190,220,0.55)');
  glass.addColorStop(0.7,'rgba(80,130,170,0.35)');
  glass.addColorStop(1,'rgba(30,60,100,0.2)');
  ctx.fillStyle=glass;
  ctx.beginPath();
  ctx.moveTo(lx-60,ly-24);
  ctx.bezierCurveTo(lx-62,ly-46, lx-22,ly-54, lx+10,ly-48);
  ctx.bezierCurveTo(lx+28,ly-42, lx+26,ly-24, lx+20,ly-24);
  ctx.closePath(); ctx.fill();
  // Блик на стекле
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(lx-52,ly-38);
  ctx.bezierCurveTo(lx-48,ly-50, lx-28,ly-54, lx-12,ly-50);
  ctx.bezierCurveTo(lx-28,ly-46, lx-46,ly-40, lx-52,ly-38);
  ctx.closePath(); ctx.fill();
  // Рамка стекла
  ctx.strokeStyle='rgba(100,70,20,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(lx-60,ly-24);
  ctx.bezierCurveTo(lx-62,ly-46, lx-22,ly-54, lx+10,ly-48);
  ctx.bezierCurveTo(lx+28,ly-42, lx+26,ly-24, lx+20,ly-24);
  ctx.stroke();

  // Приборная панель
  ctx.fillStyle='#2a1a08';
  ctx.beginPath(); ctx.roundRect(lx-44,ly-28,40,10,3); ctx.fill();
  for(let i=0;i<5;i++){
    const cols2=['#FF3300','#FF8800','#FFEE00','#00FF88','#00CCFF'];
    ctx.fillStyle=cols2[i];
    ctx.beginPath(); ctx.arc(lx-41+i*8,ly-23,2,0,Math.PI*2); ctx.fill();
  }

  // ── Три турбодвигателя слева/спереди ──
  const engines = [{ex:lx-84,ey:ly-20},{ex:lx-84,ey:ly-8},{ex:lx-84,ey:ly+2}];
  for(const e of engines){
    // Крепёж двигателя
    ctx.strokeStyle='#7a5828'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(e.ex+10,e.ey); ctx.lineTo(e.ex+26,e.ey); ctx.stroke();
    // Гондола двигателя
    const eng = ctx.createLinearGradient(e.ex,e.ey-9,e.ex,e.ey+9);
    eng.addColorStop(0,'#888070'); eng.addColorStop(0.4,'#a09080'); eng.addColorStop(1,'#504030');
    ctx.fillStyle=eng;
    ctx.beginPath(); ctx.ellipse(e.ex,e.ey,14,9,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(30,20,5,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(e.ex,e.ey,14,9,0,0,Math.PI*2); ctx.stroke();
    // Входное отверстие
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.ellipse(e.ex+12,e.ey,5,6,0,0,Math.PI*2); ctx.fill();
    // Сопло с огнём
    const flame = ctx.createRadialGradient(e.ex-10,e.ey,0,e.ex-10,e.ey,10);
    flame.addColorStop(0,'rgba(255,240,180,0.95)');
    flame.addColorStop(0.3,'rgba(255,140,40,0.8)');
    flame.addColorStop(0.7,'rgba(255,60,10,0.4)');
    flame.addColorStop(1,'rgba(255,30,0,0)');
    ctx.fillStyle=flame;
    ctx.beginPath(); ctx.ellipse(e.ex-10,e.ey,10,6,0,0,Math.PI*2); ctx.fill();
    // Кольца на двигателе
    ctx.strokeStyle='rgba(60,40,10,0.4)'; ctx.lineWidth=1;
    for(let r2=0;r2<3;r2++){
      ctx.beginPath(); ctx.ellipse(e.ex+2+r2*4,e.ey,3,8,0,0,Math.PI*2); ctx.stroke();
    }
  }
  // Соединительная пластина двигателей
  ctx.fillStyle='#8a6838';
  ctx.beginPath(); ctx.roundRect(lx-72,ly-24,18,30,3); ctx.fill();
  ctx.strokeStyle='rgba(50,30,5,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx-70,ly-16); ctx.lineTo(lx-56,ly-16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx-70,ly-8); ctx.lineTo(lx-56,ly-8); ctx.stroke();

  // ── Антенна ──
  ctx.strokeStyle='#6a5030'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(lx+40,ly-30); ctx.lineTo(lx+48,ly-50); ctx.stroke();
